  <style>

    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    
    * {

      box-sizing: border-box;

      font-family: 'Plus Jakarta Sans', 'Noto Sans TC', system-ui, -apple-system, sans-serif;

    }



    /* 精緻極簡滾動條 */

    ::-webkit-scrollbar {

      width: 6px;

      height: 6px;

    }

    ::-webkit-scrollbar-track {

      background: #f1f5f9;

    }

    ::-webkit-scrollbar-thumb {

      background: #cbd5e1;

      border-radius: 99px;

    }

    ::-webkit-scrollbar-thumb:hover {

      background: #94a3b8;

    }



    /* 淡入動畫 */

    .animate-fade-in {

      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;

    }

    @keyframes fadeIn {

      from { opacity: 0; transform: translateY(8px); }

      to { opacity: 1; transform: translateY(0); }

    }
    
    /* 隱藏橫向滾動條，保持頁面乾淨 */

    .hide-scrollbar::-webkit-scrollbar {

      display: none;

    }

    .hide-scrollbar {

      -ms-overflow-style: none;

      scrollbar-width: none;

    }

  </style>

</head>

<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">

  <script type="text/babel" data-type="module">

    // 環境相容設定：支援外部自訂專案與預覽環境自動綁定

    const defaultFirebaseConfig = {

      apiKey: "AIzaSyD9DTPO7obCqmDuwzLzwI_JZixTE4W3EhE",

      authDomain: "gis-club.firebaseapp.com",

      projectId: "gis-club",

      storageBucket: "gis-club.firebasestorage.app",

    // ==========================================

    const ROOT_ADMINS = [

      "pininchen@gis.fcu.edu.tw",       // 副社長 品in 信箱

    const CLUBS = ["一起大跳社", "歐豆K社", "共用"];



    // --- 圖示元件 (Icons) ---

    const FileText = (p) => <Icon {...p} path='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' />;

    const Calculator = (p) => <Icon {...p} path='<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>' />;

    const Edit = (p) => <Icon {...p} path='<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' />;

    const Save = (p) => <Icon {...p} path='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>' />;

    const Cloud = (p) => <Icon {...p} path='<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>' />;

    const Plus = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;

    const Trash2 = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' />;

    const ChevronDown = (p) => <Icon {...p} path='<polyline points="6 9 12 15 18 9"></polyline>' />;

    const ChevronUp = (p) => <Icon {...p} path='<polyline points="18 15 12 9 6 15"></polyline>' />;

    const ChevronLeft = (p) => <Icon {...p} path='<polyline points="15 18 9 12 15 6"></polyline>' />;

    const ChevronRight = (p) => <Icon {...p} path='<polyline points="9 18 15 12 9 6"></polyline>' />;

    const ReceiptIcon = (p) => <Icon {...p} path='<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-8"/><path d="M16 16h-8"/>' />;

    const Wallet = (p) => <Icon {...p} path='<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>' />;

    const Clock = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' />;

    const Briefcase = (p) => <Icon {...p} path='<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' />;

    const UserIcon = (p) => <Icon {...p} path='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' />;

    const Trophy = (p) => <Icon {...p} path='<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>' />;

    const Star = (p) => <Icon {...p} path='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' />;

    const ContactIcon = (p) => <Icon {...p} path='<rect width="16" height="18" x="4" y="3" rx="2" ry="2"/><path d="M9 11h6"/><path d="M9 15h6"/><path d="M12 7v.01"/>' />;

    const ListChecks = (p) => <Icon {...p} path='<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>' />;

    const LogOutIcon = (p) => <Icon {...p} path='<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>' />;

    const GoogleIcon = () => (

      <svg className="w-5 h-5 mr-2.5" viewBox="0 0 24 24">

        <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.11c-2.073-1.933-4.942-3.11-8.274-3.11C5.364 0 0 5.364 0 12s5.364 12 12 12c6.927 0 11.53-4.87 11.53-11.727 0-.789-.086-1.393-.19-1.988H12.24z"/>

      </svg>

    );

    const VideoIcon = (p) => <Icon {...p} path='<polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>' />;

    const DownloadIcon = (p) => <Icon {...p} path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>' />;

    const ExternalLinkIcon = (p) => <Icon {...p} path='<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>' />;

    const SettingsIcon = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>' />;

    const ShieldCheckIcon = (p) => <Icon {...p} path='<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/>' />;

    const BarChartIcon = (p) => <Icon {...p} path='<line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line>' />;

    const PieChartIcon = (p) => <Icon {...p} path='<path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path>' />;



    // --- 2. 預設資料生成 ---

    const generateDefaultData = () => {

      const monthsData = [];

      for (let i = 3; i <= 12; i++) {

        if (i === 3) {

          monthsData.push({ id: 3, name: '3月', daTiao: { purpose: '社團補助金', budget: 2000, items: [] }, ouDouK: { purpose: '社團補助金', budget: 2000, items: [] } });

        } else {

          monthsData.push({ id: i, name: `${i}月`, daTiao: { purpose: '', budget: 0, items: [] }, ouDouK: { purpose: '', budget: 0, items: [] } });

        }

      }



      return {

        finance: {

          ledger: [

            // 已入袋與未入袋之各項真實收入

            { id: "t_inc_1", type: "income", category: "課費", item: "基礎養成 課費", amount: 2250, courseId: "c_default_1", note: "" },

            { id: "t_inc_2", type: "income", category: "課費", item: "K-POP 課費", amount: 3680, courseId: "c_default_2", note: "" },

            { id: "t_inc_6", type: "income", category: "福委補助款", item: "福委固定補助金", amount: 8000, note: "" },

            { id: "t_inc_7", type: "income", category: "福委補助款", item: "社團博覽會補助金", amount: 2000, note: "" },

            { id: "t_inc_10", type: "income", category: "贊助", item: "Julia處長-社團顧問補助", amount: 7500, note: "" },

            { id: "t_inc_11", type: "income", category: "贊助", item: "方博處長-社團顧問補助", amount: 7500, note: "" },

            

            // 精準記錄社團各項支出 (直接關聯至課程 ID)

            { id: "t_exp_1", type: "expense", category: "講師費", item: "CaRu課費 第一堂", amount: 6000, courseId: "c_default_1", note: "" },

            { id: "t_exp_3", type: "expense", category: "場地費", item: "第一堂場地租借", amount: 1076, courseId: "c_default_1", note: "" },

            { id: "t_exp_2", type: "expense", category: "講師費", item: "阿默課費 第1堂", amount: 3000, courseId: "c_default_2", note: "" },

            { id: "t_exp_5", type: "expense", category: "場地費", item: "第1堂場地租借", amount: 1076, courseId: "c_default_2", note: "" },

            { id: "t_exp_7", type: "expense", category: "雜支", item: "社團博覽會雜支", amount: 1000, note: "" },

          ],

          budget: { income: 9000, expense: 12000 }

        },

        course: { 

            columns: [

                { id: "c_default_1", name: "CaRu 第一堂", memberPrice: 150, nonMemberPrice: 400 },

                { id: "c_default_2", name: "阿默 第1堂", memberPrice: 150, nonMemberPrice: 400 }

            ], 

            members: [] 

        },

        invoice: { company: { name: "天茂企管顧問有限公司", taxId: "89177254" }, months: monthsData },

        competition: { daTiao: { newMembers: 0, activities: 0, posts: [] }, ouDouK: { newMembers: 0, activities: 0, posts: [] } },

        videos: [],

        settings: { adminEmails: [] }

      };

    };



    const defaultData = generateDefaultData();



    // ============================================================

    // ✅ 財務總帳管理與財務分析 Dashboard (合一版 FinanceTab) 

    // ============================================================

    const FinanceTab = ({ data, isEditing, setData, isAdmin, customAlert, customConfirm }) => {



      // ── State ────────────────────────────────────────────────

      const [showAddTx, setShowAddTx] = useState(false);



      // 新增交易表單 State (極度簡化版)

      const [txType, setTxType]         = useState('expense');

      const [txCourseId, setTxCourseId] = useState('');

      const [txCategory, setTxCategory] = useState('講師費');

      const [txItem, setTxItem]         = useState('');

      const [txAmount, setTxAmount]     = useState('');

      const [txNote, setTxNote]         = useState('');



      // ── 資料來源與計算 (總帳) ─────────────────────────────────

      const ledger = data.finance?.ledger || [];

      const budget = data.finance?.budget || { income: 9000, expense: 12000 };



      // 總資產計算 (極簡化：純收入 - 純支出)

      const actualIncome = ledger.filter(t => t.type === 'income').reduce((s, t) => s + (Number(t.amount) || 0), 0);

      const actualExpense = ledger.filter(t => t.type === 'expense').reduce((s, t) => s + (Number(t.amount) || 0), 0);

      const netAssets = actualIncome - actualExpense;



      // 年底預計結餘

      const forecastYearEnd = netAssets + (Number(budget.income) || 0) - (Number(budget.expense) || 0);



      const columns = data.course?.columns || [];

      // ── 處理事件 ─────────────────────────────────────────────

      const handleAddTransactionSubmit = (e) => {

        e.preventDefault();

        if (!txItem.trim() || !txAmount) return customAlert('請完整填寫項目與金額！');

        const newData = JSON.parse(JSON.stringify(data));

        if (!newData.finance.ledger) newData.finance.ledger = [];

        newData.finance.ledger.push({

          id: `t_${Date.now()}`,

          type: txType,

          courseId: txCourseId || null,

          category: txCategory,

          item: txItem,

          amount: Number(txAmount),

          note: txNote,

        });

        setData(newData);

        setShowAddTx(false);

        setTxItem(''); setTxAmount(''); setTxNote(''); setTxCourseId('');

      };



      const handleRemoveTransaction = (id) => {

        customConfirm('確定要刪除這筆交易紀錄嗎？這會直接影響資產與核銷金額！', () => {

            const newData = JSON.parse(JSON.stringify(data));

            newData.finance.ledger = newData.finance.ledger.filter(t => t.id !== id);

            setData(newData);

        });

      };



      const TYPE_LABEL = {

        income:    { label: '收入',   cls: 'bg-green-50 text-green-700 border-green-200' },

        expense:   { label: '支出',   cls: 'bg-rose-50 text-rose-700 border-rose-200' },

        advance:   { label: '代墊',   cls: 'bg-cyan-50 text-cyan-700 border-cyan-200' },

        reimburse: { label: '退代墊', cls: 'bg-emerald-50 text-emerald-700 border-emerald-200' },

        transfer:  { label: '移轉',   cls: 'bg-purple-50 text-purple-700 border-purple-200' },

      };



      return (

        <div className="space-y-6 animate-in fade-in duration-300">



          {/* ====================================================

              1. 核心資產狀態 (極致簡化)

             ==================================================== */}

          <div className="grid grid-cols-2 gap-4 md:gap-6">

            <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex flex-col justify-center items-center group hover:shadow-md transition-shadow">

              <span className="text-sm text-slate-400 font-bold uppercase mb-2 tracking-wider flex items-center gap-1.5"><Wallet size={16}/> 社團總資產</span>

              <strong className="text-3xl sm:text-5xl font-black text-slate-800">${netAssets.toLocaleString()}</strong>

            </div>

            <div className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex flex-col justify-center items-center group hover:shadow-md transition-shadow">

              <span className="text-sm text-slate-400 font-bold uppercase mb-2 tracking-wider flex items-center gap-1.5"><TrendingUp size={16}/> 預估年底結餘</span>

              <strong className={`text-3xl sm:text-5xl font-black ${forecastYearEnd >= 0 ? 'text-blue-600' : 'text-rose-600'}`}>

                ${forecastYearEnd.toLocaleString()}

              </strong>

            </div>

          </div>



          {/* ====================================================

              2. 社團帳目收支流水 (極簡版)

             ==================================================== */}

          <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">

            <div className="bg-slate-50 px-5 py-4 border-b border-slate-200 flex justify-between items-center">

              <div className="flex items-center gap-2">

                <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>

                <h3 className="font-bold text-slate-800 text-base">社團帳目收支流水</h3>

              </div>

              {isAdmin && (

                <button onClick={() => setShowAddTx(true)} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-extrabold flex items-center gap-1.5 transition-transform active:scale-95 shadow-sm">

                  <Plus size={14} /> 新增明細

                </button>

              )}

            </div>



            <div className="overflow-x-auto max-h-96">

              <table className="w-full text-sm text-left whitespace-nowrap">

                <thead className="text-slate-500 bg-slate-100/80 border-b sticky top-0 z-10">

                  <tr>

                    <th className="px-5 py-3 text-center w-20">類型</th>
