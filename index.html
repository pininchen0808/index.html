<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>社團管理系統</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React (無 JSX) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>

<body class="bg-slate-50">
  <div id="root"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const e = React.createElement;

    // 🔥 你要自己填
    const firebaseConfig = {
      apiKey: "你的",
      authDomain: "你的",
      projectId: "你的",
      storageBucket: "你的",
      messagingSenderId: "你的",
      appId: "你的"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    signInAnonymously(auth);

    function App() {
      const [transactions, setTransactions] = React.useState([]);
      const [amount, setAmount] = React.useState("");

      React.useEffect(() => {
        const unsub = onSnapshot(
          collection(db, "transactions"),
          snap => {
            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            setTransactions(data);
          }
        );
        return () => unsub();
      }, []);

      async function add() {
        if (!amount) return;
        await addDoc(collection(db, "transactions"), {
          amount: Number(amount),
          date: new Date().toISOString()
        });
        setAmount("");
      }

      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      return e("div", { className: "p-6 max-w-xl mx-auto" },

        e("h1", { className: "text-2xl font-bold mb-4" }, "社團收支"),

        e("div", { className: "flex gap-2 mb-4" },
          e("input", {
            value: amount,
            onChange: ev => setAmount(ev.target.value),
            className: "border p-2 flex-1 rounded",
            placeholder: "金額"
          }),
          e("button", {
            onClick: add,
            className: "bg-indigo-600 text-white px-4 rounded"
          }, "新增")
        ),

        e("ul", {},
          transactions.map(tx =>
            e("li", {
              key: tx.id,
              className: "border-b py-2"
            }, "$" + tx.amount)
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
