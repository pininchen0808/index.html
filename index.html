<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一起大跳社 & 歐豆K社</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 讓瀏覽器可以即時編譯 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 🌟 引入 Firebase -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD9DTPO7obCqmDuwzLzwI_JZixTE4W3EhE",
        authDomain: "gis-club.firebaseapp.com",
        projectId: "gis-club",
        storageBucket: "gis-club.firebasestorage.app",
        messagingSenderId: "384627740491",
        appId: "1:384627740491:web:2727c4fbb8c8cf1ec362ce"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.firebaseDb = db;
      window.firebaseApi = { doc, onSnapshot, setDoc };
      window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 圖示元件 ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const DollarSign = (p) => <Icon {...p} path='<line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' />;
        const Users = (p) => <Icon {...p} path='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' />;
        const FileText = (p) => <Icon {...p} path='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' />;
        const TrendingDown = (p) => <Icon {...p} path='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' />;
        const TrendingUp = (p) => <Icon {...p} path='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' />;
        const Calculator = (p) => <Icon {...p} path='<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>' />;
        const Edit = (p) => <Icon {...p} path='<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' />;
        const Save = (p) => <Icon {...p} path='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>' />;
        const Cloud = (p) => <Icon {...p} path='<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>' />;
        const Plus = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;
        const Trash2 = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' />;
        const ChevronDown = (p) => <Icon {...p} path='<polyline points="6 9 12 15 18 9"></polyline>' />;
        const ChevronUp = (p) => <Icon {...p} path='<polyline points="18 15 12 9 6 15"></polyline>' />;
        const ReceiptIcon = (p) => <Icon {...p} path='<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-8"/><path d="M16 16h-8"/>' />;
        const Wallet = (p) => <Icon {...p} path='<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>' />;
        const Clock = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' />;
        const Briefcase = (p) => <Icon {...p} path='<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' />;
        const UserIcon = (p) => <Icon {...p} path='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' />;
        const Trophy = (p) => <Icon {...p} path='<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>' />;
        const Star = (p) => <Icon {...p} path='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' />;
        const ContactIcon = (p) => <Icon {...p} path='<rect width="16" height="18" x="4" y="3" rx="2" ry="2"/><path d="M9 11h6"/><path d="M9 15h6"/><path d="M12 7v.01"/>' />;
        const ListChecks = (p) => <Icon {...p} path='<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>' />;

        // --- 預設資料生成 ---
        const generateDefaultData = () => {
          const monthsData = [];
          for (let i = 3; i <= 12; i++) {
            if (i === 3) {
              monthsData.push({
                id: 3, name: '3月', 
                daTiao: { purpose: '社團補助金', budget: 2000, items: [
                  { category: '大跳發票', amount: 1000, payer: '品in' },
                  { category: '大跳發票', amount: 92, payer: '廷柔' }
                ]},
                ouDouK: { purpose: '社團補助金', budget: 2000, items: [
                  { category: '歐豆K發票', amount: 1024, payer: '品in' }
                ]}
              });
            } else {
              monthsData.push({ 
                id: i, name: `${i}月`, 
                daTiao: { purpose: '', budget: 0, items: [] },
                ouDouK: { purpose: '', budget: 0, items: [] }
              });
            }
          }

          return {
            finance: {
              expenses: [
                { category: '老師費用', item: 'CaRu課費 第一堂15人', amount: -6000, note: '', isPinYinPaid: false, club: '共用' },
                { category: '老師費用', item: '阿默課費 預計', amount: -27000, note: '3000元*9堂', isPinYinPaid: false, club: '共用' },
                { category: '場地租金', item: '3/11-Sooo dance A教室', amount: -900, note: '代墊', isPinYinPaid: true, club: '大跳社' }
              ],
              income: [
                { category: '課費', item: '預計課費', amount: 23120, note: '9堂10人收280', isReceived: false, club: '共用' },
                { category: '福委補助款', item: '福委固定補助金', amount: 8000, note: '', isReceived: true, club: '共用' }
              ]
            },
            course: {
              columns: [
                { id: 'c1', name: '3/11 基礎養成', memberPrice: 150, nonMemberPrice: 400 }, 
                { id: 'c2', name: '4/14 K-POP', memberPrice: 150, nonMemberPrice: 400 },
                { id: 'c3', name: '5/5 基礎養成', memberPrice: 150, nonMemberPrice: 400 }, 
                { id: 'c4', name: '6/2 K-POP', memberPrice: 150, nonMemberPrice: 400 },
                { id: 'c5', name: '7/7 基礎養成', memberPrice: 150, nonMemberPrice: 400 }, 
                { id: 'c6', name: '8/4 K-POP', memberPrice: 150, nonMemberPrice: 400 },
                { id: 'c7', name: '9/1 基礎養成', memberPrice: 150, nonMemberPrice: 400 }, 
                { id: 'c8', name: '10/6 K-POP', memberPrice: 150, nonMemberPrice: 400 },
                { id: 'c9', name: '11/3 基礎養成', memberPrice: 150, nonMemberPrice: 400 }, 
                { id: 'c10', name: '12/1 K-POP', memberPrice: 150, nonMemberPrice: 400 }
              ],
              members: [
                { id: 'm1', name: '品in', type: '社員', registered: { c1: true, c2: true }, payments: { c1: 150, c2: 280 } },
                { id: 'm2', name: 'Abby', type: '社員', registered: { c1: true, c2: true }, payments: { c1: 150, c2: 280 } },
                { id: 'm3', name: '益蟲', type: '社員', registered: {}, payments: {} },
                { id: 'm4', name: '廷柔', type: '社員', registered: {}, payments: {} },
                { id: 'm5', name: '育綸', type: '社員', registered: {}, payments: {} },
                { id: 'm6', name: '珮綺', type: '社員', registered: {}, payments: {} },
                { id: 'm7', name: '弘霖', type: '社員', registered: {}, payments: {} },
                { id: 'm8', name: 'Yoyo', type: '社員', registered: {}, payments: {} },
                { id: 'm9', name: 'Adele', type: '社員', registered: {}, payments: {} },
                { id: 'm10', name: '佳雯', type: '社員', registered: {}, payments: {} },
                { id: 'm11', name: '冠煒', type: '社員', registered: {}, payments: {} },
                { id: 'm12', name: '葳杉', type: '社員', registered: {}, payments: {} },
                { id: 'm13', name: '彥廷', type: '社員', registered: {}, payments: {} },
                { id: 'm14', name: '敬翰', type: '社員', registered: {}, payments: {} },
                { id: 'm15', name: '冠廷', type: '社員', registered: {}, payments: {} },
                { id: 'm16', name: '小每', type: '社員', registered: {}, payments: {} },
                { id: 'm17', name: '衣淇', type: '社員', registered: {}, payments: {} },
                { id: 'm18', name: 'Amanda', type: '社員', registered: {}, payments: {} },
                { id: 'm19', name: '宣穎', type: '社員', registered: {}, payments: {} },
                { id: 'm20', name: '若瑄', type: '社員', registered: {}, payments: {} },
                { id: 'm21', name: '銘樺', type: '社員', registered: {}, payments: {} },
                { id: 'm22', name: '庭豪', type: '社員', registered: {}, payments: {} },
                { id: 'm23', name: '文彬', type: '社員', registered: {}, payments: {} },
                { id: 'm24', name: '品in朋友', type: '非社員', registered: { c2: true }, payments: { c2: 400 } }
              ]
            },
            invoice: {
              company: { name: '天茂企管顧問有限公司', taxId: '89177254' },
              months: monthsData
            },
            competition: {
              daTiao: { newMembers: 0, activities: 0, posts: [] },
              ouDouK: { newMembers: 0, activities: 0, posts: [] }
            }
          };
        };

        const defaultData = generateDefaultData();

        // --- 元件：財務總表 ---
        const FinanceTab = ({ data, isEditing, setData }) => {
          const totalExpense = data.finance.expenses.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const totalIncome = data.finance.income.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const balance = totalIncome + totalExpense;

          // 計算各大社團單獨的收支
          const daTiaoExpense = data.finance.expenses.filter(i => i.club === '大跳社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const ouDouKExpense = data.finance.expenses.filter(i => i.club === '歐豆K社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          
          const daTiaoIncome = data.finance.income.filter(i => i.club === '大跳社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const ouDouKIncome = data.finance.income.filter(i => i.club === '歐豆K社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          
          const pinYinTotal = Math.abs(data.finance.expenses
            .filter(item => item.isPinYinPaid)
            .reduce((sum, item) => sum + (Number(item.amount) || 0), 0));

          const pendingReceiptTotal = data.finance.income
            .filter(item => !item.isReceived)
            .reduce((sum, item) => sum + (Number(item.amount) || 0), 0);

          const handleChange = (type, index, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.finance[type][index][field] = value;
            setData(newData);
          };

          const addRow = (type) => {
            const newData = JSON.parse(JSON.stringify(data));
            if (type === 'expenses') {
                newData.finance.expenses.push({ category: '', item: '', amount: 0, note: '', isPinYinPaid: false, club: '共用' });
            } else {
                newData.finance.income.push({ category: '', item: '', amount: 0, note: '', isReceived: false, club: '共用' });
            }
            setData(newData);
          };

          const removeRow = (type, index) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.finance[type].splice(index, 1);
            setData(newData);
          };

          const Input = ({ val, field, index, type }) => (
            isEditing ? 
            <input type="text" value={val} onChange={(e) => handleChange(type, index, field, e.target.value)} 
                   className="w-full px-2 py-1 border border-blue-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" /> 
            : <span>{val}</span>
          );

          const NumberInput = ({ val, field, index, type, textClass }) => (
            isEditing ? 
            <input type="number" value={val} onChange={(e) => handleChange(type, index, field, e.target.value)} 
                   className="w-24 px-2 py-1 border border-blue-300 rounded text-right focus:outline-none focus:ring-2 focus:ring-blue-500" /> 
            : <span className={textClass}>{Number(val).toLocaleString()}</span>
          );

          return (
            <div className="space-y-8 animate-in fade-in duration-300">
              {/* 區塊 1：社團營運總覽 */}
              <div>
                <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                  <Briefcase size={22} className="text-blue-600"/> 社團營運帳戶
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3">
                    <div className="flex items-center gap-4">
                      <div className="p-3 bg-red-100 text-red-600 rounded-lg"><TrendingDown size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">總計支出</p><p className="text-2xl font-bold text-slate-800">{totalExpense.toLocaleString()}</p></div>
                    </div>
                    <div className="flex gap-2 text-xs border-t border-slate-100 pt-2 mt-auto">
                      <div className="flex-1 bg-blue-50/80 text-blue-700 px-2 py-1 rounded flex justify-between"><span>大跳社</span><span className="font-semibold text-sm">${daTiaoExpense.toLocaleString()}</span></div>
                      <div className="flex-1 bg-purple-50/80 text-purple-700 px-2 py-1 rounded flex justify-between"><span>歐豆K</span><span className="font-semibold text-sm">${ouDouKExpense.toLocaleString()}</span></div>
                    </div>
                  </div>
                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3">
                    <div className="flex items-center gap-4">
                      <div className="p-3 bg-green-100 text-green-600 rounded-lg"><TrendingUp size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">總計收入</p><p className="text-2xl font-bold text-slate-800">{totalIncome.toLocaleString()}</p></div>
                    </div>
                    <div className="flex gap-2 text-xs border-t border-slate-100 pt-2 mt-auto">
                      <div className="flex-1 bg-blue-50/80 text-blue-700 px-2 py-1 rounded flex justify-between"><span>大跳社</span><span className="font-semibold text-sm">${daTiaoIncome.toLocaleString()}</span></div>
                      <div className="flex-1 bg-purple-50/80 text-purple-700 px-2 py-1 rounded flex justify-between"><span>歐豆K</span><span className="font-semibold text-sm">${ouDouKIncome.toLocaleString()}</span></div>
                    </div>
                  </div>
                  <div className={`p-6 rounded-xl border shadow-sm flex items-center gap-4 ${balance < 0 ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                    <div className={`p-3 rounded-lg ${balance < 0 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}><Calculator size={24} /></div>
                    <div><p className={`text-sm font-medium ${balance < 0 ? 'text-red-600/80' : 'text-green-600/80'}`}>目前結餘</p><p className={`text-2xl font-bold ${balance < 0 ? 'text-red-700' : 'text-green-700'}`}>{balance.toLocaleString()}</p></div>
                  </div>
                </div>
              </div>

              {/* 區塊 2：個人帳務管理 */}
              <div>
                <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                  <UserIcon size={22} className="text-amber-600"/> 個人帳務管理 (對帳專用)
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-white p-6 rounded-xl border border-amber-200 bg-amber-50/30 shadow-sm flex items-center gap-4">
                    <div className="p-3 bg-amber-100 text-amber-600 rounded-lg"><Wallet size={24} /></div>
                    <div><p className="text-sm text-amber-700 font-medium">品in代墊總計 (需回收)</p><p className="text-2xl font-bold text-amber-900">${pinYinTotal.toLocaleString()}</p></div>
                  </div>
                  <div className="bg-white p-6 rounded-xl border border-blue-200 bg-blue-50/30 shadow-sm flex items-center gap-4">
                    <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><Clock size={24} /></div>
                    <div><p className="text-sm text-blue-700 font-medium">待收帳款總計 (尚未入帳)</p><p className="text-2xl font-bold text-blue-900">${pendingReceiptTotal.toLocaleString()}</p></div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 items-start">
                {/* 支出明細表 */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                  <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-red-500"></span>支出明細
                    </h3>
                  </div>
                  <div className="overflow-x-auto p-4 flex-grow">
                    <table className="w-full text-sm text-left">
                      <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                        <tr>
                          <th className="px-4 py-3 w-20">社團</th>
                          <th className="px-4 py-3 w-1/4">類別</th>
                          <th className="px-4 py-3 w-1/3">項目</th>
                          <th className="px-4 py-3 text-right">金額</th>
                          <th className="px-4 py-3 w-20 text-center">品in代墊</th>
                          <th className="px-4 py-3">備註</th>
                          {isEditing && <th className="px-2 py-3 w-10"></th>}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {data.finance.expenses.map((item, idx) => (
                          <tr key={idx} className={`hover:bg-slate-50 transition-colors ${item.isPinYinPaid ? 'bg-amber-50/30' : ''}`}>
                            <td className="px-4 py-2">
                                {isEditing ? (
                                    <select value={item.club || '共用'} onChange={(e) => handleChange('expenses', idx, 'club', e.target.value)} className="w-full px-1 py-1 border border-blue-300 rounded text-xs focus:ring-2 focus:ring-blue-500">
                                        <option value="大跳社">大跳社</option>
                                        <option value="歐豆K社">歐豆K社</option>
                                        <option value="共用">共用</option>
                                    </select>
                                ) : (
                                    <span className={`inline-block px-2 py-1 rounded text-[10px] font-semibold whitespace-nowrap ${item.club === '大跳社' ? 'bg-blue-100 text-blue-700' : item.club === '歐豆K社' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}`}>{item.club || '共用'}</span>
                                )}
                            </td>
                            <td className="px-4 py-2"><Input val={item.category} field="category" index={idx} type="expenses"/></td>
                            <td className="px-4 py-2"><Input val={item.item} field="item" index={idx} type="expenses"/></td>
                            <td className="px-4 py-2 text-right font-medium">
                              <NumberInput val={item.amount} field="amount" index={idx} type="expenses" textClass="text-red-600"/>
                            </td>
                            <td className="px-4 py-2 text-center">
                              <input 
                                type="checkbox" 
                                checked={item.isPinYinPaid || false} 
                                onChange={(e) => handleChange('expenses', idx, 'isPinYinPaid', e.target.checked)} 
                                disabled={!isEditing} 
                                className="w-4 h-4 text-amber-600 rounded focus:ring-amber-500 cursor-pointer disabled:cursor-default" 
                              />
                            </td>
                            <td className="px-4 py-2 text-slate-500 text-xs"><Input val={item.note} field="note" index={idx} type="expenses"/></td>
                            {isEditing && (
                              <td className="px-2 py-2 text-center">
                                <button onClick={() => removeRow('expenses', idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button>
                              </td>
                            )}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {isEditing && (
                      <button onClick={() => addRow('expenses')} className="w-full mt-3 py-2 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded-lg flex justify-center items-center gap-2 transition-colors">
                        <Plus size={16} /> 新增列
                      </button>
                    )}
                  </div>
                </div>

                {/* 收入與補助明細表 */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                  <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-green-500"></span>收入與補助明細
                    </h3>
                  </div>
                  <div className="overflow-x-auto p-4 flex-grow">
                    <table className="w-full text-sm text-left">
                      <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                        <tr>
                          <th className="px-4 py-3 w-20">社團</th>
                          <th className="px-4 py-3 w-1/4">類別</th>
                          <th className="px-4 py-3 w-1/3">項目</th>
                          <th className="px-4 py-3 text-right">金額</th>
                          <th className="px-4 py-3 w-20 text-center">已收款</th>
                          <th className="px-4 py-3">備註</th>
                          {isEditing && <th className="px-2 py-3 w-10"></th>}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {data.finance.income.map((item, idx) => (
                          <tr key={idx} className={`hover:bg-slate-50 transition-colors ${!item.isReceived ? 'bg-blue-50/30' : ''}`}>
                            <td className="px-4 py-2">
                                {isEditing ? (
                                    <select value={item.club || '共用'} onChange={(e) => handleChange('income', idx, 'club', e.target.value)} className="w-full px-1 py-1 border border-blue-300 rounded text-xs focus:ring-2 focus:ring-blue-500">
                                        <option value="大跳社">大跳社</option>
                                        <option value="歐豆K社">歐豆K社</option>
                                        <option value="共用">共用</option>
                                    </select>
                                ) : (
                                    <span className={`inline-block px-2 py-1 rounded text-[10px] font-semibold whitespace-nowrap ${item.club === '大跳社' ? 'bg-blue-100 text-blue-700' : item.club === '歐豆K社' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}`}>{item.club || '共用'}</span>
                                )}
                            </td>
                            <td className="px-4 py-2"><Input val={item.category} field="category" index={idx} type="income"/></td>
                            <td className="px-4 py-2"><Input val={item.item} field="item" index={idx} type="income"/></td>
                            <td className="px-4 py-2 text-right font-medium">
                              <NumberInput val={item.amount} field="amount" index={idx} type="income" textClass="text-green-600"/>
                            </td>
                            <td className="px-4 py-2 text-center">
                              <input 
                                type="checkbox" 
                                checked={item.isReceived || false} 
                                onChange={(e) => handleChange('income', idx, 'isReceived', e.target.checked)} 
                                disabled={!isEditing} 
                                className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer disabled:cursor-default" 
                              />
                            </td>
                            <td className="px-4 py-2 text-slate-500 text-xs"><Input val={item.note} field="note" index={idx} type="income"/></td>
                            {isEditing && (
                              <td className="px-2 py-2 text-center">
                                <button onClick={() => removeRow('income', idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button>
                              </td>
                            )}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {isEditing && (
                      <button onClick={() => addRow('income')} className="w-full mt-3 py-2 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded-lg flex justify-center items-center gap-2 transition-colors">
                        <Plus size={16} /> 新增列
                      </button>
                    )}
                  </div>
                </div>

              </div>
            </div>
          );
        };

        // --- 元件：社員名單 (中央資料庫) ---
        const MemberListTab = ({ data, isEditing, setData }) => {
          const handleMemberChange = (idx, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.course.members[idx][field] = value;
            setData(newData);
          };

          const addMember = () => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.course.members.push({ 
                id: `m_${Date.now()}`, 
                name: '', 
                type: '社員', 
                registered: {}, 
                payments: {} 
            });
            setData(newData);
          };

          const removeMember = (idx) => {
            if(!confirm("確定要刪除這位成員嗎？相關報名與繳費紀錄將會一併移除！")) return;
            const newData = JSON.parse(JSON.stringify(data));
            newData.course.members.splice(idx, 1);
            setData(newData);
          };

          return (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in duration-300">
              <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h3 className="font-bold text-slate-800 flex items-center gap-2"><ContactIcon size={20} className="text-blue-600" /> 社團成員名冊</h3>
                {isEditing && (
                  <button onClick={addMember} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded flex items-center gap-1 text-sm shadow-sm transition-colors">
                    <Plus size={16} /> 新增成員
                  </button>
                )}
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="text-xs text-slate-500 bg-slate-100 border-b border-slate-200">
                    <tr>
                      <th className="px-6 py-4 font-semibold w-16 text-center">#</th>
                      <th className="px-6 py-4 font-semibold w-32">姓名</th>
                      <th className="px-6 py-4 font-semibold w-32">身分</th>
                      <th className="px-6 py-4 font-semibold w-32 text-right">累計繳交費用</th>
                      <th className="px-6 py-4 font-semibold">課程報名紀錄</th>
                      {isEditing && <th className="px-6 py-4 text-center w-20">操作</th>}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {data.course.members.map((member, idx) => {
                      const totalPaid = Object.values(member.payments || {}).reduce((sum, val) => sum + (Number(val) || 0), 0);
                      const enrolledCourses = data.course.columns.filter(c => member.registered && member.registered[c.id]);

                      return (
                        <tr key={member.id || idx} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 py-4 text-center text-slate-400">{idx + 1}</td>
                          <td className="px-6 py-4">
                            {isEditing ? <input type="text" value={member.name} onChange={(e) => handleMemberChange(idx, 'name', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" placeholder="姓名" /> : <span className="font-medium text-slate-800">{member.name || '-'}</span>}
                          </td>
                          <td className="px-6 py-4">
                            {isEditing ? (
                              <select value={member.type || '社員'} onChange={(e) => handleMemberChange(idx, 'type', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                                <option value="社員">社員</option>
                                <option value="非社員">非社員</option>
                              </select>
                            ) : (
                              <span className={`px-2 py-1 rounded text-xs font-semibold ${member.type === '非社員' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{member.type || '社員'}</span>
                            )}
                          </td>
                          <td className="px-6 py-4 text-right font-bold text-blue-700">
                            ${totalPaid.toLocaleString()}
                          </td>
                          <td className="px-6 py-4">
                            <div className="flex flex-wrap gap-2">
                                {enrolledCourses.length > 0 ? enrolledCourses.map(c => (
                                    <span key={c.id} className="px-2.5 py-1 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-md text-xs font-medium">
                                        {c.name}
                                    </span>
                                )) : <span className="text-slate-400 text-xs italic">尚未報名任何課程</span>}
                            </div>
                          </td>
                          {isEditing && (
                            <td className="px-6 py-4 text-center">
                              <button onClick={() => removeMember(idx)} className="text-red-400 hover:text-red-600 p-1.5 rounded hover:bg-red-50 transition-colors"><Trash2 size={18}/></button>
                            </td>
                          )}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                {data.course.members.length === 0 && (
                    <div className="p-8 text-center text-slate-400">目前尚無任何成員，請點擊上方按鈕新增。</div>
                )}
              </div>
            </div>
          );
        };

        // --- 元件：課程報名 (矩陣) ---
        const RegistrationTab = ({ data, isEditing, setData }) => {
          const handleColumnPriceChange = (colId, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            const colIndex = newData.course.columns.findIndex(c => c.id === colId);
            if (colIndex > -1) {
              newData.course.columns[colIndex][field] = Number(value);
              setData(newData);
            }
          };

          const handleRegChange = (idx, colId, checked) => {
            const newData = JSON.parse(JSON.stringify(data));
            const member = newData.course.members[idx];
            const col = newData.course.columns.find(c => c.id === colId);
            
            if (!member.registered) member.registered = {};
            if (!member.payments) member.payments = {};

            member.registered[colId] = checked;
            
            // 智慧防呆：打勾時自動帶入對應欄位設定的預設金額
            if (checked && (!member.payments[colId] || member.payments[colId] === 0)) {
                member.payments[colId] = member.type === '社員' ? (col.memberPrice || 0) : (col.nonMemberPrice || 0);
            } else if (!checked) {
                // 取消打勾時自動將費用歸零
                member.payments[colId] = 0;
            }
            setData(newData);
          };

          const handlePaymentChange = (idx, colId, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            if (!newData.course.members[idx].payments) newData.course.members[idx].payments = {};
            newData.course.members[idx].payments[colId] = Number(value);
            setData(newData);
          };

          // 計算各欄位總收費
          const totals = {};
          data.course.columns.forEach(col => {
            totals[col.id] = data.course.members.reduce((sum, m) => sum + (Number(m.payments?.[col.id]) || 0), 0);
          });

          return (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in duration-300">
              <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h3 className="font-bold text-slate-800 flex items-center gap-2"><ListChecks size={20} className="text-blue-600" /> 課程報名與出缺勤紀錄</h3>
                {isEditing && <span className="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-medium">提示：打勾報名時，系統會自動帶入該課程設定的預設費用。</span>}
              </div>
              <div className="overflow-x-auto max-h-[75vh]">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="text-xs text-slate-500 bg-slate-100 border-b border-slate-200 sticky top-0 z-20">
                    <tr>
                      <th className="px-4 py-4 font-semibold sticky left-0 bg-slate-100 z-30 border-r border-slate-200 w-12 text-center">#</th>
                      <th className="px-4 py-4 font-semibold sticky left-[48px] bg-slate-100 z-30 border-r border-slate-200 w-24">名單</th>
                      <th className="px-4 py-4 font-semibold sticky left-[144px] bg-slate-100 z-30 border-r border-slate-200 w-20 text-center">身分</th>
                      {data.course.columns.map(col => (
                        <th key={col.id} className="px-2 py-2 font-semibold text-center bg-blue-50 border-r border-slate-200 min-w-[90px] align-top">
                          <div className="mb-1">{col.name.split(' ').map((line, i) => <div key={i}>{line}</div>)}</div>
                          {isEditing ? (
                            <div className="flex flex-col gap-1 mt-2 text-[10px] font-normal border-t border-blue-200 pt-1.5 pb-1">
                              <div className="flex items-center justify-center gap-1">
                                <span className="text-slate-500 w-6 text-right">社$</span>
                                <input type="number" value={col.memberPrice ?? ''} onChange={(e) => handleColumnPriceChange(col.id, 'memberPrice', e.target.value)} className="w-12 px-1 py-0.5 border border-blue-300 rounded text-center focus:ring-1 focus:ring-blue-500 outline-none" />
                              </div>
                              <div className="flex items-center justify-center gap-1">
                                <span className="text-amber-600 w-6 text-right">非$</span>
                                <input type="number" value={col.nonMemberPrice ?? ''} onChange={(e) => handleColumnPriceChange(col.id, 'nonMemberPrice', e.target.value)} className="w-12 px-1 py-0.5 border border-blue-300 rounded text-center focus:ring-1 focus:ring-blue-500 outline-none" />
                              </div>
                            </div>
                          ) : (
                            <div className="text-[10px] text-slate-500 mt-1 font-normal bg-white/50 rounded py-0.5 px-1 shadow-sm border border-slate-100 inline-block">
                              社${col.memberPrice || 0} / 非${col.nonMemberPrice || 0}
                            </div>
                          )}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {data.course.members.map((member, idx) => (
                      <tr key={member.id || idx} className="hover:bg-slate-50 transition-colors">
                        <td className="px-4 py-3 text-center text-slate-400 sticky left-0 bg-white group-hover:bg-slate-50 border-r border-slate-100">{idx + 1}</td>
                        <td className="px-4 py-3 sticky left-[48px] bg-white group-hover:bg-slate-50 border-r border-slate-100 font-medium text-slate-800">
                           {member.name || '-'}
                        </td>
                        <td className="px-4 py-3 sticky left-[144px] bg-white group-hover:bg-slate-50 border-r border-slate-100 text-center">
                           <span className={`px-2 py-1 rounded text-[10px] font-semibold tracking-wider ${member.type === '非社員' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{member.type || '社員'}</span>
                        </td>
                        {data.course.columns.map(col => {
                          const isReg = member.registered?.[col.id] || false;
                          const amount = member.payments?.[col.id] || 0;
                          
                          return (
                            <td key={col.id} className="px-2 py-2 text-center border-r border-slate-100 align-middle">
                                {isEditing ? (
                                    <div className="flex flex-col items-center justify-center gap-1.5">
                                        <label className="flex items-center gap-1 cursor-pointer hover:bg-slate-100 px-2 py-1 rounded">
                                            <input type="checkbox" checked={isReg} onChange={(e) => handleRegChange(idx, col.id, e.target.checked)} className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer" />
                                            <span className="text-xs font-medium text-slate-600 select-none">報名</span>
                                        </label>
                                        {isReg && (
                                            <div className="flex items-center gap-1 bg-white border border-blue-200 rounded px-1 shadow-sm">
                                                <span className="text-xs text-slate-400 font-medium">$</span>
                                                <input type="number" value={amount} onChange={(e) => handlePaymentChange(idx, col.id, e.target.value)} className="w-12 py-0.5 text-xs text-center focus:outline-none" />
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex items-center justify-center h-full">
                                        {isReg ? (
                                            amount > 0 
                                            ? <span className="inline-flex items-center gap-1 px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold shadow-sm"><span className="text-[10px]">✓</span>${amount}</span>
                                            : <span className="inline-flex items-center gap-1 px-2 py-1 bg-amber-100 text-amber-700 rounded text-xs font-bold shadow-sm"><span className="text-[10px]">✓</span>未繳</span>
                                        ) : (
                                            <span className="text-slate-300">-</span>
                                        )}
                                    </div>
                                )}
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                  <tfoot className="bg-slate-50 border-t-2 border-slate-200 font-semibold text-slate-800 sticky bottom-0 z-20">
                    <tr>
                      <td colSpan="3" className="px-4 py-4 text-right sticky left-0 bg-slate-50 border-r border-slate-200 shadow-[2px_0_5px_rgba(0,0,0,0.02)]">總計收費：</td>
                      {data.course.columns.map(col => (
                        <td key={`total-${col.id}`} className="px-4 py-4 text-center text-blue-700 border-r border-slate-200">${totals[col.id].toLocaleString()}</td>
                      ))}
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          );
        };

        // --- 元件：經費核銷 (雙社團版) ---
        const InvoiceTab = ({ data, isEditing, setData }) => {
          const [expandedMonths, setExpandedMonths] = useState({ 4: true });

          const toggleMonth = (monthId) => {
            setExpandedMonths(prev => ({ ...prev, [monthId]: !prev[monthId] }));
          };

          const handleMonthInfoChange = (monthIdx, clubKey, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey][field] = value;
            setData(newData);
          };

          const handleItemChange = (monthIdx, clubKey, itemIdx, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey].items[itemIdx][field] = value;
            setData(newData);
          };

          const addItem = (monthIdx, clubKey) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey].items.push({ category: '', amount: 0, payer: '' });
            setData(newData);
          };

          const removeItem = (monthIdx, clubKey, itemIdx) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey].items.splice(itemIdx, 1);
            setData(newData);
          };

          const renderClubInvoicePanel = (monthData, monthIdx, clubKey, clubName, headerColors) => {
              const clubInfo = monthData[clubKey];
              if (!clubInfo) return null;

              const items = clubInfo.items || [];
              const totalAmount = items.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
              const budget = Number(clubInfo.budget) || 0;
              const shortfall = budget - totalAmount;
              const hasItems = items.length > 0;

              return (
                  <div className="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm flex flex-col">
                      <div className={`px-4 py-3 flex justify-between items-center text-white ${headerColors}`}>
                          <span className="font-bold flex items-center gap-2"><Star size={16}/> {clubName}</span>
                      </div>
                      
                      <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                          {isEditing ? (
                              <div className="flex flex-col xl:flex-row gap-3 xl:items-center">
                                  <input type="text" placeholder="輸入補助目的 (如:社團博覽會)" value={clubInfo.purpose || ''} onChange={(e) => handleMonthInfoChange(monthIdx, clubKey, 'purpose', e.target.value)} className="flex-1 px-3 py-1.5 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-500" />
                                  <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-500 whitespace-nowrap">補助額度:</span>
                                    <input type="number" placeholder="金額" value={clubInfo.budget || 0} onChange={(e) => handleMonthInfoChange(monthIdx, clubKey, 'budget', e.target.value)} className="w-28 px-3 py-1.5 border border-blue-300 rounded text-sm text-right focus:ring-2 focus:ring-blue-500" />
                                  </div>
                              </div>
                          ) : (
                              <div className="flex justify-between items-center text-sm">
                                  <span className="text-slate-700 font-medium">{clubInfo.purpose || '尚未設定目的'}</span>
                                  <span className="text-slate-500">補助額度: <strong className="text-slate-800 text-base">${budget.toLocaleString()}</strong></span>
                              </div>
                          )}
                      </div>

                      <div className="flex-1 overflow-x-auto">
                          {(hasItems || isEditing) ? (
                              <table className="w-full text-sm text-left">
                                  <thead className="text-xs text-slate-500 bg-slate-50 border-b">
                                      <tr>
                                          <th className="px-4 py-2 w-10 text-center">#</th>
                                          <th className="px-4 py-2">項目 / 備註</th>
                                          <th className="px-4 py-2 text-right">金額</th>
                                          <th className="px-4 py-2 w-24">提供人</th>
                                          {isEditing && <th className="px-2 py-2 w-10 text-center">操作</th>}
                                      </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                      {items.map((item, itemIdx) => (
                                          <tr key={itemIdx} className="hover:bg-slate-50">
                                              <td className="px-4 py-2 text-center text-slate-400">{itemIdx + 1}</td>
                                              <td className="px-4 py-2">
                                                  {isEditing ? <input type="text" placeholder="如: 道具、發票號碼" value={item.category} onChange={(e) => handleItemChange(monthIdx, clubKey, itemIdx, 'category', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" /> : item.category}
                                              </td>
                                              <td className="px-4 py-2 text-right font-medium text-slate-800">
                                                  {isEditing ? <input type="number" value={item.amount} onChange={(e) => handleItemChange(monthIdx, clubKey, itemIdx, 'amount', e.target.value)} className="w-20 px-2 py-1 border border-blue-300 rounded text-right focus:ring-2 focus:ring-blue-500" /> : `$${Number(item.amount).toLocaleString()}`}
                                              </td>
                                              <td className="px-4 py-2 text-slate-600">
                                                  {isEditing ? <input type="text" value={item.payer} onChange={(e) => handleItemChange(monthIdx, clubKey, itemIdx, 'payer', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" /> : item.payer}
                                              </td>
                                              {isEditing && (
                                                  <td className="px-2 py-2 text-center">
                                                      <button onClick={() => removeItem(monthIdx, clubKey, itemIdx)} className="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50"><Trash2 size={16}/></button>
                                                  </td>
                                              )}
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          ) : (
                              <div className="py-8 text-center text-slate-400">
                                  <p className="text-sm">尚未有核銷紀錄</p>
                              </div>
                          )}
                      </div>

                      {isEditing && (
                          <div className="px-4 py-2 border-t border-slate-100 bg-slate-50">
                              <button onClick={() => addItem(monthIdx, clubKey)} className="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center gap-1 transition-colors">
                                  <Plus size={16} /> 新增明細
                              </button>
                          </div>
                      )}

                      <div className="bg-slate-100 flex justify-between items-center text-sm border-t border-slate-200 mt-auto">
                          <div className="px-4 py-3 flex-1 flex justify-between items-center">
                              <span className="font-bold text-slate-500 tracking-wider">總計花費</span>
                              <span className="font-bold text-lg text-slate-900">${totalAmount.toLocaleString()}</span>
                          </div>
                          <div className={`px-4 py-3 flex-1 flex justify-between items-center border-l border-white/50 ${shortfall >= 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                              <span className="font-bold tracking-wider">{shortfall >= 0 ? '餘額' : '超額 (缺)'}</span>
                              <span className="font-bold text-lg">{shortfall.toLocaleString()}</span>
                          </div>
                      </div>
                  </div>
              );
          };

          return (
            <div className="space-y-6 pb-20 animate-in fade-in duration-300">
              <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-6 text-white shadow-md flex items-center justify-between">
                <div>
                  <h2 className="text-2xl font-bold mb-2">抬頭：{data.invoice.company.name}</h2>
                  <p className="text-blue-100 text-lg flex items-center gap-2">
                    <ReceiptIcon size={20} />統編：<span className="font-mono bg-white/20 px-2 py-1 rounded">{data.invoice.company.taxId}</span>
                  </p>
                </div>
                <div className="hidden md:block opacity-20"><FileText size={80} /></div>
              </div>

              <div className="space-y-4">
                {data.invoice.months.map((monthData, monthIdx) => {
                  const isExpanded = expandedMonths[monthData.id] || false;
                  
                  const daTiaoTotal = (monthData.daTiao?.items || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                  const ouDouKTotal = (monthData.ouDouK?.items || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                  const combinedTotal = daTiaoTotal + ouDouKTotal;
                  const hasItems = combinedTotal > 0;

                  return (
                    <div key={monthData.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-300">
                      <div 
                        onClick={() => toggleMonth(monthData.id)}
                        className={`px-6 py-4 flex flex-wrap items-center justify-between cursor-pointer hover:bg-slate-50 select-none ${isExpanded ? 'bg-blue-50/50 border-b border-blue-200' : ''}`}
                      >
                        <div className="flex items-center gap-4">
                          <h3 className="font-bold text-xl text-blue-900 w-16">{monthData.name}</h3>
                          {!isExpanded && (
                            <span className="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
                              雙社團獨立核銷區塊
                            </span>
                          )}
                        </div>

                        <div className="flex items-center gap-6 mt-2 md:mt-0">
                          {!isExpanded && hasItems && (
                            <div className="text-sm text-slate-500">
                              整月合計核銷: <strong className="text-slate-800">${combinedTotal.toLocaleString()}</strong>
                            </div>
                          )}
                          <div className="text-slate-400">
                            {isExpanded ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                          </div>
                        </div>
                      </div>

                      {isExpanded && (
                        <div className="p-4 lg:p-6 bg-slate-50/50 animate-in slide-in-from-top-2 duration-200">
                          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                              {renderClubInvoicePanel(monthData, monthIdx, 'daTiao', '一起大跳社', 'bg-gradient-to-r from-blue-600 to-blue-700')}
                              {renderClubInvoicePanel(monthData, monthIdx, 'ouDouK', '歐豆K社', 'bg-gradient-to-r from-purple-600 to-purple-700')}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        };

        // --- 元件：積分競賽統計 ---
        const CompetitionTab = ({ data, isEditing, setData }) => {
          
          const getNewMemberScore = (count) => {
              if (count >= 11) return 4;
              if (count >= 7) return 3;
              if (count >= 4) return 2;
              if (count >= 1) return 1;
              return 0;
          };
          const getActivityScore = (count) => {
              if (count >= 7) return 4;
              if (count >= 5) return 3;
              if (count >= 3) return 2;
              if (count >= 1) return 1;
              return 0;
          };
          const getPostScore = (count) => {
              if (count >= 16) return 4;
              if (count >= 11) return 3;
              if (count >= 6) return 2;
              if (count >= 1) return 1;
              return 0;
          };

          const handleCountChange = (club, field, value) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club][field] = Number(value);
              setData(newData);
          };

          const addPost = (club) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club].posts.push({ date: '', title: '' });
              setData(newData);
          };

          const removePost = (club, idx) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club].posts.splice(idx, 1);
              setData(newData);
          };

          const handlePostChange = (club, idx, field, value) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club].posts[idx][field] = value;
              setData(newData);
          };

          const renderClubPanel = (clubKey, clubName, headerColor, iconColor) => {
              const clubData = data.competition[clubKey];
              const membersCount = clubData.newMembers || 0;
              const activitiesCount = clubData.activities || 0;
              const postsCount = clubData.posts ? clubData.posts.length : 0;
              
              const pMembers = getNewMemberScore(membersCount);
              const pActivities = getActivityScore(activitiesCount);
              const pPosts = getPostScore(postsCount);
              const totalScore = pMembers + pActivities + pPosts;

              return (
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                      <div className={`px-6 py-4 border-b flex justify-between items-center text-white ${headerColor}`}>
                          <h3 className="font-bold text-lg flex items-center gap-2">
                              <Star size={20} className="fill-current text-white/80" /> {clubName}
                          </h3>
                          <div className="bg-white/20 px-3 py-1 rounded-full text-sm font-semibold tracking-wide">
                              總積分: {totalScore}
                          </div>
                      </div>

                      <div className="p-6 space-y-6">
                          <div className="grid grid-cols-2 gap-4">
                              <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 flex flex-col justify-between">
                                  <div className="text-sm text-slate-500 font-medium mb-2">新增社團成員數</div>
                                  <div className="flex justify-between items-end">
                                      {isEditing ? (
                                          <input type="number" min="0" value={membersCount} onChange={(e) => handleCountChange(clubKey, 'newMembers', e.target.value)} className="w-16 px-2 py-1 border border-blue-300 rounded text-center focus:ring-2 focus:ring-blue-500" />
                                      ) : (
                                          <span className="text-2xl font-bold text-slate-800">{membersCount}<span className="text-sm font-normal text-slate-500 ml-1">人</span></span>
                                      )}
                                      <span className={`text-lg font-bold ${pMembers > 0 ? iconColor : 'text-slate-300'}`}>+{pMembers} 積分</span>
                                  </div>
                              </div>
                              <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 flex flex-col justify-between">
                                  <div className="text-sm text-slate-500 font-medium mb-2">辦理活動次數</div>
                                  <div className="flex justify-between items-end">
                                      {isEditing ? (
                                          <input type="number" min="0" value={activitiesCount} onChange={(e) => handleCountChange(clubKey, 'activities', e.target.value)} className="w-16 px-2 py-1 border border-blue-300 rounded text-center focus:ring-2 focus:ring-blue-500" />
                                      ) : (
                                          <span className="text-2xl font-bold text-slate-800">{activitiesCount}<span className="text-sm font-normal text-slate-500 ml-1">次</span></span>
                                      )}
                                      <span className={`text-lg font-bold ${pActivities > 0 ? iconColor : 'text-slate-300'}`}>+{pActivities} 積分</span>
                                  </div>
                              </div>
                          </div>

                          <div>
                              <div className="flex justify-between items-center mb-3">
                                  <div className="flex items-center gap-2">
                                    <h4 className="font-bold text-slate-700">平台發文日誌</h4>
                                    <span className="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">共 {postsCount} 篇</span>
                                  </div>
                                  <span className={`text-lg font-bold ${pPosts > 0 ? iconColor : 'text-slate-300'}`}>+{pPosts} 積分</span>
                              </div>
                              
                              <div className="border border-slate-200 rounded-lg overflow-hidden">
                                  <table className="w-full text-sm text-left">
                                      <thead className="text-xs text-slate-500 bg-slate-50 border-b">
                                          <tr>
                                              <th className="px-4 py-2 w-10 text-center">#</th>
                                              <th className="px-4 py-2 w-32">發文日期</th>
                                              <th className="px-4 py-2">貼文主題 / 備註</th>
                                              {isEditing && <th className="px-2 py-2 w-10"></th>}
                                          </tr>
                                      </thead>
                                      <tbody className="divide-y divide-slate-100">
                                          {clubData.posts && clubData.posts.map((post, idx) => (
                                              <tr key={idx} className="hover:bg-slate-50">
                                                  <td className="px-4 py-2 text-center text-slate-400">{idx + 1}</td>
                                                  <td className="px-4 py-2">
                                                      {isEditing ? <input type="date" value={post.date} onChange={(e) => handlePostChange(clubKey, idx, 'date', e.target.value)} className="w-full px-1 py-1 border rounded" /> : post.date}
                                                  </td>
                                                  <td className="px-4 py-2">
                                                      {isEditing ? <input type="text" placeholder="輸入主題" value={post.title} onChange={(e) => handlePostChange(clubKey, idx, 'title', e.target.value)} className="w-full px-2 py-1 border rounded" /> : post.title}
                                                  </td>
                                                  {isEditing && (
                                                      <td className="px-2 py-2 text-center">
                                                          <button onClick={() => removePost(clubKey, idx)} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={16}/></button>
                                                      </td>
                                                  )}
                                              </tr>
                                          ))}
                                          {(!clubData.posts || clubData.posts.length === 0) && !isEditing && (
                                              <tr><td colSpan="4" className="px-4 py-6 text-center text-slate-400">尚未新增任何發文紀錄</td></tr>
                                          )}
                                      </tbody>
                                  </table>
                                  {isEditing && (
                                      <div className="p-2 bg-slate-50 border-t border-slate-100">
                                          <button onClick={() => addPost(clubKey)} className="w-full py-1.5 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded text-sm flex justify-center items-center gap-1 transition-colors">
                                              <Plus size={16} /> 新增發文紀錄
                                          </button>
                                      </div>
                                  )}
                              </div>
                          </div>
                      </div>
                  </div>
              );
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-300">
              {/* 兩社團數據對比 (移至上方) */}
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {renderClubPanel('daTiao', '一起大跳社', 'bg-gradient-to-r from-blue-600 to-blue-700', 'text-blue-600')}
                {renderClubPanel('ouDouK', '歐豆K社', 'bg-gradient-to-r from-purple-600 to-purple-700', 'text-purple-600')}
              </div>

              {/* 規則面板 (移至下方，改為明亮乾淨的主題) */}
              <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm mt-6">
                <div className="flex items-center gap-3 mb-4">
                  <Trophy size={28} className="text-amber-500" />
                  <h2 className="text-2xl font-bold text-slate-800">積分競賽規則</h2>
                </div>
                
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6">
                  <p className="font-bold text-amber-800 flex flex-wrap gap-6 text-lg justify-center md:justify-start">
                    <span>🥇 第一名: 獎金 5,000 元</span>
                    <span>🥈 第二名: 獎金 3,000 元</span>
                    <span>🥉 第三名: 獎金 2,000 元</span>
                  </p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-sm">
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                    <h4 className="font-bold text-blue-700 mb-2 flex items-center gap-2"><UserIcon size={16}/> 新增社團成員數量</h4>
                    <p className="text-slate-500 mb-3 text-xs">新成員加入必須於首次參與活動時，於平台介紹新成員。</p>
                    <ul className="space-y-1 text-slate-600">
                      <li>• 1~3人：<span className="text-slate-800 font-bold">1 分</span></li>
                      <li>• 4~6人：<span className="text-slate-800 font-bold">2 分</span></li>
                      <li>• 7~10人：<span className="text-slate-800 font-bold">3 分</span></li>
                      <li>• 11人以上：<span className="text-slate-800 font-bold">4 分</span></li>
                    </ul>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                    <h4 className="font-bold text-green-700 mb-2 flex items-center gap-2"><Briefcase size={16}/> 辦理活動次數</h4>
                    <p className="text-slate-500 mb-3 text-xs">紀錄主辦或參與活動，需於活動後發表含照片貼文。</p>
                    <ul className="space-y-1 text-slate-600">
                      <li>• 1~2次：<span className="text-slate-800 font-bold">1 分</span></li>
                      <li>• 3~4次：<span className="text-slate-800 font-bold">2 分</span></li>
                      <li>• 5~6次：<span className="text-slate-800 font-bold">3 分</span></li>
                      <li>• 7次以上：<span className="text-slate-800 font-bold">4 分</span></li>
                    </ul>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                    <h4 className="font-bold text-purple-700 mb-2 flex items-center gap-2"><FileText size={16}/> 平台發文</h4>
                    <p className="text-slate-500 mb-3 text-xs">發布於社群，含相關照片附件且字數達100字，內容不限活動。</p>
                    <ul className="space-y-1 text-slate-600">
                      <li>• 1~5篇：<span className="text-slate-800 font-bold">1 分</span></li>
                      <li>• 6~10篇：<span className="text-slate-800 font-bold">2 分</span></li>
                      <li>• 11~15篇：<span className="text-slate-800 font-bold">3 分</span></li>
                      <li>• 16篇以上：<span className="text-slate-800 font-bold">4 分</span></li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const TabButton = ({ active, icon: Icon, label, onClick }) => (
          <button
            onClick={onClick}
            className={`flex items-center gap-2 px-6 py-4 font-medium transition-colors border-b-2 whitespace-nowrap ${
              active ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'
            }`}
          >
            <Icon size={18} /> {label}
          </button>
        );

        // --- 主應用程式 ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('finance');
          const [data, setData] = useState(null);
          const [isEditing, setIsEditing] = useState(false);
          const [isSaving, setIsSaving] = useState(false);

          useEffect(() => {
            const connectFirebase = () => {
              const { doc, onSnapshot, setDoc } = window.firebaseApi;
              const db = window.firebaseDb;
              const docRef = doc(db, "clubApp", "mainData");

              const unsubscribe = onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                  let serverData = snap.data();
                  let needsUpdate = false;
                  let mergedData = JSON.parse(JSON.stringify(serverData));

                  // 1. 自動修復：升級至雙社團核銷明細格式
                  if (mergedData.invoice?.months && mergedData.invoice.months.length > 0 && mergedData.invoice.months[0].items !== undefined) {
                      mergedData.invoice.months = mergedData.invoice.months.map(m => {
                          const daTiaoItems = (m.items || []).filter(i => !String(i.category).includes('歐豆'));
                          const ouDouKItems = (m.items || []).filter(i => String(i.category).includes('歐豆'));
                          return {
                              id: m.id,
                              name: m.name,
                              daTiao: { purpose: m.purpose || '', budget: m.budget || 0, items: daTiaoItems },
                              ouDouK: { purpose: m.purpose || '', budget: m.budget || 0, items: ouDouKItems }
                          };
                      });
                      needsUpdate = true;
                  }

                  // 2. 自動修復：社團成員結構更新 (新增 registered 與 payments 物件)
                  if (mergedData.course && mergedData.course.members) {
                      // 新增：自動為舊的課程欄位補上預設的社員/非社員價格
                      if (mergedData.course.columns) {
                          mergedData.course.columns.forEach(col => {
                              if (col.memberPrice === undefined || col.nonMemberPrice === undefined) {
                                  col.memberPrice = 150;
                                  col.nonMemberPrice = 400;
                                  needsUpdate = true;
                              }
                          });
                      }

                      mergedData.course.members = mergedData.course.members.map((m, idx) => {
                          if (m.registered === undefined || m.payments === undefined) {
                              needsUpdate = true;
                              const newM = {
                                  id: m.id || `m_${Date.now()}_${idx}`,
                                  name: m.name,
                                  type: m.type || '社員',
                                  registered: {},
                                  payments: {}
                              };
                              if (mergedData.course.columns) {
                                  mergedData.course.columns.forEach(col => {
                                      if (m[col.id] !== undefined) {
                                          const amount = Number(m[col.id]) || 0;
                                          if (amount > 0) {
                                              newM.registered[col.id] = true;
                                              newM.payments[col.id] = amount;
                                          }
                                      }
                                  });
                              }
                              return newM;
                          }
                          return m;
                      });
                  }

                  // 3. 自動修復：缺乏競技統計
                  if (!mergedData.competition) {
                      const defaultD = generateDefaultData();
                      mergedData.competition = defaultD.competition;
                      needsUpdate = true;
                  }

                  // 3.5 自動修復：名稱更新 (品印 -> 品in) 以防舊資料不匹配
                  if (mergedData.course?.members) {
                      mergedData.course.members.forEach(m => {
                          if (m.name === '品印') { m.name = '品in'; needsUpdate = true; }
                          if (m.name === '品印朋友') { m.name = '品in朋友'; needsUpdate = true; }
                      });
                  }
                  if (mergedData.invoice?.months) {
                      mergedData.invoice.months.forEach(m => {
                          ['daTiao', 'ouDouK'].forEach(club => {
                              if (m[club]?.items) {
                                  m[club].items.forEach(item => {
                                      if (item.payer === '品印') { item.payer = '品in'; needsUpdate = true; }
                                  });
                              }
                          });
                      });
                  }

                  // 4. 自動補齊完整的 23 人社團名單
                  const fullMemberNames = ["品in", "Abby", "益蟲", "廷柔", "育綸", "珮綺", "弘霖", "Yoyo", "Adele", "佳雯", "冠煒", "葳杉", "彥廷", "敬翰", "冠廷", "小每", "衣淇", "Amanda", "宣穎", "若瑄", "銘樺", "庭豪", "文彬", "品in朋友"];
                  if (mergedData.course && mergedData.course.members) {
                      const existingNames = mergedData.course.members.map(m => m.name);
                      fullMemberNames.forEach((name, idx) => {
                          if (!existingNames.includes(name)) {
                              mergedData.course.members.push({
                                  id: `m_auto_${Date.now()}_${idx}`,
                                  name: name,
                                  type: name === '品印朋友' ? '非社員' : '社員',
                                  registered: {},
                                  payments: {}
                              });
                              needsUpdate = true;
                          }
                      });
                  }

                  // 5. 自動修復：財務明細新增社團歸屬欄位
                  if (mergedData.finance) {
                      ['expenses', 'income'].forEach(type => {
                          if (mergedData.finance[type]) {
                              mergedData.finance[type].forEach(item => {
                                  if (!item.club) {
                                      item.club = '共用';
                                      needsUpdate = true;
                                  }
                              });
                          }
                      });
                  }

                  if (needsUpdate) {
                      setDoc(docRef, mergedData);
                  }
                  setData(mergedData);
                } else {
                  setDoc(docRef, defaultData);
                  setData(defaultData);
                }
              });
              return () => unsubscribe();
            };

            if (window.firebaseDb) {
              connectFirebase();
            } else {
              window.addEventListener('firebase-ready', connectFirebase);
              return () => window.removeEventListener('firebase-ready', connectFirebase);
            }
          }, []);

          const handleSave = async () => {
            setIsSaving(true);
            try {
              const { doc, setDoc } = window.firebaseApi;
              await setDoc(doc(window.firebaseDb, "clubApp", "mainData"), data);
              setIsEditing(false);
            } catch (error) {
              alert("儲存失敗！錯誤訊息: " + error.message);
            }
            setIsSaving(false);
          };

          if (!data) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-500">
                <Cloud size={48} className="animate-pulse text-blue-500 mb-4" />
                <p>正在連線至 Firebase 資料庫...</p>
              </div>
            );
          }

          return (
