<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026 社團記帳系統</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React + Babel (保留 JSX) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ✅ Firebase compat（關鍵） -->
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>

  <style>
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>

<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ========= 🔥 Firebase 設定（自己填） =========
    const firebaseConfig = {
      apiKey: "你的",
      authDomain: "你的",
      projectId: "你的",
      storageBucket: "你的",
      messagingSenderId: "你的",
      appId: "你的"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const appId = "club-manager-2026";

    function App() {
      const [user, setUser] = useState(null);
      const [records, setRecords] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [formData, setFormData] = useState({
        date: new Date().toISOString().split('T')[0],
        type: 'expense',
        category: '活動費',
        item: '',
        amount: ''
      });

      // 🔐 登入
      useEffect(() => {
        firebase.auth().signInAnonymously();
        const unsub = firebase.auth().onAuthStateChanged(setUser);
        return () => unsub();
      }, []);

      // 📡 監聽資料
      useEffect(() => {
        if (!user) return;

        const ref = db.collection('artifacts')
          .doc(appId)
          .collection('public')
          .doc('data')
          .collection('records');

        const unsub = ref.onSnapshot(snapshot => {
          const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setRecords(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
          setLoading(false);
        });

        return () => unsub();
      }, [user]);

      // 📊 統計
      const stats = useMemo(() => {
        const income = records.filter(r => r.type === 'income')
          .reduce((s, r) => s + Number(r.amount || 0), 0);
        const expense = records.filter(r => r.type === 'expense')
          .reduce((s, r) => s + Number(r.amount || 0), 0);
        return { income, expense, balance: income - expense };
      }, [records]);

      // ➕ 新增
      const handleAdd = async (e) => {
        e.preventDefault();
        if (!formData.item || !formData.amount) return;

        const ref = db.collection('artifacts')
          .doc(appId)
          .collection('public')
          .doc('data')
          .collection('records');

        await ref.add({
          ...formData,
          amount: Number(formData.amount),
          createdAt: new Date().toISOString(),
          userId: user.uid
        });

        setIsModalOpen(false);
        setFormData({
          date: new Date().toISOString().split('T')[0],
          type: 'expense',
          category: '活動費',
          item: '',
          amount: ''
        });
      };

      if (loading) {
        return <div className="h-screen flex items-center justify-center text-slate-400">載入中...</div>;
      }

      return (
        <div className="max-w-4xl mx-auto p-4 space-y-6">

          {/* Header */}
          <div className="flex justify-between items-center">
            <h1 className="text-xl font-bold">社團記帳</h1>
            <button onClick={() => setIsModalOpen(true)} className="bg-blue-600 text-white px-4 py-2 rounded">
              新增
            </button>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-3 gap-4">
            <Card title="收入" value={stats.income} color="text-emerald-600"/>
            <Card title="支出" value={stats.expense} color="text-rose-600"/>
            <Card title="結餘" value={stats.balance} color="text-blue-600"/>
          </div>

          {/* Table */}
          <div className="bg-white border rounded">
            <table className="w-full">
              <thead className="bg-slate-100 text-sm">
                <tr>
                  <th className="p-3">日期</th>
                  <th>項目</th>
                  <th className="text-right pr-4">金額</th>
                </tr>
              </thead>
              <tbody>
                {records.map(r => (
                  <tr key={r.id} className="border-t">
                    <td className="p-3 text-sm">{r.date}</td>
                    <td>
                      <div>{r.item}</div>
                      <div className="text-xs text-slate-400">{r.category}</div>
                    </td>
                    <td className={`text-right pr-4 font-bold ${r.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>
                      {r.type === 'income' ? '+' : '-'}${Number(r.amount).toLocaleString()}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Modal */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center">
              <form onSubmit={handleAdd} className="bg-white p-6 rounded w-80 space-y-3">
                <input type="date" value={formData.date} onChange={e=>setFormData({...formData,date:e.target.value})} className="w-full border p-2"/>
                <input placeholder="項目" value={formData.item} onChange={e=>setFormData({...formData,item:e.target.value})} className="w-full border p-2"/>
                <input type="number" placeholder="金額" value={formData.amount} onChange={e=>setFormData({...formData,amount:e.target.value})} className="w-full border p-2"/>

                <div className="flex gap-2">
                  <button type="button" onClick={()=>setIsModalOpen(false)} className="flex-1 border p-2">取消</button>
                  <button className="flex-1 bg-blue-600 text-white p-2">儲存</button>
                </div>
              </form>
            </div>
          )}

        </div>
      );
    }

    const Card = ({title, value, color}) => (
      <div className="bg-white p-4 rounded border">
        <div className="text-sm text-slate-400">{title}</div>
        <div className={`text-xl font-bold ${color}`}>${value.toLocaleString()}</div>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
