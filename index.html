<!DOCTYPE html>

  <!-- 引入 Tailwind CSS -->

  <!-- 優化全局字體與滾動條樣式 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
    
    * {
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
    }

    /* 精緻極簡滾動條 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* 淡入動畫 */
    .animate-fade-in {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 隱藏橫向滾動條，保持頁面乾淨 */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

            { id: "t_exp_6", date: "2026-06-24", type: "expense", category: "場地租金", item: "Sooo dance 續租 精誠C", amount: 5400, club: "一起大跳社", paymentMethod: "cash", member: "品in", note: "續租7/7、8/4、9/1、10/6、11/3、12/1 18:30-19:30 精誠C" },
            { id: "t_exp_7", date: "2026-03-22", type: "expense", category: "雜支", item: "社團博覽會雜支", amount: 1000, club: "共用", paymentMethod: "cash", member: "品in", note: "" },
            
            // 領出並移入現金袋之資金移轉 (Transfer)
            { id: "t_tx_1", date: "2026-03-30", type: "transfer", category: "資金移轉", item: "品in領現放入現金袋 (福委補助款移轉)", amount: 12000, club: "共用", paymentMethod: "cash", member: "品in", note: "福委固定補助金、社博補助金、母親節活動移入現金袋" }

        },
        course: { columns: [], members: [] },
        invoice: { company: { name: "天茂企管顧問有限公司", taxId: "89177254" }, months: Array.from({ length: 10 }, (_, i) => ({ id: i + 3, name: `${i + 3}月`, daTiao: { purpose: "", budget: 0, items: [] }, ouDouK: { purpose: "", budget: 0, items: [] } })) },
        competition: { daTiao: { newMembers: 0, activities: 0, posts: [] }, ouDouK: { newMembers: 0, activities: 0, posts: [] } },
        videos: [],
        settings: { adminEmails: [] }
      };

    function normalizeData(raw) {
      const base = defaultData();
      const data = { ...base, ...(raw || {}) };
      data.finance = { ...base.finance, ...(data.finance || {}) };
      
      // 自動判定：若 ledger 為空，則自動套入我們精心設計的初始化帳本
      if (!data.finance.ledger || data.finance.ledger.length === 0) {
        data.finance.ledger = base.finance.ledger;
      }
      
      data.finance.budget = { ...base.finance.budget, ...(data.finance.budget || {}) };
      data.course = { ...base.course, ...(data.course || {}) };
      data.course.columns = data.course.columns || [];
      data.course.members = (data.course.members || []).map((m, idx) => ({ id: m.id || `m_${Date.now()}_${idx}`, name: m.name || "", department: m.department || "", type: m.type || "社員", registered: m.registered || {}, payments: m.payments || {} }));
      data.invoice = { ...base.invoice, ...(data.invoice || {}) };
      data.invoice.company = { ...base.invoice.company, ...(data.invoice.company || {}) };
      data.invoice.months = data.invoice.months || base.invoice.months;
      data.competition = { ...base.competition, ...(data.competition || {}) };
      data.competition.daTiao = { newMembers: 0, activities: 0, posts: [], ...(data.competition.daTiao || {}) };
      data.competition.ouDouK = { newMembers: 0, activities: 0, posts: [], ...(data.competition.ouDouK || {}) };
      data.videos = data.videos || [];
      data.settings = { adminEmails: [], ...(data.settings || {}) };
      return data;
    }

    function showAlert(message) {
      const modal = $("modal");
      modal.innerHTML = `
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl border border-slate-100 animate-fade-in space-y-4">
          <div class="flex items-center gap-3 text-amber-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <h3 class="font-extrabold text-lg text-slate-800 m-0">系統提示</h3>
          </div>
          <p class="text-sm text-slate-600 leading-relaxed">${esc(message)}</p>
          <div class="flex justify-end pt-2">
            <button class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold text-xs px-5 py-2.5 rounded-xl transition-all shadow-sm" data-close>確認</button>
          </div>
        </div>
      `;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      modal.querySelector("[data-close]").onclick = () => {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      };
    }

    function showConfirm(message, onConfirm) {
      const modal = $("modal");
      modal.innerHTML = `
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl border border-slate-100 animate-fade-in space-y-4">
          <div class="flex items-center gap-3 text-blue-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 class="font-extrabold text-lg text-slate-800 m-0">確認執行</h3>
          </div>
          <p class="text-sm text-slate-600 leading-relaxed">${esc(message)}</p>
          <div class="flex justify-end gap-2.5 pt-2">
            <button class="bg-slate-100 hover:bg-slate-200 active:scale-95 text-slate-700 font-bold text-xs px-4 py-2.5 rounded-xl transition-all" data-close>取消</button>
            <button class="bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition-all shadow-sm" data-ok>確定</button>
          </div>
        </div>
      `;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      modal.querySelector("[data-close]").onclick = () => {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      };
      modal.querySelector("[data-ok]").onclick = () => {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        onConfirm();
      };
    }

    async function saveData(nextData, closeEditing = false) {
      state.saving = true;
      render();
      try {
        state.data = normalizeData(nextData);
        await setDoc(docRef, state.data);
        if (closeEditing) state.editing = false;
      } catch (error) {
        showAlert(`儲存失敗：${error.message}`);
      } finally {
        state.saving = false;
        render();
      }
    }

    function updateData(mutator) {
      const next = clone(state.data);
      mutator(next);
      state.data = normalizeData(next);
      render();
    }

    function financeStats() {
      const ledger = state.data.finance.ledger;
      const total = (type, method) => ledger.filter((t) => t.type === type && (!method || t.paymentMethod === method)).reduce((sum, t) => sum + (Number(t.amount) || 0), 0);
      const transferToCash = total("transfer", "cash");
      const cashAssets = total("income", "cash") - total("expense", "cash") + transferToCash;
      const bankAssets = total("income", "bank") - total("expense", "bank") - transferToCash;
      const advance = ledger.filter((t) => t.type === "advance" && t.member === "品in").reduce((s, t) => s + (Number(t.amount) || 0), 0);
      const reimburse = ledger.filter((t) => (t.type === "reimburse" || (t.type === "expense" && t.category === "償還代墊")) && t.member === "品in").reduce((s, t) => s + (Number(t.amount) || 0), 0);
      const pininAdvanceOwed = advance - reimburse;
      const netAssets = cashAssets + bankAssets - pininAdvanceOwed;
      const budget = state.data.finance.budget;
      return { cashAssets, bankAssets, pininAdvanceOwed, netAssets, forecast: netAssets + Number(budget.income || 0) - Number(budget.expense || 0) };
    }

    function renderFinance() {
      const stats = financeStats();
      const budget = state.data.finance.budget;
      const ledger = state.data.finance.ledger.filter((t) => state.filterClub === "all" || t.club === state.filterClub).filter((t) => isAdmin() || !["advance", "reimburse", "transfer"].includes(t.type)).sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
      const typeLabels = { income: "收入", expense: "支出", advance: "代墊", reimburse: "退代墊", transfer: "資金移轉" };

        reimburse: "bg-teal-50 text-teal-700 border-teal-200",

      return `

            <div class="bg-white rounded-2xl p-5 border border-slate-200/80 shadow-sm flex flex-col justify-between">

            </div>
            <div class="bg-white rounded-2xl p-5 border border-slate-200/80 shadow-sm flex flex-col justify-between">
              <span class="text-slate-400 text-[10px] font-black tracking-wider uppercase">現金袋</span>
              <strong class="text-2xl font-black text-emerald-600 mt-2">${money(stats.cashAssets)}</strong>
            </div>
            <div class="bg-white rounded-2xl p-5 border border-slate-200/80 shadow-sm flex flex-col justify-between">

                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />

                </p>
                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-3 px-4 rounded-xl shadow-sm transition-all text-sm active:scale-[0.98] flex items-center justify-center gap-2" data-login>

        `;

    function bindEvents() {
      document.querySelectorAll("[data-tab]").forEach((el) => el.onclick = () => { state.activeTab = el.dataset.tab; render(); });
      document.querySelector("[data-signout]")?.addEventListener("click", () => showConfirm("確定要登出管理系統嗎？", () => signOut(auth)));
      document.querySelector("[data-toggle-edit]")?.addEventListener("click", () => { state.editing = !state.editing; render(); });
      document.querySelector("[data-save]")?.addEventListener("click", () => saveData(state.data, true));
      $("financeFilter")?.addEventListener("change", (e) => { state.filterClub = e.target.value; render(); });
      $("budgetIncome")?.addEventListener("input", (e) => updateData((d) => d.finance.budget.income = Number(e.target.value)));
      $("budgetExpense")?.addEventListener("input", (e) => updateData((d) => d.finance.budget.expense = Number(e.target.value)));
      document.querySelector("[data-add-ledger]")?.addEventListener("click", addLedger);
      document.querySelectorAll("[data-del-ledger]").forEach((el) => el.onclick = () => showConfirm("確定要刪除這筆交易流水嗎？此操作無法還原！", () => updateData((d) => d.finance.ledger = d.finance.ledger.filter((t) => t.id !== el.dataset.delLedger))));
      document.querySelector("[data-add-member]")?.addEventListener("click", () => updateData((d) => d.course.members.push({ id: `m_${Date.now()}`, name: "", department: "", type: "社員", registered: {}, payments: {} })));
      document.querySelectorAll("[data-del-member]").forEach((el) => el.onclick = () => showConfirm("確定要將該成員從名冊中徹底刪除嗎？", () => updateData((d) => d.course.members.splice(Number(el.dataset.delMember), 1))));
      document.querySelectorAll("[data-member]").forEach((el) => el.oninput = () => updateData((d) => d.course.members[Number(el.dataset.member)][el.dataset.field] = el.value));
      document.querySelector("[data-add-course]")?.addEventListener("click", () => updateData((d) => d.course.columns.push({ id: `c_${Date.now()}`, name: "新課程", memberPrice: 150, nonMemberPrice: 400 })));
      document.querySelectorAll("[data-del-course]").forEach((el) => el.onclick = () => showConfirm("確定要將這堂課程刪除嗎？這將會同步清除所有已繳費數據！", () => updateData((d) => d.course.columns.splice(Number(el.dataset.delCourse), 1))));
      document.querySelectorAll("[data-course]").forEach((el) => el.oninput = () => updateData((d) => d.course.columns[Number(el.dataset.course)][el.dataset.courseField] = el.type === "number" ? Number(el.value) : el.value));
      document.querySelectorAll("[data-reg]").forEach((el) => el.onchange = () => updateData((d) => { const member = d.course.members[Number(el.dataset.reg)]; const col = d.course.columns.find((c) => c.id === el.dataset.col); member.registered[el.dataset.col] = el.checked; if (el.checked && !member.payments[el.dataset.col]) member.payments[el.dataset.col] = member.type === "非社員" ? (col.nonMemberPrice ?? 400) : (col.memberPrice ?? 150); if (!el.checked) delete member.payments[el.dataset.col]; }));
      document.querySelectorAll("[data-pay]").forEach((el) => el.oninput = () => updateData((d) => d.course.members[Number(el.dataset.pay)].payments[el.dataset.col] = Number(el.value)));
      document.querySelector("[data-add-video]")?.addEventListener("click", () => updateData((d) => d.videos.push({ title: "新課程影片", date: today(), url: "", note: "" })));
      document.querySelectorAll("[data-del-video]").forEach((el) => el.onclick = () => showConfirm("確定要移除這個社課影片捷徑嗎？", () => updateData((d) => d.videos.splice(Number(el.dataset.delVideo), 1))));
      document.querySelectorAll("[data-video]").forEach((el) => el.oninput = () => updateData((d) => d.videos[Number(el.dataset.video)][el.dataset.videoField] = el.value));
      document.querySelectorAll("[data-invoice]").forEach((el) => el.oninput = () => updateData((d) => d.invoice.months[Number(el.dataset.invoice)][el.dataset.club][el.dataset.invoiceField] = el.type === "number" ? Number(el.value) : el.value));
      document.querySelectorAll("[data-add-invoice]").forEach((el) => el.onclick = () => updateData((d) => d.invoice.months[Number(el.dataset.addInvoice)][el.dataset.club].items.push({ name: "", amount: 0, payer: "" })));
      document.querySelectorAll("[data-comp]").forEach((el) => el.oninput = () => updateData((d) => d.competition[el.dataset.comp][el.dataset.compField] = Number(el.value)));
      document.querySelectorAll("[data-add-post]").forEach((el) => el.onclick = () => updateData((d) => d.competition[el.dataset.addPost].posts.push({ date: today(), platform: "Instagram", title: "" })));
      document.querySelector("[data-add-admin]")?.addEventListener("click", () => { const email = $("newAdminEmail").value.trim(); if (!email.includes("@")) return showAlert("請輸入有效的 Google 信箱。"); if (ROOT_ADMINS.includes(email) || state.data.settings.adminEmails.includes(email)) return showAlert("此信箱已具備管理員權限。"); updateData((d) => d.settings.adminEmails.push(email)); });
      document.querySelectorAll("[data-del-admin]").forEach((el) => el.onclick = () => showConfirm("確定要移除此帳號的動態授權管理員資格嗎？", () => updateData((d) => d.settings.adminEmails = d.settings.adminEmails.filter((email) => email !== el.dataset.delAdmin))));
    }

    function addLedger() {
      const modal = $("modal");
      modal.innerHTML = `
        <div class="bg-white rounded-2xl p-6 max-w-lg w-full shadow-2xl border border-slate-100 animate-fade-in space-y-4">
          <div class="border-b border-slate-100 pb-2">
            <h3 class="font-extrabold text-slate-800 text-lg m-0">新增交易項目</h3>
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="block text-xs font-bold text-slate-500">交易日期
              <input id="txDate" type="date" value="${today()}" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
            </label>
            
            <label class="block text-xs font-bold text-slate-500">交易類型
              <select id="txType" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
                <option value="income">一般收入</option>
                <option value="expense">一般支出</option>
                <option value="advance">幹部個人代墊 (公帳未付)</option>
                <option value="reimburse">社團歸還代墊 (公帳歸還)</option>
                <option value="transfer">資金移轉 (現金袋 ↔ 銀行)</option>
              </select>
            </label>

            <label class="block text-xs font-bold text-slate-500">歸屬對象
              <select id="txClub" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
                ${CLUBS.map((c) => `<option>${c}</option>`).join("")}
              </select>
            </label>

            <label class="block text-xs font-bold text-slate-500">收付管道
              <select id="txMethod" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
                <option value="cash">💵 現金袋 (實體現金)</option>
                <option value="bank">🏦 銀行帳戶 / 品印託管</option>
              </select>
            </label>

            <label class="block text-xs font-bold text-slate-500">會計科目
              <input id="txCategory" value="課費" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
            </label>

            <label class="block text-xs font-bold text-slate-500">交易金額 (NT$)
              <input id="txAmount" type="number" min="0" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono font-bold focus:ring-1">
            </label>

            <label class="block text-xs font-bold text-slate-500 sm:col-span-2">經手 / 代墊幹部
              <input id="txMember" value="品in" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
            </label>

            <label class="block text-xs font-bold text-slate-500 sm:col-span-2">交易項目說明
              <input id="txItem" placeholder="例如：114-2期初社員大會便當" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1">
            </label>

            <label class="block text-xs font-bold text-slate-500 sm:col-span-2">交易備註
              <textarea id="txNote" class="mt-1 bg-white border border-slate-200 rounded-xl px-3 py-2 text-xs focus:ring-1 h-14 resize-none" placeholder="選填..."></textarea>
            </label>
          </div>

          <div class="flex justify-end gap-2 pt-4 border-t border-slate-100">
            <button class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-xs px-4 py-2.5 rounded-xl transition-all" data-close>取消</button>
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold text-xs px-5 py-2.5 rounded-xl transition-all shadow-sm active:scale-95" data-create-tx>登入帳目</button>
          </div>
        </div>
      `;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      modal.querySelector("[data-close]").onclick = () => {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      };
      modal.querySelector("[data-create-tx]").onclick = () => {
        const item = $("txItem").value.trim();
        const amount = Number($("txAmount").value);
        if (!item || !amount) return showAlert("請完整填寫項目與金額。");
        updateData((d) => d.finance.ledger.push({ id: `t_${Date.now()}`, date: $("txDate").value, type: $("txType").value, category: $("txCategory").value.trim(), item, amount, club: $("txClub").value, paymentMethod: $("txMethod").value, member: $("txMember").value.trim(), note: $("txNote").value.trim() }));
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      };
    }

    onAuthStateChanged(auth, (user) => {
      state.user = user;
      state.data = null;
      if (state.unsubscribeData) state.unsubscribeData();
      if (!user) return render();
      state.unsubscribeData = onSnapshot(docRef, async (snap) => {
        state.data = normalizeData(snap.exists() ? snap.data() : null);
        if (!snap.exists()) await setDoc(docRef, state.data);
        if (!isAdmin() && ["members", "invoice", "competition", "settings"].includes(state.activeTab)) state.activeTab = "videos";
        render();
      }, (error) => showAlert(`資料讀取失敗：${error.message}`));
      render();
    });
  </script>
</body>
</html>
