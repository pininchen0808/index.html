<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社團財務與管理系統</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 讓瀏覽器可以即時編譯 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 🌟 引入 Firebase (使用 ES Module 方式) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD9DTPO7obCqmDuwzLzwI_JZixTE4W3EhE",
        authDomain: "gis-club.firebaseapp.com",
        projectId: "gis-club",
        storageBucket: "gis-club.firebasestorage.app",
        messagingSenderId: "384627740491",
        appId: "1:384627740491:web:2727c4fbb8c8cf1ec362ce"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      window.firebaseDb = db;
      window.firebaseApi = { doc, onSnapshot, setDoc };
      window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 圖示元件 ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const DollarSign = (p) => <Icon {...p} path='<line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' />;
        const Users = (p) => <Icon {...p} path='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' />;
        const FileText = (p) => <Icon {...p} path='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' />;
        const TrendingDown = (p) => <Icon {...p} path='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' />;
        const TrendingUp = (p) => <Icon {...p} path='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' />;
        const Calculator = (p) => <Icon {...p} path='<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>' />;
        const Edit = (p) => <Icon {...p} path='<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' />;
        const Save = (p) => <Icon {...p} path='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>' />;
        const Cloud = (p) => <Icon {...p} path='<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>' />;
        const Plus = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;
        const Trash2 = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' />;
        const ChevronDown = (p) => <Icon {...p} path='<polyline points="6 9 12 15 18 9"></polyline>' />;
        const ChevronUp = (p) => <Icon {...p} path='<polyline points="18 15 12 9 6 15"></polyline>' />;
        const ReceiptIcon = (p) => <Icon {...p} path='<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-8"/><path d="M16 16h-8"/>' />;
        const Wallet = (p) => <Icon {...p} path='<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>' />;
        const Clock = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' />;
        const Briefcase = (p) => <Icon {...p} path='<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' />;
        const UserIcon = (p) => <Icon {...p} path='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' />;

        // --- 預設資料生成 (包含所有課程與3~12月核銷) ---
        const generateDefaultData = () => {
          // 產生 3 到 12 月的空資料
          const monthsData = [];
          for (let i = 3; i <= 12; i++) {
            if (i === 3) {
              monthsData.push({ id: 3, name: '3月', purpose: '社團補助金', budget: 4000, items: [
                { id: 1, category: '大跳', amount: 1000, payer: '品印' },
                { id: 2, category: '大跳', amount: 92, payer: '廷柔' },
                { id: 3, category: '歐豆K', amount: 1024, payer: '品印' }
              ]});
            } else {
              monthsData.push({ id: i, name: `${i}月`, purpose: '', budget: 0, items: [] });
            }
          }

          return {
            finance: {
              expenses: [
                { category: '老師費用', item: 'CaRu課費 第一堂15人', amount: -6000, note: '', isPinYinPaid: false },
                { category: '老師費用', item: '阿默課費 預計', amount: -27000, note: '3000元*9堂', isPinYinPaid: false },
                { category: '場地租金', item: '3/11-Sooo dance A教室', amount: -900, note: '代墊', isPinYinPaid: true }
              ],
              income: [
                { category: '課費', item: '預計課費', amount: 23120, note: '9堂10人收280', isReceived: false },
                { category: '福委補助款', item: '福委固定補助金', amount: 8000, note: '', isReceived: true }
              ]
            },
            course: {
              columns: [
                { id: 'c1', name: '3/11 基礎養成' }, { id: 'c2', name: '4/14 K-POP' },
                { id: 'c3', name: '5/5 基礎養成' }, { id: 'c4', name: '6/2 K-POP' },
                { id: 'c5', name: '7/7 基礎養成' }, { id: 'c6', name: '8/4 K-POP' },
                { id: 'c7', name: '9/1 基礎養成' }, { id: 'c8', name: '10/6 K-POP' },
                { id: 'c9', name: '11/3 基礎養成' }, { id: 'c10', name: '12/1 K-POP' }
              ],
              members: [
                { name: '品印', type: '社員', c1: 150, c2: 280 },
                { name: 'Abby', type: '社員', c1: 150, c2: 280 },
                { name: '品印朋友', type: '非社員', c1: 0, c2: 400 }
              ]
            },
            invoice: {
              company: { name: '天茂企管顧問有限公司', taxId: '89177254' },
              months: monthsData
            }
          };
        };

        const defaultData = generateDefaultData();

        // --- 元件：財務總表 ---
        const FinanceTab = ({ data, isEditing, setData }) => {
          const totalExpense = data.finance.expenses.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const totalIncome = data.finance.income.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const balance = totalIncome + totalExpense;
          
          // 計算品印代墊總計 (取絕對值以正數表示欠款)
          const pinYinTotal = Math.abs(data.finance.expenses
            .filter(item => item.isPinYinPaid)
            .reduce((sum, item) => sum + (Number(item.amount) || 0), 0));

          // 計算尚未收到款項 (待收帳款) 總計
          const pendingReceiptTotal = data.finance.income
            .filter(item => !item.isReceived)
            .reduce((sum, item) => sum + (Number(item.amount) || 0), 0);

          const handleChange = (type, index, field, value) => {
            const newData = { ...data };
            newData.finance[type][index][field] = value;
            setData(newData);
          };

          const addRow = (type) => {
            const newData = { ...data };
            if (type === 'expenses') {
                newData.finance.expenses.push({ category: '', item: '', amount: 0, note: '', isPinYinPaid: false });
            } else {
                newData.finance.income.push({ category: '', item: '', amount: 0, note: '', isReceived: false });
            }
            setData(newData);
          };

          const removeRow = (type, index) => {
            const newData = { ...data };
            newData.finance[type].splice(index, 1);
            setData(newData);
          };

          const Input = ({ val, field, index, type }) => (
            isEditing ? 
            <input type="text" value={val} onChange={(e) => handleChange(type, index, field, e.target.value)} 
                   className="w-full px-2 py-1 border border-blue-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" /> 
            : <span>{val}</span>
          );

          const NumberInput = ({ val, field, index, type, textClass }) => (
            isEditing ? 
            <input type="number" value={val} onChange={(e) => handleChange(type, index, field, e.target.value)} 
                   className="w-24 px-2 py-1 border border-blue-300 rounded text-right focus:outline-none focus:ring-2 focus:ring-blue-500" /> 
            : <span className={textClass}>{Number(val).toLocaleString()}</span>
          );

          return (
            <div className="space-y-8">
              {/* 區塊 1：社團營運總覽 */}
              <div>
                <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                  <Briefcase size={22} className="text-blue-600"/> 社團營運帳戶
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div className="p-3 bg-red-100 text-red-600 rounded-lg"><TrendingDown size={24} /></div>
                    <div><p className="text-sm text-slate-500 font-medium">總計支出</p><p className="text-2xl font-bold text-slate-800">{totalExpense.toLocaleString()}</p></div>
                  </div>
                  <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div className="p-3 bg-green-100 text-green-600 rounded-lg"><TrendingUp size={24} /></div>
                    <div><p className="text-sm text-slate-500 font-medium">總計收入</p><p className="text-2xl font-bold text-slate-800">{totalIncome.toLocaleString()}</p></div>
                  </div>
                  <div className={`p-6 rounded-xl border shadow-sm flex items-center gap-4 ${balance < 0 ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                    <div className={`p-3 rounded-lg ${balance < 0 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}><Calculator size={24} /></div>
                    <div><p className={`text-sm font-medium ${balance < 0 ? 'text-red-600/80' : 'text-green-600/80'}`}>目前結餘</p><p className={`text-2xl font-bold ${balance < 0 ? 'text-red-700' : 'text-green-700'}`}>{balance.toLocaleString()}</p></div>
                  </div>
                </div>
              </div>

              {/* 區塊 2：個人帳務管理 */}
              <div>
                <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2">
                  <UserIcon size={22} className="text-amber-600"/> 個人帳務管理 (對帳專用)
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-white p-6 rounded-xl border border-amber-200 bg-amber-50/30 shadow-sm flex items-center gap-4">
                    <div className="p-3 bg-amber-100 text-amber-600 rounded-lg"><Wallet size={24} /></div>
                    <div><p className="text-sm text-amber-700 font-medium">品印代墊總計 (需回收)</p><p className="text-2xl font-bold text-amber-900">${pinYinTotal.toLocaleString()}</p></div>
                  </div>
                  <div className="bg-white p-6 rounded-xl border border-blue-200 bg-blue-50/30 shadow-sm flex items-center gap-4">
                    <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><Clock size={24} /></div>
                    <div><p className="text-sm text-blue-700 font-medium">待收帳款總計 (尚未入帳)</p><p className="text-2xl font-bold text-blue-900">${pendingReceiptTotal.toLocaleString()}</p></div>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 items-start">
                
                {/* 支出明細表 */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                  <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-red-500"></span>支出明細
                    </h3>
                  </div>
                  <div className="overflow-x-auto p-4 flex-grow">
                    <table className="w-full text-sm text-left">
                      <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                        <tr>
                          <th className="px-4 py-3 w-1/4">類別</th>
                          <th className="px-4 py-3 w-1/3">項目</th>
                          <th className="px-4 py-3 text-right">金額</th>
                          <th className="px-4 py-3 w-20 text-center">品印代墊</th>
                          <th className="px-4 py-3">備註</th>
                          {isEditing && <th className="px-2 py-3 w-10"></th>}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {data.finance.expenses.map((item, idx) => (
                          <tr key={idx} className={`hover:bg-slate-50 transition-colors ${item.isPinYinPaid ? 'bg-amber-50/30' : ''}`}>
                            <td className="px-4 py-2"><Input val={item.category} field="category" index={idx} type="expenses"/></td>
                            <td className="px-4 py-2"><Input val={item.item} field="item" index={idx} type="expenses"/></td>
                            <td className="px-4 py-2 text-right font-medium">
                              <NumberInput val={item.amount} field="amount" index={idx} type="expenses" textClass="text-red-600"/>
                            </td>
                            <td className="px-4 py-2 text-center">
                              <input 
                                type="checkbox" 
                                checked={item.isPinYinPaid || false} 
                                onChange={(e) => handleChange('expenses', idx, 'isPinYinPaid', e.target.checked)} 
                                disabled={!isEditing} 
                                className="w-4 h-4 text-amber-600 rounded focus:ring-amber-500 cursor-pointer disabled:cursor-default" 
                              />
                            </td>
                            <td className="px-4 py-2 text-slate-500 text-xs"><Input val={item.note} field="note" index={idx} type="expenses"/></td>
                            {isEditing && (
                              <td className="px-2 py-2 text-center">
                                <button onClick={() => removeRow('expenses', idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button>
                              </td>
                            )}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {isEditing && (
                      <button onClick={() => addRow('expenses')} className="w-full mt-3 py-2 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded-lg flex justify-center items-center gap-2 transition-colors">
                        <Plus size={16} /> 新增列
                      </button>
                    )}
                  </div>
                </div>

                {/* 收入與補助明細表 */}
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                  <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 className="font-bold text-slate-800 flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full bg-green-500"></span>收入與補助明細
                    </h3>
                  </div>
                  <div className="overflow-x-auto p-4 flex-grow">
                    <table className="w-full text-sm text-left">
                      <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                        <tr>
                          <th className="px-4 py-3 w-1/4">類別</th>
                          <th className="px-4 py-3 w-1/3">項目</th>
                          <th className="px-4 py-3 text-right">金額</th>
                          <th className="px-4 py-3 w-20 text-center">已收款</th>
                          <th className="px-4 py-3">備註</th>
                          {isEditing && <th className="px-2 py-3 w-10"></th>}
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {data.finance.income.map((item, idx) => (
                          <tr key={idx} className={`hover:bg-slate-50 transition-colors ${!item.isReceived ? 'bg-blue-50/30' : ''}`}>
                            <td className="px-4 py-2"><Input val={item.category} field="category" index={idx} type="income"/></td>
                            <td className="px-4 py-2"><Input val={item.item} field="item" index={idx} type="income"/></td>
                            <td className="px-4 py-2 text-right font-medium">
                              <NumberInput val={item.amount} field="amount" index={idx} type="income" textClass="text-green-600"/>
                            </td>
                            <td className="px-4 py-2 text-center">
                              <input 
                                type="checkbox" 
                                checked={item.isReceived || false} 
                                onChange={(e) => handleChange('income', idx, 'isReceived', e.target.checked)} 
                                disabled={!isEditing} 
                                className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer disabled:cursor-default" 
                              />
                            </td>
                            <td className="px-4 py-2 text-slate-500 text-xs"><Input val={item.note} field="note" index={idx} type="income"/></td>
                            {isEditing && (
                              <td className="px-2 py-2 text-center">
                                <button onClick={() => removeRow('income', idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button>
                              </td>
                            )}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {isEditing && (
                      <button onClick={() => addRow('income')} className="w-full mt-3 py-2 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded-lg flex justify-center items-center gap-2 transition-colors">
                        <Plus size={16} /> 新增列
                      </button>
                    )}
                  </div>
                </div>

              </div>
            </div>
          );
        };

        // --- 元件：課程報名 ---
        const RegistrationTab = ({ data, isEditing, setData }) => {
          const handleChange = (index, field, value) => {
            const newData = { ...data };
            newData.course.members[index][field] = value;
            setData(newData);
          };

          const addMember = () => {
            const newData = { ...data };
            newData.course.members.push({ name: '', type: '社員', c1:0, c2:0, c3:0, c4:0, c5:0, c6:0, c7:0, c8:0, c9:0, c10:0 });
            setData(newData);
          };

          const removeMember = (index) => {
            const newData = { ...data };
            newData.course.members.splice(index, 1);
            setData(newData);
          };

          // 計算各欄位總計
          const totals = {};
          data.course.columns.forEach(col => {
            totals[col.id] = data.course.members.reduce((sum, m) => sum + (Number(m[col.id]) || 0), 0);
          });

          return (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h3 className="font-bold text-slate-800">社團課程報名狀況</h3>
                {isEditing && (
                  <button onClick={addMember} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded flex items-center gap-1 text-sm shadow-sm">
                    <Plus size={16} /> 新增人員
                  </button>
                )}
              </div>
              <div className="overflow-x-auto max-h-[70vh]">
                <table className="w-full text-sm text-left whitespace-nowrap">
                  <thead className="text-xs text-slate-500 bg-slate-100 border-b border-slate-200 sticky top-0 z-20">
                    <tr>
                      <th className="px-4 py-4 font-semibold sticky left-0 bg-slate-100 z-30 border-r border-slate-200 w-12">#</th>
                      <th className="px-4 py-4 font-semibold sticky left-[48px] bg-slate-100 z-30 border-r border-slate-200 w-24">名單</th>
                      <th className="px-4 py-4 font-semibold sticky left-[144px] bg-slate-100 z-30 border-r border-slate-200 w-24">身分</th>
                      {data.course.columns.map(col => (
                        <th key={col.id} className="px-4 py-4 font-semibold text-center bg-blue-50 border-r border-slate-200 min-w-[100px]">
                          {col.name}
                          <div className="text-[10px] text-blue-600 mt-1 font-normal">收費</div>
                        </th>
                      ))}
                      {isEditing && <th className="px-2 py-4 text-center bg-slate-100 border-l border-slate-200 sticky right-0 z-30">操作</th>}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {data.course.members.map((member, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 transition-colors">
                        <td className="px-4 py-3 text-slate-400 sticky left-0 bg-white group-hover:bg-slate-50 border-r border-slate-100">{idx + 1}</td>
                        <td className="px-4 py-3 sticky left-[48px] bg-white group-hover:bg-slate-50 border-r border-slate-100">
                           {isEditing ? <input type="text" value={member.name} onChange={(e) => handleChange(idx, 'name', e.target.value)} className="w-20 px-2 py-1 border border-blue-300 rounded" placeholder="姓名" /> : <span className="font-medium text-slate-800">{member.name}</span>}
                        </td>
                        <td className="px-4 py-3 sticky left-[144px] bg-white group-hover:bg-slate-50 border-r border-slate-100">
                           {isEditing ? (
                             <select value={member.type || '社員'} onChange={(e) => handleChange(idx, 'type', e.target.value)} className="w-20 px-1 py-1 border border-blue-300 rounded text-xs">
                               <option value="社員">社員</option>
                               <option value="非社員">非社員</option>
                             </select>
                           ) : (
                             <span className={`px-2 py-1 rounded text-xs font-semibold ${member.type === '非社員' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{member.type || '社員'}</span>
                           )}
                        </td>
                        {data.course.columns.map(col => (
                          <td key={col.id} className="px-4 py-3 text-center border-r border-slate-100">
                            {isEditing ? 
                              <input type="number" value={member[col.id] || ''} onChange={(e) => handleChange(idx, col.id, e.target.value)} className="w-16 px-1 py-1 border border-blue-300 rounded text-center focus:ring-2 focus:ring-blue-500" /> 
                              : (Number(member[col.id]) > 0 ? <span className="inline-block px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-semibold">${member[col.id]}</span> : <span className="text-slate-300">-</span>)
                            }
                          </td>
                        ))}
                        {isEditing && (
                          <td className="px-2 py-3 text-center bg-white sticky right-0 border-l border-slate-100 shadow-[-4px_0_6px_-2px_rgba(0,0,0,0.05)]">
                            <button onClick={() => removeMember(idx)} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={16}/></button>
                          </td>
                        )}
                      </tr>
                    ))}
                  </tbody>
                  <tfoot className="bg-slate-50 border-t-2 border-slate-200 font-semibold text-slate-800 sticky bottom-0 z-20">
                    <tr>
                      <td colSpan="3" className="px-4 py-4 text-right sticky left-0 bg-slate-50 border-r border-slate-200">總計收費：</td>
                      {data.course.columns.map(col => (
                        <td key={`total-${col.id}`} className="px-4 py-4 text-center text-blue-700 border-r border-slate-200">${totals[col.id].toLocaleString()}</td>
                      ))}
                      {isEditing && <td className="bg-slate-50 sticky right-0 border-l border-slate-200 shadow-[-4px_0_6px_-2px_rgba(0,0,0,0.05)]"></td>}
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          );
        };

        // --- 元件：經費核銷 ---
        const InvoiceTab = ({ data, isEditing, setData }) => {
          // 預設將4月展開，3月收合
          const [expandedMonths, setExpandedMonths] = useState({ 4: true });

          const toggleMonth = (monthId) => {
            setExpandedMonths(prev => ({ ...prev, [monthId]: !prev[monthId] }));
          };

          const handleMonthChange = (monthIdx, field, value) => {
            const newData = { ...data };
            newData.invoice.months[monthIdx][field] = value;
            setData(newData);
          };

          const handleItemChange = (monthIdx, itemIdx, field, value) => {
            const newData = { ...data };
            newData.invoice.months[monthIdx].items[itemIdx][field] = value;
            setData(newData);
          };

          const addItem = (monthIdx) => {
            const newData = { ...data };
            newData.invoice.months[monthIdx].items.push({ category: '', amount: 0, payer: '' });
            setData(newData);
          };

          const removeItem = (monthIdx, itemIdx) => {
            const newData = { ...data };
            newData.invoice.months[monthIdx].items.splice(itemIdx, 1);
            setData(newData);
          };

          return (
            <div className="space-y-6 pb-20">
              <div className="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl p-6 text-white shadow-md flex items-center justify-between">
                <div>
                  <h2 className="text-2xl font-bold mb-2">抬頭：{data.invoice.company.name}</h2>
                  <p className="text-blue-100 text-lg flex items-center gap-2">
                    <ReceiptIcon size={20} />統編：<span className="font-mono bg-white/20 px-2 py-1 rounded">{data.invoice.company.taxId}</span>
                  </p>
                </div>
                <div className="hidden md:block opacity-20"><FileText size={80} /></div>
              </div>

              <div className="space-y-4">
                {data.invoice.months.map((monthData, monthIdx) => {
                  const isExpanded = expandedMonths[monthData.id] || false;
                  const totalAmount = monthData.items.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                  const budget = Number(monthData.budget) || 0;
                  const shortfall = budget - totalAmount;
                  const hasItems = monthData.items.length > 0;

                  return (
                    <div key={monthData.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-300">
                      {/* 月份 Header */}
                      <div 
                        onClick={() => toggleMonth(monthData.id)}
                        className={`px-6 py-4 flex flex-wrap items-center justify-between cursor-pointer hover:bg-slate-50 select-none ${isExpanded ? 'bg-blue-50/50 border-b border-blue-100' : ''}`}
                      >
                        <div className="flex items-center gap-4 w-full md:w-auto">
                          <h3 className="font-bold text-lg text-blue-900 w-16">{monthData.name}</h3>
                          
                          {isEditing ? (
                            <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
                              <input type="text" placeholder="輸入補助目的 (如:社團博覽會)" value={monthData.purpose} onChange={(e) => handleMonthChange(monthIdx, 'purpose', e.target.value)} className="w-48 px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-500" />
                              <span className="text-sm text-slate-500">金額:</span>
                              <input type="number" placeholder="金額" value={monthData.budget} onChange={(e) => handleMonthChange(monthIdx, 'budget', e.target.value)} className="w-24 px-2 py-1 border border-blue-300 rounded text-sm text-right focus:ring-2 focus:ring-blue-500" />
                            </div>
                          ) : (
                            <div className="flex items-center gap-2 text-slate-700">
                              <span className="font-medium bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">{monthData.purpose || '尚未設定目的'}</span>
                              <span className="text-slate-500 text-sm">補助金: <strong className="text-slate-800">${budget.toLocaleString()}</strong></span>
                            </div>
                          )}
                        </div>

                        <div className="flex items-center gap-6 mt-2 md:mt-0 w-full md:w-auto justify-between md:justify-end">
                          {!isExpanded && hasItems && (
                            <div className="text-sm text-slate-500">
                              共 {monthData.items.length} 筆明細 | 總計: <strong className="text-slate-800">${totalAmount.toLocaleString()}</strong>
                            </div>
                          )}
                          <div className="text-slate-400">
                            {isExpanded ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                          </div>
                        </div>
                      </div>

                      {/* 月份 Body (手風琴展開) */}
                      {isExpanded && (
                        <div className="p-0 animate-in slide-in-from-top-2 duration-200">
                          {hasItems || isEditing ? (
                            <table className="w-full text-sm text-left">
                              <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                                <tr>
                                  <th className="px-6 py-3 w-16 text-center">#</th>
                                  <th className="px-6 py-3">分類 / 備註</th>
                                  <th className="px-6 py-3 text-right">金額</th>
                                  <th className="px-6 py-3">付款人</th>
                                  {isEditing && <th className="px-4 py-3 w-16 text-center">操作</th>}
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-100">
                                {monthData.items.map((item, itemIdx) => (
                                  <tr key={itemIdx} className="hover:bg-slate-50">
                                    <td className="px-6 py-3 text-center text-slate-400">{itemIdx + 1}</td>
                                    <td className="px-6 py-2">
                                      {isEditing ? <input type="text" placeholder="如: 大跳、歐豆K" value={item.category} onChange={(e) => handleItemChange(monthIdx, itemIdx, 'category', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" /> : item.category}
                                    </td>
                                    <td className="px-6 py-2 text-right font-medium text-slate-800">
                                      {isEditing ? <input type="number" value={item.amount} onChange={(e) => handleItemChange(monthIdx, itemIdx, 'amount', e.target.value)} className="w-24 px-2 py-1 border border-blue-300 rounded text-right focus:ring-2 focus:ring-blue-500" /> : `$${Number(item.amount).toLocaleString()}`}
                                    </td>
                                    <td className="px-6 py-2 text-slate-600">
                                      {isEditing ? <input type="text" value={item.payer} onChange={(e) => handleItemChange(monthIdx, itemIdx, 'payer', e.target.value)} className="w-24 px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" /> : item.payer}
                                    </td>
                                    {isEditing && (
                                      <td className="px-4 py-2 text-center">
                                        <button onClick={() => removeItem(monthIdx, itemIdx)} className="text-red-400 hover:text-red-600 p-1 rounded hover:bg-red-50"><Trash2 size={16}/></button>
                                      </td>
                                    )}
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          ) : (
                            <div className="p-8 text-center text-slate-400 flex flex-col items-center">
                              <p className="text-sm mb-2">本月尚無任何核銷紀錄</p>
                            </div>
                          )}

                          {isEditing && (
                            <div className="px-6 py-3 border-t border-slate-100 bg-slate-50">
                              <button onClick={() => addItem(monthIdx)} className="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center gap-1 transition-colors">
                                <Plus size={16} /> 新增一筆發票明細
                              </button>
                            </div>
                          )}

                          {/* Footer: 總計與缺額 */}
                          <div className="bg-slate-100 flex justify-between items-center text-sm border-t border-slate-200">
                            <div className="px-6 py-4 flex-1 flex justify-between items-center">
                              <span className="font-bold text-slate-600 uppercase tracking-wider">本月總計花費</span>
                              <span className="font-bold text-xl text-slate-900">${totalAmount.toLocaleString()}</span>
                            </div>
                            <div className={`px-6 py-4 flex-1 flex justify-between items-center border-l border-white/50 ${shortfall >= 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                              <span className="font-bold uppercase tracking-wider">{shortfall >= 0 ? '餘額' : '超額 (缺)'}</span>
                              <span className="font-bold text-xl">{shortfall.toLocaleString()}</span>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        };

        const TabButton = ({ active, icon: Icon, label, onClick }) => (
          <button
            onClick={onClick}
            className={`flex items-center gap-2 px-6 py-4 font-medium transition-colors border-b-2 whitespace-nowrap ${
              active ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'
            }`}
          >
            <Icon size={18} /> {label}
          </button>
        );

        // --- 主應用程式 ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('finance');
          const [data, setData] = useState(null);
          const [isEditing, setIsEditing] = useState(false);
          const [isSaving, setIsSaving] = useState(false);

          useEffect(() => {
            const connectFirebase = () => {
              const { doc, onSnapshot, setDoc } = window.firebaseApi;
              const db = window.firebaseDb;
              const docRef = doc(db, "clubApp", "mainData");

              const unsubscribe = onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                  let serverData = snap.data();
                  
                  // 自動修復結構：確保有新的屬性
                  if (!serverData.invoice?.months || !serverData.course?.columns || serverData.course.columns.length < 10) {
                      const mergedData = generateDefaultData();
                      if (serverData.finance) {
                          mergedData.finance = serverData.finance;
                          // 處理舊版收入資料轉換
                          mergedData.finance.income.forEach(item => {
                              if (item.isReceived === undefined) {
                                  item.isReceived = item.status !== '尚未收到款項';
                              }
                          });
                      }
                      setDoc(docRef, mergedData);
                      setData(mergedData);
                  } else {
                    // 處理舊版收入資料轉換
                    if (serverData.finance?.income) {
                        serverData.finance.income.forEach(item => {
                            if (item.isReceived === undefined) {
                                item.isReceived = item.status !== '尚未收到款項';
                            }
                        });
                    }
                    setData(serverData);
                  }
                } else {
                  // 初始化
                  setDoc(docRef, defaultData);
                  setData(defaultData);
                }
              });
              return () => unsubscribe();
            };

            if (window.firebaseDb) {
              connectFirebase();
            } else {
              window.addEventListener('firebase-ready', connectFirebase);
              return () => window.removeEventListener('firebase-ready', connectFirebase);
            }
          }, []);

          const handleSave = async () => {
            setIsSaving(true);
            try {
              const { doc, setDoc } = window.firebaseApi;
              await setDoc(doc(window.firebaseDb, "clubApp", "mainData"), data);
              setIsEditing(false);
            } catch (error) {
              alert("儲存失敗！錯誤訊息: " + error.message);
            }
            setIsSaving(false);
          };

          if (!data) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-500">
                <Cloud size={48} className="animate-pulse text-blue-500 mb-4" />
                <p>正在連線至 Firebase 資料庫...</p>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
              <div className="max-w-7xl mx-auto space-y-6">
                
                <header className="flex flex-col lg:flex-row lg:items-end justify-between gap-4 pb-6 border-b border-slate-200">
                  <div>
                    <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">社團財務與管理系統</h1>
                    <p className="text-slate-500 mt-2">統整財務報表、課程報名與經費核銷進度</p>
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <div className="flex items-center gap-2 text-sm text-slate-500 bg-white px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
                      <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                      雲端同步中
                    </div>
                    
                    {isEditing ? (
                      <button onClick={handleSave} disabled={isSaving} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium shadow-sm transition-colors">
                        {isSaving ? <span className="animate-spin">⏳</span> : <Save size={18} />} {isSaving ? '儲存中...' : '儲存變更'}
                      </button>
                    ) : (
                      <button onClick={() => setIsEditing(true)} className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-2 rounded-lg font-medium shadow-sm transition-colors">
                        <Edit size={18} /> 編輯資料
                      </button>
                    )}
                  </div>
                </header>

                {isEditing && (
                  <div className="bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-lg flex items-center gap-2 text-sm">
                    <strong>提示：</strong> 您目前在編輯模式。點擊表格內的文字即可修改，按右側按鈕可刪除列，表格下方可新增列。修改完畢請記得點擊右上角「儲存變更」。
                  </div>
                )}

                <nav className="flex overflow-x-auto bg-white rounded-xl border border-slate-200 shadow-sm hide-scrollbar">
                  <TabButton active={activeTab === 'finance'} onClick={() => setActiveTab('finance')} icon={DollarSign} label="財務總表" />
                  <TabButton active={activeTab === 'registration'} onClick={() => setActiveTab('registration')} icon={Users} label="課程報名" />
                  <TabButton active={activeTab === 'invoice'} onClick={() => setActiveTab('invoice')} icon={FileText} label="經費核銷明細" />
                </nav>

                <main className="pt-2 pb-12">
                  {activeTab === 'finance' && <FinanceTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'registration' && <RegistrationTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'invoice' && <InvoiceTab data={data} isEditing={isEditing} setData={setData} />}
                </main>
                
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
