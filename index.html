            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
              <div className="max-w-7xl mx-auto space-y-6">
                
                <header className="flex flex-col lg:flex-row lg:items-end justify-between gap-4 pb-6 border-b border-slate-200">
                  <div>
                    <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">
                      一起大跳社 <span className="text-slate-400 font-medium px-1">&</span> 歐豆K社
                    </h1>
                    <div className="flex flex-col sm:flex-row gap-3">
                      {/* 大跳社幹部卡片 */}
                      <div className="flex items-center bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 shadow-sm gap-3">
                        <span className="text-blue-800 bg-white px-2 py-1 rounded shadow-sm border border-blue-100 font-bold text-sm">一起大跳社</span>
                        <div className="flex gap-3 text-xs text-blue-700 items-center">
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-blue-100 font-bold">社長</span> Abby</span>
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-blue-100 font-bold">副社長</span> 品in</span>
                        </div>
                      </div>
                      
                      {/* 歐豆K社幹部卡片 */}
                      <div className="flex items-center bg-purple-50 border border-purple-200 rounded-lg px-3 py-2 shadow-sm gap-3">
                        <span className="text-purple-800 bg-white px-2 py-1 rounded shadow-sm border border-purple-100 font-bold text-sm">歐豆K社</span>
                        <div className="flex gap-3 text-xs text-purple-700 items-center">
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-purple-100 font-bold">社長</span> 品in</span>
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-purple-100 font-bold">副社長</span> 廷柔</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <div className="flex items-center gap-2 text-sm text-slate-500 bg-white px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
                      <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                      雲端同步中
                    </div>
                    
                    {isEditing ? (
                      <button onClick={handleSave} disabled={isSaving} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium shadow-sm transition-colors">
                        {isSaving ? <span className="animate-spin">⏳</span> : <Save size={18} />} {isSaving ? '儲存中...' : '儲存變更'}
                      </button>
                    ) : (
                      <button onClick={() => setIsEditing(true)} className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-2 rounded-lg font-medium shadow-sm transition-colors">
                        <Edit size={18} /> 編輯資料
                      </button>
                    )}
                  </div>
                </header>

                {isEditing && (
                  <div className="bg-amber-50 border border-amber-200 text-amber-800 px-4 py-3 rounded-lg flex items-center gap-2 text-sm">
                    <strong>提示：</strong> 您目前在編輯模式。點擊表格內的文字即可修改，修改完畢請記得點擊右上角「儲存變更」。
                  </div>
                )}

                <nav className="flex overflow-x-auto bg-white rounded-xl border border-slate-200 shadow-sm hide-scrollbar">
                  <TabButton active={activeTab === 'finance'} onClick={() => setActiveTab('finance')} icon={DollarSign} label="財務總表" />
                  <TabButton active={activeTab === 'members'} onClick={() => setActiveTab('members')} icon={ContactIcon} label="社員名單" />
                  <TabButton active={activeTab === 'registration'} onClick={() => setActiveTab('registration')} icon={ListChecks} label="課程報名" />
                  <TabButton active={activeTab === 'invoice'} onClick={() => setActiveTab('invoice')} icon={FileText} label="經費核銷明細" />
                  <TabButton active={activeTab === 'competition'} onClick={() => setActiveTab('competition')} icon={Trophy} label="積分競賽統計" />
                </nav>

                <main className="pt-2 pb-12">
                  {activeTab === 'finance' && <FinanceTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'members' && <MemberListTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'registration' && <RegistrationTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'invoice' && <InvoiceTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'competition' && <CompetitionTab data={data} isEditing={isEditing} setData={setData} />}
                </main>
                
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
