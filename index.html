                    <div className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                      {currentUser.photoURL ? (
                        <img src={currentUser.photoURL} alt={currentUser.displayName} className="w-6 h-6 rounded-full border border-slate-200" />
                      ) : (
                        <div className="w-6 h-6 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold">
                          {currentUser.displayName ? currentUser.displayName[0] : 'U'}
                        </div>
                      )}
                      <div className="flex flex-col text-left">
                        <span className="text-xs font-bold text-slate-700 truncate max-w-[120px]">{currentUser.displayName || "使用者"}</span>
                        <span className={`text-[9px] font-bold px-1.5 py-0.2 rounded-md ${adminRole ? 'bg-emerald-50 text-green-800 border border-green-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>
                          {adminRole ? "👑 社長 / 副社長" : "👥 一般社員"}
                        </span>
                      </div>
                      <button onClick={handleSignOut} title="登出系統" className="text-slate-400 hover:text-red-500 transition-colors ml-2 p-1">
                        <LogOutIcon size={14} />
                      </button>
                    </div>

                    <div className="flex items-center gap-2 text-sm text-slate-500 bg-white px-3 py-2 rounded-lg border border-slate-200 shadow-sm">
                      <span className="relative flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                      安控同步中
                    </div>

                    {/* 🔒 編輯功能權限鎖 (僅限管理員看得到) */}
                    {adminRole && (
                      isEditing ? (
                        <button onClick={handleSave} disabled={isSaving} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium shadow-sm transition-colors">
                          {isSaving ? <span className="animate-spin">⏳</span> : <Save size={18} />} {isSaving ? '儲存中...' : '儲存變更'}
                        </button>
                      ) : (
                        <button onClick={() => setIsEditing(true)} className="flex items-center gap-2 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-5 py-2 rounded-lg font-medium shadow-sm transition-colors">
                          <Edit size={18} /> 編輯資料
                        </button>
                      )
                    )}
                  </div>
                </header>

                <nav className="flex overflow-x-auto bg-white rounded-xl border border-slate-200 shadow-sm hide-scrollbar">
                  <TabButton active={activeTab === 'finance'} onClick={() => setActiveTab('finance')} icon={DollarSign} label="財務總表" />
                  {adminRole && <TabButton active={activeTab === 'members'} onClick={() => setActiveTab('members')} icon={ContactIcon} label="社員名單" />}
                  <TabButton active={activeTab === 'registration'} onClick={() => setActiveTab('registration')} icon={ListChecks} label="課程報名" />
                  {adminRole && <TabButton active={activeTab === 'invoice'} onClick={() => setActiveTab('invoice')} icon={FileText} label="經費核銷明細" />}
                  {adminRole && <TabButton active={activeTab === 'competition'} onClick={() => setActiveTab('competition')} icon={Trophy} label="積分競賽統計" />}
                </nav>

                <main className="pt-2">
                  {activeTab === 'finance' && <FinanceTab data={data} isEditing={isEditing} setData={setData} isAdmin={adminRole} />}
                  {adminRole && activeTab === 'members' && <MemberListTab data={data} isEditing={isEditing} setData={setData} />}
                  {activeTab === 'registration' && <RegistrationTab data={data} isEditing={isEditing} setData={setData} isAdmin={adminRole} />}
                  {adminRole && activeTab === 'invoice' && <InvoiceTab data={data} isEditing={isEditing} setData={setData} />}
                  {adminRole && activeTab === 'competition' && <CompetitionTab data={data} isEditing={isEditing} setData={setData} />}
                </main>
                
              </div>
            </div>
          );
        };

        import { createRoot } from "react-dom/client";

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
