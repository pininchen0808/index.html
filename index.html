<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 社團管理系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <!-- 關鍵：使用 data-type="module" 確保 Babel 不會將 import 轉為 require -->
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;
        
        // 從 Firebase 官方 CDN 匯入最新模組
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js';
        import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';

        // --- Firebase 配置區 ---
        // 如果妳在本地測試或 GitHub 上，請直接將妳的配置貼在下面的物件中
        const manualConfig = {
            apiKey: "你的",
            authDomain: "你的",
            projectId: "你的",
            storageBucket: "你的",
            messagingSenderId: "你的",
            appId: "你的"
        };

        // 自動判斷：優先使用環境變數，否則使用上面的手動配置
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : manualConfig;
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.__app_id || 'club-manager-2026';

        // 圖示組件：修正 Lucide 在 React 中的調用方式
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) {
                    window.lucide.createIcons(); 
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('accounting');
            const [transactions, setTransactions] = useState([]);
            const [courses, setCourses] = useState([]);
            const [points, setPoints] = useState([]);
            const [loading, setLoading] = useState(true);

            // 新增項目的 UI 狀態
            const [showAddTx, setShowAddTx] = useState(false);
            const [newTx, setNewTx] = useState({ 
                type: 'expense', amount: '', category: '老師費用', note: '', 
                date: new Date().toISOString().split('T')[0], isEstimated: false, isPaidByMe: false 
            });

            // 1. 處理身份認證
            useEffect(() => {
                const unsubAuth = onAuthStateChanged(auth, (u) => {
                    if (!u) {
                        signInAnonymously(auth).catch(err => console.error("登入失敗:", err));
                    }
                    setUser(u);
                });
                return () => unsubAuth();
            }, []);

            // 2. 監聽所有資料
            useEffect(() => {
                if (!user) return;
                
                // 交易紀錄
                const unsubTx = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setTransactions(data.sort((a, b) => new Date(b.date) - new Date(a.date)));
                    setLoading(false);
                });

                // 課程資料
                const unsubCourse = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'courses'), (snap) => {
                    setCourses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                // 積分紀錄
                const unsubPoints = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'points'), (snap) => {
                    setPoints(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubTx(); unsubCourse(); unsubPoints(); };
            }, [user]);

            // 3. 計算統計數值
            const stats = useMemo(() => {
                const income = transactions.filter(t => t.type === 'income' && !t.isEstimated).reduce((s, t) => s + Number(t.amount), 0);
                const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
                const pendingMyAdvance = transactions
                    .filter(t => t.type === 'expense' && t.isPaidByMe && !t.isReimbursedToMe)
                    .reduce((s, t) => s + Number(t.amount), 0);
                return { income, expense, balance: income - expense, pendingMyAdvance };
            }, [transactions]);

            const leaderboard = useMemo(() => {
                const groups = points.reduce((acc, p) => {
                    acc[p.team] = (acc[p.team] || 0) + Number(p.score);
                    return acc;
                }, {});
                return Object.entries(groups).sort((a, b) => b[1] - a[1]);
            }, [points]);

            // 操作：新增收支
            const handleAddTx = async (e) => {
                e.preventDefault();
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                        ...newTx, 
                        amount: Number(newTx.amount), 
                        isReimbursedToMe: false, 
                        timestamp: new Date().toISOString()
                    });
                    setShowAddTx(false);
                    setNewTx({ type: 'expense', amount: '', category: '老師費用', note: '', date: new Date().toISOString().split('T')[0], isEstimated: false, isPaidByMe: false });
                } catch (err) { 
                    alert("存檔失敗，請確認 Firebase 配置是否正確。");
                }
            };

            const handleToggleReimbursed = async (id, status) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', id), { isReimbursedToMe: !status });
            };

            if (loading && !user) return <div className="h-screen flex items-center justify-center text-slate-400 font-bold">系統連線中...</div>;

            return (
                <div className="min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-white border-b sticky top-0 z-30 px-6 py-4 shadow-sm backdrop-blur-md bg-white/80">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-indigo-600 p-2.5 rounded-2xl shadow-lg shadow-indigo-100">
                                    <Icon name="users" className="text-white" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-800">2026 社團管理</h1>
                                    <p className="text-[10px] text-emerald-500 font-bold uppercase tracking-widest flex items-center gap-1">
                                        <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> 雲端連線成功
                                    </p>
                                </div>
                            </div>
                            <div className="hidden md:block text-right border-l pl-6 border-slate-100">
                                <p className="text-[10px] text-slate-400 font-bold uppercase">抬頭: 天茂企管顧問有限公司</p>
                                <p className="text-sm font-black text-slate-700">統編: 89177254</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        {/* 導覽頁籤 */}
                        <div className="flex bg-slate-200/50 p-1.5 rounded-3xl mb-10 overflow-x-auto no-scrollbar shadow-inner">
                            {[
                                { id: 'accounting', label: '財務總表', icon: 'wallet', color: 'text-indigo-600' },
                                { id: 'courses', label: '課程報名', icon: 'book-open', color: 'text-blue-600' },
                                { id: 'points', label: '積分競賽', icon: 'trophy', color: 'text-amber-600' },
                            ].map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)} 
                                    className={`flex-1 flex items-center justify-center gap-2 px-6 py-3.5 rounded-2xl transition-all ${activeTab === tab.id ? 'bg-white shadow-xl text-slate-800 font-black scale-[1.02]' : 'text-slate-500 hover:bg-white/30'}`}
                                >
                                    <Icon name={tab.icon} className={activeTab === tab.id ? tab.color : ""} /> 
                                    <span className="text-sm">{tab.label}</span>
                                </button>
                            ))}
                        </div>

                        {activeTab === 'accounting' && (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard title="目前結餘" value={stats.balance} icon="wallet" color="text-indigo-600" bg="bg-indigo-50" />
                                    <StatCard title="待退款代墊" value={stats.pendingMyAdvance} icon="user-check" color="text-orange-600" bg="bg-orange-50" sub="社團應還我的錢" />
                                    <StatCard title="總收入" value={stats.income} icon="trending-up" color="text-emerald-600" bg="bg-emerald-50" />
                                    <StatCard title="總支出" value={stats.expense} icon="trending-down" color="text-rose-600" bg="bg-rose-50" />
                                </div>

                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <div className="p-8 flex justify-between items-center border-b">
                                        <h3 className="font-black text-slate-800 flex items-center gap-2"><Icon name="list" className="text-indigo-500"/> 收支明細</h3>
                                        <button onClick={() => setShowAddTx(true)} className="bg-indigo-600 text-white px-5 py-2.5 rounded-2xl text-sm font-bold flex items-center gap-2 shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                                            <Icon name="plus" /> 新增收支
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50/50 text-[10px] text-slate-400 font-black uppercase tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-4">日期</th>
                                                    <th className="px-8 py-4">項目</th>
                                                    <th className="px-8 py-4 text-right">金額</th>
                                                    <th className="px-8 py-4">狀態</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {transactions.map(tx => (
                                                    <tr key={tx.id} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-8 py-5 text-sm text-slate-500 font-medium">{tx.date}</td>
                                                        <td className="px-8 py-5">
                                                            <div className="flex flex-col gap-1">
                                                                <span className="text-sm font-bold text-slate-700">{tx.category}</span>
                                                                <div className="flex gap-2 items-center">
                                                                    <span className={`px-2 py-0.5 rounded text-[9px] font-black uppercase ${tx.type === 'income' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                                        {tx.type === 'income' ? '收入' : '支出'}
                                                                    </span>
                                                                    {tx.isPaidByMe && <span className="text-[9px] font-bold text-orange-500 flex items-center gap-1"><Icon name="user-check" size={10}/> 個人代墊</span>}
                                                                </div>
                                                            </div>
                                                        </td>
                                                        <td className={`px-8 py-5 text-sm font-black text-right ${tx.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                            {tx.type === 'income' ? '+' : '-'}${Number(tx.amount).toLocaleString()}
                                                        </td>
                                                        <td className="px-8 py-5">
                                                            {tx.isPaidByMe ? (
                                                                <button 
                                                                    onClick={() => handleToggleReimbursed(tx.id, tx.isReimbursedToMe)}
                                                                    className={`px-3 py-1.5 rounded-xl text-[10px] font-black flex items-center gap-1 transition-all ${tx.isReimbursedToMe ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600 hover:bg-orange-100'}`}
                                                                >
                                                                    <Icon name={tx.isReimbursedToMe ? "check-circle" : "alert-circle"} size={12} />
                                                                    {tx.isReimbursedToMe ? '已還我錢' : '尚未還我'}
                                                                </button>
                                                            ) : <span className="text-[10px] text-slate-300 italic">公費支出</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'points' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in fade-in duration-500">
                                <div className="lg:col-span-1 space-y-6">
                                    <h3 className="text-xl font-black text-slate-800 flex items-center gap-2"><Icon name="medal" className="text-amber-500"/> 積分排行榜</h3>
                                    <div className="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 space-y-6">
                                        {leaderboard.map(([team, score], idx) => (
                                            <div key={team} className="flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-black ${idx === 0 ? 'bg-amber-100 text-amber-600' : 'bg-slate-100 text-slate-400'}`}>{idx+1}</div>
                                                    <span className="font-bold text-slate-700">{team}</span>
                                                </div>
                                                <span className="text-xl font-black text-slate-800">{score} Pts</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="lg:col-span-2 text-center py-20 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-100">
                                    <Icon name="star" size={48} className="mx-auto mb-4 text-slate-200" />
                                    <p className="text-slate-400 font-bold">積分詳細紀錄模組</p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal: 新增收支 */}
                    {showAddTx && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-slate-800">新增紀錄</h2>
                                    <button onClick={() => setShowAddTx(false)} className="text-slate-300 hover:text-slate-500"><Icon name="x-circle" size={24}/></button>
                                </div>
                                <form onSubmit={handleAddTx} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <button type="button" onClick={() => setNewTx({...newTx, type:'income'})} className={`py-3 rounded-2xl font-black ${newTx.type === 'income' ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}`}>收入</button>
                                        <button type="button" onClick={() => setNewTx({...newTx, type:'expense'})} className={`py-3 rounded-2xl font-black ${newTx.type === 'expense' ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-400'}`}>支出</button>
                                    </div>
                                    <Input label="金額" type="number" value={newTx.amount} onChange={e => setNewTx({...newTx, amount: e.target.value})} required />
                                    <Input label="分類/備註" value={newTx.note} onChange={e => setNewTx({...newTx, note: e.target.value})} placeholder="例如：代墊吉他弦" />
                                    {newTx.type === 'expense' && (
                                        <div className="p-4 bg-orange-50 rounded-2xl flex items-center gap-3 border border-orange-100">
                                            <input type="checkbox" id="payMe" checked={newTx.isPaidByMe} onChange={e => setNewTx({...newTx, isPaidByMe: e.target.checked})} className="w-5 h-5 rounded border-slate-300 text-orange-500 focus:ring-orange-500" />
                                            <label htmlFor="payMe" className="text-sm font-bold text-orange-700">這筆由我先行代墊 (之後要還我錢)</label>
                                        </div>
                                    )}
                                    <button className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black mt-4 hover:bg-indigo-700 transition-all shadow-lg">確認儲存</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const StatCard = ({ title, value, icon, color, bg, sub }) => (
            <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 group hover:shadow-xl transition-all duration-300">
                <div className="flex justify-between items-start mb-4">
                    <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{title}</p>
                    <div className={`${bg} ${color} p-2 rounded-xl group-hover:scale-110 transition-transform`}><Icon name={icon} /></div>
                </div>
                <div className={`text-2xl font-black tracking-tighter ${color}`}>${Number(value).toLocaleString()}</div>
                {sub && <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{sub}</p>}
            </div>
        );

        const Input = ({ label, ...props }) => (
            <div className="space-y-1.5">
                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">{label}</label>
                <input className="w-full bg-slate-100 border-none rounded-2xl px-5 py-4 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none" {...props} />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
