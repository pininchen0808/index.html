<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一起大跳社 & 歐豆K社</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
      }
    }
    </script>
    
    <!-- 引入 Babel 讓瀏覽器可以即時編譯 JSX 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <div id="root"></div>

    <script type="text/babel" data-type="module">


      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyD9DTPO7obCqmDuwzLzwI_JZixTE4W3EhE",
        authDomain: "gis-club.firebaseapp.com",
        projectId: "gis-club",
        storageBucket: "gis-club.firebasestorage.app",
        messagingSenderId: "384627740491",
        appId: "1:384627740491:web:2727c4fbb8c8cf1ec362ce"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      window.firebaseDb = db;
      window.firebaseApi = { doc, onSnapshot, setDoc };
      window.dispatchEvent(new Event('firebase-ready'));


        import React, { useState, useEffect , useRef  } from "react";

        // ==========================================
        // 🔒 安全與權限設定：在此設定社長及副社長的 Google 信箱
        // ==========================================
        const ADMIN_EMAILS = [
          "your-email@gis.fcu.edu.tw",      // 💡 預設保留 (當包含此信箱時，所有人皆為管理權限，方便初次測試)
          "abbychaing@gis.fcu.edu.tw",  // 💡 社長 Abby 信箱
          "pininchen@gis.fcu.edu.tw",        // 💡 社長 品in 信箱
        ];


        // --- 1. 圖示元件 (Icons) ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const DollarSign = (p) => <Icon {...p} path='<line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>' />;
        const Users = (p) => <Icon {...p} path='<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' />;
        const FileText = (p) => <Icon {...p} path='<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>' />;
        const TrendingDown = (p) => <Icon {...p} path='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' />;
        const TrendingUp = (p) => <Icon {...p} path='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' />;
        const Calculator = (p) => <Icon {...p} path='<rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/>' />;
        const Edit = (p) => <Icon {...p} path='<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>' />;
        const Save = (p) => <Icon {...p} path='<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>' />;
        const Cloud = (p) => <Icon {...p} path='<path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>' />;
        const Plus = (p) => <Icon {...p} path='<line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>' />;
        const Trash2 = (p) => <Icon {...p} path='<polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line>' />;
        const ChevronDown = (p) => <Icon {...p} path='<polyline points="6 9 12 15 18 9"></polyline>' />;
        const ChevronUp = (p) => <Icon {...p} path='<polyline points="18 15 12 9 6 15"></polyline>' />;
        const ChevronLeft = (p) => <Icon {...p} path='<polyline points="15 18 9 12 15 6"></polyline>' />;
        const ChevronRight = (p) => <Icon {...p} path='<polyline points="9 18 15 12 9 6"></polyline>' />;
        const ReceiptIcon = (p) => <Icon {...p} path='<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-8"/><path d="M16 16h-8"/>' />;
        const Wallet = (p) => <Icon {...p} path='<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>' />;
        const Clock = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' />;
        const Briefcase = (p) => <Icon {...p} path='<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' />;
        const UserIcon = (p) => <Icon {...p} path='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' />;
        const Trophy = (p) => <Icon {...p} path='<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>' />;
        const Star = (p) => <Icon {...p} path='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' />;
        const ContactIcon = (p) => <Icon {...p} path='<rect width="16" height="18" x="4" y="3" rx="2" ry="2"/><path d="M9 11h6"/><path d="M9 15h6"/><path d="M12 7v.01"/>' />;
        const ListChecks = (p) => <Icon {...p} path='<path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/>' />;
        const LogOutIcon = (p) => <Icon {...p} path='<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>' />;
        const GoogleIcon = () => (
          <svg className="w-5 h-5 mr-2.5" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.11c-2.073-1.933-4.942-3.11-8.274-3.11C5.364 0 0 5.364 0 12s5.364 12 12 12c6.927 0 11.53-4.87 11.53-11.727 0-.789-.086-1.393-.19-1.988H12.24z"/>
          </svg>
        );

        // --- 2. 預設資料生成 ---
        const generateDefaultData = () => {
          const monthsData = [];
          for (let i = 3; i <= 12; i++) {
            if (i === 3) {
              monthsData.push({ id: 3, name: '3月', daTiao: { purpose: '社團補助金', budget: 2000, items: [] }, ouDouK: { purpose: '社團補助金', budget: 2000, items: [] } });
            } else {
              monthsData.push({ id: i, name: `${i}月`, daTiao: { purpose: '', budget: 0, items: [] }, ouDouK: { purpose: '', budget: 0, items: [] } });
            }
          }

          return {
            finance: { expenses: [], income: [] },
            course: { columns: [], members: [] },
            invoice: { company: { name: '天茂企管顧問有限公司', taxId: '89177254' }, months: monthsData },
            competition: { daTiao: { newMembers: 0, activities: 0, posts: [] }, ouDouK: { newMembers: 0, activities: 0, posts: [] } }
          };
        };

        const defaultData = generateDefaultData();

        // --- 3. 元件：財務總表 ---
        const FinanceTab = ({ data, isEditing, setData, isAdmin }) => {
          const totalExpense = data.finance.expenses.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const totalIncome = data.finance.income.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const balance = totalIncome + totalExpense;

          const daTiaoExpense = data.finance.expenses.filter(i => i.club === '大跳社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const ouDouKExpense = data.finance.expenses.filter(i => i.club === '歐豆K社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const daTiaoIncome = data.finance.income.filter(i => i.club === '大跳社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          const ouDouKIncome = data.finance.income.filter(i => i.club === '歐豆K社').reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
          
          const pinYinTotal = Math.abs(data.finance.expenses.filter(item => item.isPinYinPaid).reduce((sum, item) => sum + (Number(item.amount) || 0), 0));
          const pendingReceiptTotal = data.finance.income.filter(item => !item.isReceived).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);

          const handleChange = (type, index, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.finance[type][index][field] = value;
            setData(newData);
          };

          const addRow = (type) => {
            const newData = JSON.parse(JSON.stringify(data));
            if (type === 'expenses') newData.finance.expenses.push({ category: '', item: '', amount: 0, note: '', isPinYinPaid: false, club: '共用' });
            else newData.finance.income.push({ category: '', item: '', amount: 0, note: '', isReceived: false, club: '共用' });
            setData(newData);
          };

          const removeRow = (type, index) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.finance[type].splice(index, 1);
            setData(newData);
          };

          const Input = ({ val, field, index, type }) => (
            isEditing ? <input type="text" value={val} onChange={(e) => handleChange(type, index, field, e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" /> : <span>{val}</span>
          );

          const NumberInput = ({ val, field, index, type, textClass }) => (
            isEditing ? <input type="number" value={val} onChange={(e) => handleChange(type, index, field, e.target.value)} className="w-24 px-2 py-1 border border-blue-300 rounded text-right focus:ring-2 focus:ring-blue-500" /> : <span className={textClass}>{Number(val).toLocaleString()}</span>
          );

          return (
            <div className="space-y-8 animate-in fade-in duration-300">
              {/* 區塊 1：社團營運總覽 */}
              <div>
                <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2"><Briefcase size={22} className="text-blue-600"/> 社團營運帳戶</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3">
                    <div className="flex items-center gap-4">
                      <div className="p-3 bg-red-100 text-red-600 rounded-lg"><TrendingDown size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">總計支出</p><p className="text-2xl font-bold text-slate-800">{totalExpense.toLocaleString()}</p></div>
                    </div>
                    {/* 👑 僅管理員可看到雙社分帳 */}
                    {isAdmin && (
                      <div className="flex gap-2 text-xs border-t border-slate-100 pt-2 mt-auto">
                        <div className="flex-1 bg-blue-50/80 text-blue-700 px-2 py-1 rounded flex justify-between"><span>大跳社</span><span className="font-semibold text-sm">${daTiaoExpense.toLocaleString()}</span></div>
                        <div className="flex-1 bg-purple-50/80 text-purple-700 px-2 py-1 rounded flex justify-between"><span>歐豆K</span><span className="font-semibold text-sm">${ouDouKExpense.toLocaleString()}</span></div>
                      </div>
                    )}
                  </div>
                  <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-3">
                    <div className="flex items-center gap-4">
                      <div className="p-3 bg-green-100 text-green-600 rounded-lg"><TrendingUp size={24} /></div>
                      <div><p className="text-sm text-slate-500 font-medium">總計收入</p><p className="text-2xl font-bold text-slate-800">{totalIncome.toLocaleString()}</p></div>
                    </div>
                    {/* 👑 僅管理員可看到雙社分帳 */}
                    {isAdmin && (
                      <div className="flex gap-2 text-xs border-t border-slate-100 pt-2 mt-auto">
                        <div className="flex-1 bg-blue-50/80 text-blue-700 px-2 py-1 rounded flex justify-between"><span>大跳社</span><span className="font-semibold text-sm">${daTiaoIncome.toLocaleString()}</span></div>
                        <div className="flex-1 bg-purple-50/80 text-purple-700 px-2 py-1 rounded flex justify-between"><span>歐豆K</span><span className="font-semibold text-sm">${ouDouKIncome.toLocaleString()}</span></div>
                      </div>
                    )}
                  </div>
                  <div className={`p-6 rounded-xl border shadow-sm flex items-center gap-4 ${balance < 0 ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                    <div className={`p-3 rounded-lg ${balance < 0 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}><Calculator size={24} /></div>
                    <div><p className={`text-sm font-medium ${balance < 0 ? 'text-red-600/80' : 'text-green-600/80'}`}>目前結餘</p><p className={`text-2xl font-bold ${balance < 0 ? 'text-red-700' : 'text-green-700'}`}>{balance.toLocaleString()}</p></div>
                  </div>
                </div>
              </div>

              {/* 👑 僅有管理員（社長與副社長）可以看見個人代墊對帳區以及詳細收支細項表格 */}
              {isAdmin ? (
                <>
                  {/* 區塊 2：個人帳務管理 */}
                  <div>
                    <h3 className="text-lg font-bold text-slate-700 mb-4 flex items-center gap-2"><UserIcon size={22} className="text-amber-600"/> 個人帳務管理 (對帳專用)</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      <div className="bg-white p-6 rounded-xl border border-amber-200 bg-amber-50/30 shadow-sm flex items-center gap-4">
                        <div className="p-3 bg-amber-100 text-amber-600 rounded-lg"><Wallet size={24} /></div>
                        <div><p className="text-sm text-amber-700 font-medium">品in代墊總計 (需回收)</p><p className="text-2xl font-bold text-amber-900">${pinYinTotal.toLocaleString()}</p></div>
                      </div>
                      <div className="bg-white p-6 rounded-xl border border-blue-200 bg-blue-50/30 shadow-sm flex items-center gap-4">
                        <div className="p-3 bg-blue-100 text-blue-600 rounded-lg"><Clock size={24} /></div>
                        <div><p className="text-sm text-blue-700 font-medium">待收帳款總計 (尚未入帳)</p><p className="text-2xl font-bold text-blue-900">${pendingReceiptTotal.toLocaleString()}</p></div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 items-start">
                    {/* 支出明細 */}
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                      <div className="bg-slate-50 px-6 py-4 border-b border-slate-200"><h3 className="font-bold text-slate-800 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-red-500"></span>支出明細</h3></div>
                      <div className="overflow-x-auto p-4 flex-grow">
                        <table className="w-full text-sm text-left">
                          <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                            <tr><th className="px-4 py-3 w-20">社團</th><th className="px-4 py-3 w-1/4">類別</th><th className="px-4 py-3 w-1/3">項目</th><th className="px-4 py-3 text-right">金額</th><th className="px-4 py-3 w-20 text-center">品in代墊</th><th className="px-4 py-3">備註</th>{isEditing && <th className="px-2 py-3 w-10"></th>}</tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {data.finance.expenses.map((item, idx) => (
                              <tr key={idx} className={`hover:bg-slate-50 transition-colors ${item.isPinYinPaid ? 'bg-amber-50/30' : ''}`}>
                                <td className="px-4 py-2">
                                    {isEditing ? (
                                        <select value={item.club || '共用'} onChange={(e) => handleChange('expenses', idx, 'club', e.target.value)} className="w-full px-1 py-1 border border-blue-300 rounded text-xs focus:ring-2 focus:ring-blue-500">
                                            <option value="大跳社">大跳社</option><option value="歐豆K社">歐豆K社</option><option value="共用">共用</option>
                                        </select>
                                    ) : <span className={`inline-block px-2 py-1 rounded text-[10px] font-semibold whitespace-nowrap ${item.club === '大跳社' ? 'bg-blue-100 text-blue-700' : item.club === '歐豆K社' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}`}>{item.club || '共用'}</span>}
                                </td>
                                <td className="px-4 py-2"><Input val={item.category} field="category" index={idx} type="expenses"/></td>
                                <td className="px-4 py-2"><Input val={item.item} field="item" index={idx} type="expenses"/></td>
                                <td className="px-4 py-2 text-right font-medium"><NumberInput val={item.amount} field="amount" index={idx} type="expenses" textClass="text-red-600"/></td>
                                <td className="px-4 py-2 text-center">
                                  <input type="checkbox" checked={item.isPinYinPaid || false} onChange={(e) => handleChange('expenses', idx, 'isPinYinPaid', e.target.checked)} disabled={!isEditing} className="w-4 h-4 text-amber-600 rounded focus:ring-amber-500 cursor-pointer disabled:cursor-default" />
                                </td>
                                <td className="px-4 py-2 text-slate-500 text-xs"><Input val={item.note} field="note" index={idx} type="expenses"/></td>
                                {isEditing && <td className="px-2 py-2 text-center"><button onClick={() => removeRow('expenses', idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button></td>}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        {isEditing && <button onClick={() => addRow('expenses')} className="w-full mt-3 py-2 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded-lg flex justify-center items-center gap-2 transition-colors"><Plus size={16} /> 新增列</button>}
                      </div>
                    </div>

                    {/* 收入明細 */}
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                      <div className="bg-slate-50 px-6 py-4 border-b border-slate-200"><h3 className="font-bold text-slate-800 flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-green-500"></span>收入與補助明細</h3></div>
                      <div className="overflow-x-auto p-4 flex-grow">
                        <table className="w-full text-sm text-left">
                          <thead className="text-xs text-slate-500 uppercase bg-slate-50 border-b">
                            <tr><th className="px-4 py-3 w-20">社團</th><th className="px-4 py-3 w-1/4">類別</th><th className="px-4 py-3 w-1/3">項目</th><th className="px-4 py-3 text-right">金額</th><th className="px-4 py-3 w-20 text-center">已收款</th><th className="px-4 py-3">備註</th>{isEditing && <th className="px-2 py-3 w-10"></th>}</tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {data.finance.income.map((item, idx) => (
                              <tr key={idx} className={`hover:bg-slate-50 transition-colors ${!item.isReceived ? 'bg-blue-50/30' : ''}`}>
                                <td className="px-4 py-2">
                                    {isEditing ? (
                                        <select value={item.club || '共用'} onChange={(e) => handleChange('income', idx, 'club', e.target.value)} className="w-full px-1 py-1 border border-blue-300 rounded text-xs focus:ring-2 focus:ring-blue-500">
                                            <option value="大跳社">大跳社</option><option value="歐豆K社">歐豆K社</option><option value="共用">共用</option>
                                        </select>
                                    ) : <span className={`inline-block px-2 py-1 rounded text-[10px] font-semibold whitespace-nowrap ${item.club === '大跳社' ? 'bg-blue-100 text-blue-700' : item.club === '歐豆K社' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}`}>{item.club || '共用'}</span>}
                                </td>
                                <td className="px-4 py-2"><Input val={item.category} field="category" index={idx} type="income"/></td>
                                <td className="px-4 py-2"><Input val={item.item} field="item" index={idx} type="income"/></td>
                                <td className="px-4 py-2 text-right font-medium"><NumberInput val={item.amount} field="amount" index={idx} type="income" textClass="text-green-600"/></td>
                                <td className="px-4 py-2 text-center">
                                  <input type="checkbox" checked={item.isReceived || false} onChange={(e) => handleChange('income', idx, 'isReceived', e.target.checked)} disabled={!isEditing} className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 cursor-pointer disabled:cursor-default" />
                                </td>
                                <td className="px-4 py-2 text-slate-500 text-xs"><Input val={item.note} field="note" index={idx} type="income"/></td>
                                {isEditing && <td className="px-2 py-2 text-center"><button onClick={() => removeRow('income', idx)} className="text-red-400 hover:text-red-600"><Trash2 size={16}/></button></td>}
                              </tr>
                            ))}
                          </tbody>
                        </table>
                        {isEditing && <button onClick={() => addRow('income')} className="w-full mt-3 py-2 border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-500 hover:text-blue-500 rounded-lg flex justify-center items-center gap-2 transition-colors"><Plus size={16} /> 新增列</button>}
                      </div>
                    </div>
                  </div>
                </>
              ) : (
                <div className="bg-white p-6 rounded-xl border border-slate-200 text-center text-slate-500 text-xs">
                  🔒 詳細對帳與支出細項僅限社團幹部登入查看。
                </div>
              )}
            </div>
          );
        };

        // --- 4. 元件：社員名單 ---
        const MemberListTab = ({ data, isEditing, setData }) => {
          const [sortBy, setSortBy] = useState('default');

          const handleMemberChange = (id, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            const idx = newData.course.members.findIndex(m => m.id === id);
            if (idx > -1) { newData.course.members[idx][field] = value; setData(newData); }
          };

          const addMember = () => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.course.members.push({ id: `m_${Date.now()}`, name: '', department: '', type: '社員', registered: {}, payments: {} });
            setData(newData);
          };

          const removeMember = (id) => {
            if(!confirm("確定要刪除這位成員嗎？相關報名與繳費紀錄將會一併移除！")) return;
            const newData = JSON.parse(JSON.stringify(data));
            const idx = newData.course.members.findIndex(m => m.id === id);
            if (idx > -1) { newData.course.members.splice(idx, 1); setData(newData); }
          };

          // 排序邏輯
          const displayMembers = data.course.members.map((m, index) => ({ ...m, _origIndex: index }));
          if (sortBy === 'department') {
            const deptOrder = { "空資": 1, "統合": 2, "科管": 3, "天眼": 4, "管理": 5 };
            displayMembers.sort((a, b) => {
              const aVal = deptOrder[a.department] || 99;
              const bVal = deptOrder[b.department] || 99;
              if (aVal !== bVal) return aVal - bVal;
              return a._origIndex - b._origIndex; 
            });
          }

          return (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in duration-300">
              <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex flex-col md:flex-row justify-between md:items-center gap-4">
                <h3 className="font-bold text-slate-800 flex items-center gap-2"><ContactIcon size={20} className="text-blue-600" /> 社團成員名冊</h3>
                <div className="flex flex-wrap items-center gap-3">
                  <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="px-3 py-1.5 border border-slate-300 rounded-lg text-sm text-slate-700 bg-white">
                    <option value="default">依填入順序排序</option>
                    <option value="department">依部門排序</option>
                  </select>
                  {isEditing && (
                    <button onClick={addMember} className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded flex items-center gap-1 text-sm shadow-sm transition-colors">
                      <Plus size={16} /> 新增成員
                    </button>
                  )}
                </div>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm text-left">
                  <thead className="text-xs text-slate-500 bg-slate-100 border-b border-slate-200">
                    <tr>
                      <th className="px-6 py-4 font-semibold w-16 text-center">#</th>
                      <th className="px-4 py-4 font-semibold w-28">部門</th>
                      <th className="px-6 py-4 font-semibold w-32">姓名</th>
                      <th className="px-6 py-4 font-semibold w-32">身分</th>
                      <th className="px-6 py-4 font-semibold w-32 text-right">累計繳費</th>
                      <th className="px-6 py-4 font-semibold">課程報名紀錄</th>
                      {isEditing && <th className="px-6 py-4 text-center w-20">操作</th>}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {displayMembers.map((member, idx) => {
                      const totalPaid = Object.values(member.payments || {}).reduce((sum, val) => sum + (Number(val) || 0), 0);
                      const enrolledCourses = data.course.columns.filter(c => member.registered && member.registered[c.id]);

                      return (
                        <tr key={member.id} className="hover:bg-slate-50 transition-colors">
                          <td className="px-6 py-4 text-center text-slate-400">{idx + 1}</td>
                          <td className="px-4 py-4">
                            {isEditing ? (
                              <select value={member.department || ''} onChange={(e) => handleMemberChange(member.id, 'department', e.target.value)} className="w-full px-1 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                                <option value="">無</option><option value="空資">空資</option><option value="統合">統合</option><option value="科管">科管</option><option value="天眼">天眼</option><option value="管理">管理</option>
                              </select>
                            ) : <span className="px-2 py-1 rounded text-xs font-semibold bg-slate-100 text-slate-600">{member.department || '-'}</span>}
                          </td>
                          <td className="px-6 py-4">
                            {isEditing ? <input type="text" value={member.name} onChange={(e) => handleMemberChange(member.id, 'name', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2 focus:ring-blue-500" placeholder="姓名" /> : <span className="font-medium text-slate-800">{member.name || '-'}</span>}
                          </td>
                          <td className="px-6 py-4">
                            {isEditing ? (
                              <select value={member.type || '社員'} onChange={(e) => handleMemberChange(member.id, 'type', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-500">
                                <option value="社員">社員</option><option value="非社員">非社員</option>
                              </select>
                            ) : <span className={`px-2 py-1 rounded text-xs font-semibold ${member.type === '非社員' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{member.type || '社員'}</span>}
                          </td>
                          <td className="px-6 py-4 text-right font-bold text-blue-700">${totalPaid.toLocaleString()}</td>
                          <td className="px-6 py-4">
                            <div className="flex flex-wrap gap-2">
                                {enrolledCourses.length > 0 ? enrolledCourses.map(c => (
                                    <span key={c.id} className="px-2.5 py-1 bg-indigo-50 border border-indigo-100 text-indigo-700 rounded-md text-xs font-medium truncate max-w-[120px]" title={c.name}>{c.name.split(' ')[0]}</span>
                                )) : <span className="text-slate-400 text-xs italic">尚未報名</span>}
                            </div>
                          </td>
                          {isEditing && <td className="px-6 py-4 text-center"><button onClick={() => removeMember(member.id)} className="text-red-400 hover:text-red-600 p-1.5"><Trash2 size={18}/></button></td>}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        };

        // --- 5. 元件：課程報名 (矩陣) ---
        const RegistrationTab = ({ data, isEditing, setData, isAdmin }) => {
          const handleColumnPriceChange = (colId, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            const colIndex = newData.course.columns.findIndex(c => c.id === colId);
            if (colIndex > -1) { newData.course.columns[colIndex][field] = Number(value); setData(newData); }
          };

          const handleColumnNameChange = (colId, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            const colIndex = newData.course.columns.findIndex(c => c.id === colId);
            if (colIndex > -1) { newData.course.columns[colIndex].name = value; setData(newData); }
          };

          const addColumn = () => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.course.columns.push({ id: `c_${Date.now()}`, name: '新課程', memberPrice: 150, nonMemberPrice: 400 });
            setData(newData);
          };

          const removeColumn = (colId) => {
            if(!confirm("確定要刪除這堂課程嗎？相關的報名與繳費紀錄將會一併移除！")) return;
            const newData = JSON.parse(JSON.stringify(data));
            newData.course.columns = newData.course.columns.filter(c => c.id !== colId);
            newData.course.members.forEach(m => {
              if (m.registered) delete m.registered[colId];
              if (m.payments) delete m.payments[colId];
            });
            setData(newData);
          };

          const moveColumn = (index, direction) => {
            const newData = JSON.parse(JSON.stringify(data));
            const cols = newData.course.columns;
            if (direction === 'left' && index > 0) [cols[index - 1], cols[index]] = [cols[index], cols[index - 1]];
            else if (direction === 'right' && index < cols.length - 1) [cols[index + 1], cols[index]] = [cols[index], cols[index + 1]];
            setData(newData);
          };

          const handleRegChange = (idx, colId, checked) => {
            const newData = JSON.parse(JSON.stringify(data));
            const member = newData.course.members[idx];
            const col = newData.course.columns.find(c => c.id === colId);
            if (!member.registered) member.registered = {};
            if (!member.payments) member.payments = {};
            member.registered[colId] = checked;
            
            // 自動帶入預設金額
            if (checked && (!member.payments[colId] || member.payments[colId] === 0)) {
                member.payments[colId] = member.type === '社員' ? (col.memberPrice || 0) : (col.nonMemberPrice || 0);
            } else if (!checked) {
                member.payments[colId] = 0;
            }
            setData(newData);
          };

          const handlePaymentChange = (idx, colId, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            if (!newData.course.members[idx].payments) newData.course.members[idx].payments = {};
            newData.course.members[idx].payments[colId] = Number(value);
            setData(newData);
          };

          const totals = {};
          data.course.columns.forEach(col => {
            totals[col.id] = data.course.members.reduce((sum, m) => sum + (Number(m.payments?.[col.id]) || 0), 0);
          });

          // 🔒 一般社員無法進行任何欄位之編輯
          const allowEdit = isAdmin ? isEditing : false;

          return (
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in duration-300">
              <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                <h3 className="font-bold text-slate-800 flex items-center gap-2"><ListChecks size={20} className="text-blue-600" /> 課程報名與出缺勤紀錄</h3>
                {allowEdit && <span className="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-medium">提示：打勾報名時，系統會自動帶入該課程的預設費用。</span>}
                {!isAdmin && <span className="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-medium">🔒 唯讀模式 (僅限查看自己與他人之報名狀態)</span>}
              </div>
              <div className="overflow-x-auto max-h-[75vh]">
                <table className="w-full text-sm text-left whitespace-nowrap min-w-max">
                  <thead className="text-xs text-slate-500 bg-slate-100 border-b border-slate-200 sticky top-0 z-20">
                    <tr>
                      <th style={{ width: '48px', minWidth: '48px', left: '0px' }} className="px-2 py-4 font-semibold sticky bg-slate-100 z-30 border-r border-slate-200 text-center">#</th>
                      <th style={{ width: '96px', minWidth: '96px', left: '48px' }} className="px-2 py-4 font-semibold sticky bg-slate-100 z-30 border-r border-slate-200">名單</th>
                      <th style={{ width: '80px', minWidth: '80px', left: '144px' }} className="px-2 py-4 font-semibold sticky bg-slate-100 z-30 border-r border-slate-200 text-center">身分</th>
                      {data.course.columns.map((col, colIdx) => (
                        <th key={col.id} className="px-2 py-2 font-semibold text-center bg-blue-50 border-r border-slate-200 min-w-[90px] align-top">
                          {allowEdit ? (
                            <div className="flex flex-col gap-1 mt-1 relative">
                              <div className="flex justify-between items-center px-1 mb-1">
                                <button onClick={() => moveColumn(colIdx, 'left')} disabled={colIdx === 0} className="text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronLeft size={14}/></button>
                                <button onClick={() => removeColumn(col.id)} className="text-red-400 hover:text-red-600"><Trash2 size={14}/></button>
                                <button onClick={() => moveColumn(colIdx, 'right')} disabled={colIdx === data.course.columns.length - 1} className="text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronRight size={14}/></button>
                              </div>
                              <input type="text" value={col.name} onChange={(e) => handleColumnNameChange(col.id, e.target.value)} className="w-full px-1 py-1 border border-blue-300 rounded text-center text-xs font-bold focus:ring-1 focus:ring-blue-500" placeholder="日期 課程名稱" />
                              <div className="flex items-center justify-center gap-1 mt-1 text-[10px]">
                                <span className="text-slate-500 w-5 text-right">社$</span>
                                <input type="number" value={col.memberPrice ?? ''} onChange={(e) => handleColumnPriceChange(col.id, 'memberPrice', e.target.value)} className="w-10 px-1 py-0.5 border border-blue-300 rounded text-center focus:ring-1" />
                              </div>
                              <div className="flex items-center justify-center gap-1 text-[10px]">
                                <span className="text-amber-600 w-5 text-right">非$</span>
                                <input type="number" value={col.nonMemberPrice ?? ''} onChange={(e) => handleColumnPriceChange(col.id, 'nonMemberPrice', e.target.value)} className="w-10 px-1 py-0.5 border border-blue-300 rounded text-center focus:ring-1" />
                              </div>
                            </div>
                          ) : (
                            <>
                              <div className="mb-1">{col.name.split(' ').map((line, i) => <div key={i}>{line}</div>)}</div>
                              <div className="text-[10px] text-slate-500 mt-1 font-normal bg-white/50 rounded py-0.5 px-1 shadow-sm border border-slate-100 inline-block">社${col.memberPrice || 0} / 非${col.nonMemberPrice || 0}</div>
                            </>
                          )}
                        </th>
                      ))}
                      {allowEdit && (
                        <th className="px-2 py-2 bg-slate-50 border-r border-slate-200 min-w-[70px] align-middle">
                          <button onClick={addColumn} className="w-full h-full min-h-[60px] flex flex-col items-center justify-center gap-1 border-2 border-dashed border-blue-400 rounded-lg text-blue-600 hover:bg-blue-100"><Plus size={16}/><span className="text-[10px] font-bold">加課程</span></button>
                        </th>
                      )}
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {data.course.members.map((member, idx) => (
                      <tr key={member.id} className="hover:bg-slate-50 transition-colors">
                        <td style={{ width: '48px', minWidth: '48px', left: '0px' }} className="px-2 py-3 text-center text-slate-400 sticky bg-white group-hover:bg-slate-50 border-r border-slate-100 z-10">{idx + 1}</td>
                        <td style={{ width: '96px', minWidth: '96px', left: '48px' }} className="px-2 py-3 sticky bg-white group-hover:bg-slate-50 border-r border-slate-100 font-medium text-slate-800 z-10 truncate">{member.name || '-'}</td>
                        <td style={{ width: '80px', minWidth: '80px', left: '144px' }} className="px-2 py-3 sticky bg-white group-hover:bg-slate-50 border-r border-slate-100 text-center z-10">
                            <span className={`px-2 py-1 rounded text-[10px] font-semibold tracking-wider ${member.type === '非社員' ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-600'}`}>{member.type || '社員'}</span>
                        </td>
                        {data.course.columns.map(col => {
                          const isReg = member.registered?.[col.id] || false;
                          const amount = member.payments?.[col.id] || 0;
                          return (
                            <td key={col.id} className="px-2 py-2 text-center border-r border-slate-100 align-middle">
                                {allowEdit ? (
                                    <div className="flex flex-col items-center justify-center gap-1.5">
                                        <label className="flex items-center gap-1 cursor-pointer hover:bg-slate-100 px-2 py-1 rounded">
                                            <input type="checkbox" checked={isReg} onChange={(e) => handleRegChange(idx, col.id, e.target.checked)} className="w-4 h-4 text-blue-600 rounded cursor-pointer" />
                                            <span className="text-xs font-medium text-slate-600 select-none">報名</span>
                                        </label>
                                        {isReg && (
                                            <div className="flex items-center gap-1 bg-white border border-blue-200 rounded px-1 shadow-sm">
                                                <span className="text-xs text-slate-400 font-medium">$</span>
                                                <input type="number" value={amount} onChange={(e) => handlePaymentChange(idx, col.id, e.target.value)} className="w-12 py-0.5 text-xs text-center focus:outline-none" />
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="flex items-center justify-center h-full">
                                        {isReg ? (amount > 0 ? <span className="inline-flex items-center gap-1 px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-bold shadow-sm"><span className="text-[10px]">✓</span>${amount}</span> : <span className="inline-flex items-center gap-1 px-2 py-1 bg-amber-100 text-amber-700 rounded text-xs font-bold shadow-sm"><span className="text-[10px]">✓</span>未繳</span>) : <span className="text-slate-300">-</span>}
                                    </div>
                                )}
                            </td>
                          );
                        })}
                        {allowEdit && <td className="border-r border-slate-100 bg-slate-50"></td>}
                      </tr>
                    ))}
                  </tbody>
                  <tfoot className="bg-slate-50 border-t-2 border-slate-200 font-semibold text-slate-800 sticky bottom-0 z-20">
                    <tr>
                      <td colSpan="3" style={{ left: '0px' }} className="px-4 py-4 text-right sticky bg-slate-50 border-r border-slate-200 shadow-[2px_0_5px_rgba(0,0,0,0.02)] z-10">總計收費：</td>
                      {data.course.columns.map(col => <td key={`total-${col.id}`} className="px-4 py-4 text-center text-blue-700 border-r border-slate-200">${totals[col.id].toLocaleString()}</td>)}
                      {allowEdit && <td className="border-r border-slate-200 bg-slate-50"></td>}
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          );
        };

        // --- 6. 元件：經費核銷 (雙社團版) ---
        const InvoiceTab = ({ data, isEditing, setData }) => {
          const [expandedMonths, setExpandedMonths] = useState({ 4: true });

          const toggleMonth = (monthId) => setExpandedMonths(prev => ({ ...prev, [monthId]: !prev[monthId] }));
          const handleMonthInfoChange = (monthIdx, clubKey, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey][field] = value;
            setData(newData);
          };
          const handleItemChange = (monthIdx, clubKey, itemIdx, field, value) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey].items[itemIdx][field] = value;
            setData(newData);
          };
          const addItem = (monthIdx, clubKey) => {
            const newData = JSON.parse(JSON.stringify(data));
            if(!newData.invoice.months[monthIdx][clubKey].items) newData.invoice.months[monthIdx][clubKey].items = [];
            newData.invoice.months[monthIdx][clubKey].items.push({ category: '', amount: 0, payer: '' });
            setData(newData);
          };
          const removeItem = (monthIdx, clubKey, itemIdx) => {
            const newData = JSON.parse(JSON.stringify(data));
            newData.invoice.months[monthIdx][clubKey].items.splice(itemIdx, 1);
            setData(newData);
          };

          const renderClubInvoicePanel = (monthData, monthIdx, clubKey, clubName, headerColors) => {
              const clubInfo = monthData[clubKey] || { purpose: '', budget: 0, items: [] };
              const items = clubInfo.items || [];
              const totalAmount = items.reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
              const budget = Number(clubInfo.budget) || 0;
              const shortfall = budget - totalAmount;
              const hasItems = items.length > 0;

              return (
                  <div className="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm flex flex-col">
                      <div className={`px-4 py-3 flex justify-between items-center text-white ${headerColors}`}>
                          <span className="font-bold flex items-center gap-2"><Star size={16}/> {clubName}</span>
                      </div>
                      <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                          {isEditing ? (
                              <div className="flex flex-col xl:flex-row gap-3 xl:items-center">
                                  <input type="text" placeholder="輸入補助目的 (如:博覽會)" value={clubInfo.purpose || ''} onChange={(e) => handleMonthInfoChange(monthIdx, clubKey, 'purpose', e.target.value)} className="flex-1 px-3 py-1.5 border border-blue-300 rounded text-sm focus:ring-2 focus:ring-blue-500" />
                                  <div className="flex items-center gap-2">
                                    <span className="text-sm text-slate-500 whitespace-nowrap">補助額度:</span>
                                    <input type="number" placeholder="金額" value={clubInfo.budget || 0} onChange={(e) => handleMonthInfoChange(monthIdx, clubKey, 'budget', e.target.value)} className="w-28 px-3 py-1.5 border border-blue-300 rounded text-sm text-right focus:ring-2 focus:ring-blue-500" />
                                  </div>
                              </div>
                          ) : (
                              <div className="flex justify-between items-center text-sm">
                                  <span className="text-slate-700 font-medium">{clubInfo.purpose || '尚未設定目的'}</span>
                                  <span className="text-slate-500">補助額度: <strong className="text-slate-800 text-base">${budget.toLocaleString()}</strong></span>
                              </div>
                          )}
                      </div>
                      <div className="flex-1 overflow-x-auto">
                          {(hasItems || isEditing) ? (
                              <table className="w-full text-sm text-left min-w-[400px]">
                                  <thead className="text-xs text-slate-500 bg-slate-50 border-b">
                                      <tr>
                                          <th className="px-4 py-2 w-10 text-center">#</th>
                                          <th className="px-4 py-2">項目 / 備註</th>
                                          <th className="px-4 py-2 text-right">金額</th>
                                          <th className="px-4 py-2 w-24">提供人</th>
                                          {isEditing && <th className="px-2 py-2 w-10 text-center">操作</th>}
                                      </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-100">
                                      {items.map((item, itemIdx) => (
                                          <tr key={itemIdx} className="hover:bg-slate-50">
                                              <td className="px-4 py-2 text-center text-slate-400">{itemIdx + 1}</td>
                                              <td className="px-4 py-2">{isEditing ? <input type="text" value={item.category} onChange={(e) => handleItemChange(monthIdx, clubKey, itemIdx, 'category', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2" /> : item.category}</td>
                                              <td className="px-4 py-2 text-right font-medium text-slate-800">{isEditing ? <input type="number" value={item.amount} onChange={(e) => handleItemChange(monthIdx, clubKey, itemIdx, 'amount', e.target.value)} className="w-20 px-2 py-1 border border-blue-300 rounded text-right focus:ring-2" /> : `$${Number(item.amount).toLocaleString()}`}</td>
                                              <td className="px-4 py-2 text-slate-600">{isEditing ? <input type="text" value={item.payer} onChange={(e) => handleItemChange(monthIdx, clubKey, itemIdx, 'payer', e.target.value)} className="w-full px-2 py-1 border border-blue-300 rounded focus:ring-2" /> : item.payer}</td>
                                              {isEditing && <td className="px-2 py-2 text-center"><button onClick={() => removeItem(monthIdx, clubKey, itemIdx)} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={16}/></button></td>}
                                          </tr>
                                      ))}
                                  </tbody>
                              </table>
                          ) : <div className="py-8 text-center text-slate-400"><p className="text-sm">尚未有核銷紀錄</p></div>}
                      </div>
                      {isEditing && <div className="px-4 py-2 border-t border-slate-100 bg-slate-50"><button onClick={() => addItem(monthIdx, clubKey)} className="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center gap-1 transition-colors"><Plus size={16} /> 新增明細</button></div>}
                      <div className="bg-slate-100 flex justify-between items-center text-sm border-t border-slate-200 mt-auto">
                          <div className="px-4 py-3 flex-1 flex justify-between items-center"><span className="font-bold text-slate-500 tracking-wider">總計花費</span><span className="font-bold text-lg text-slate-900">${totalAmount.toLocaleString()}</span></div>
                          <div className={`px-4 py-3 flex-1 flex justify-between items-center border-l border-white/50 ${shortfall >= 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                              <span className="font-bold tracking-wider">{shortfall >= 0 ? '餘額' : '超額 (缺)'}</span><span className="font-bold text-lg">{shortfall.toLocaleString()}</span>
                          </div>
                      </div>
                  </div>
              );
          };

          return (
            <div className="space-y-6 pb-20 animate-in fade-in duration-300">
              <div className="bg-white rounded-xl border border-slate-200 p-6 text-slate-800 shadow-sm flex items-center justify-between">
                <div>
                  <h2 className="text-3xl font-extrabold tracking-tight mb-2 flex items-center gap-2"><ReceiptIcon size={28} className="text-blue-600" />統編：<span className="font-mono">{data.invoice.company.taxId}</span></h2>
                  <p className="text-slate-500 text-sm font-medium bg-slate-100 inline-block px-3 py-1 rounded-md">抬頭：{data.invoice.company.name}</p>
                </div>
                <div className="hidden md:block opacity-20 text-slate-500"><FileText size={80} /></div>
              </div>
              <div className="space-y-4">
                {data.invoice.months.map((monthData, monthIdx) => {
                  const isExpanded = expandedMonths[monthData.id] || false;
                  const daTiaoTotal = (monthData.daTiao?.items || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                  const ouDouKTotal = (monthData.ouDouK?.items || []).reduce((sum, item) => sum + (Number(item.amount) || 0), 0);
                  const combinedTotal = daTiaoTotal + ouDouKTotal;
                  return (
                    <div key={monthData.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden transition-all duration-300">
                      <div onClick={() => toggleMonth(monthData.id)} className={`px-6 py-4 flex flex-wrap items-center justify-between cursor-pointer hover:bg-slate-50 select-none ${isExpanded ? 'bg-blue-50/50 border-b border-blue-200' : ''}`}>
                        <div className="flex items-center gap-4">
                          <h3 className="font-bold text-xl text-blue-900 w-16">{monthData.name}</h3>
                          {!isExpanded && <span className="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full">雙社團獨立核銷區塊</span>}
                        </div>
                        <div className="flex items-center gap-6 mt-2 md:mt-0">
                          {!isExpanded && combinedTotal > 0 && <div className="text-sm text-slate-500">整月合計核銷: <strong className="text-slate-800">${combinedTotal.toLocaleString()}</strong></div>}
                          <div className="text-slate-400">{isExpanded ? <ChevronUp size={20} /> : <ChevronDown size={20} />}</div>
                        </div>
                      </div>
                      {isExpanded && (
                        <div className="p-4 lg:p-6 bg-slate-50/50 animate-in slide-in-from-top-2 duration-200">
                          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                              {renderClubInvoicePanel(monthData, monthIdx, 'daTiao', '一起大跳社', 'bg-gradient-to-r from-blue-600 to-blue-700')}
                              {renderClubInvoicePanel(monthData, monthIdx, 'ouDouK', '歐豆K社', 'bg-gradient-to-r from-purple-600 to-purple-700')}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        };

        // --- 7. 元件：積分競賽統計 ---
        const CompetitionTab = ({ data, isEditing, setData }) => {
          const getNewMemberScore = (count) => count >= 11 ? 4 : count >= 7 ? 3 : count >= 4 ? 2 : count >= 1 ? 1 : 0;
          const getActivityScore = (count) => count >= 7 ? 4 : count >= 5 ? 3 : count >= 3 ? 2 : count >= 1 ? 1 : 0;
          const getPostScore = (count) => count >= 16 ? 4 : count >= 11 ? 3 : count >= 6 ? 2 : count >= 1 ? 1 : 0;
          
          const handleCountChange = (club, field, value) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club][field] = Number(value);
              setData(newData);
          };
          const addPost = (club) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club].posts.push({ date: '', title: '' });
              setData(newData);
          };
          const removePost = (club, idx) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club].posts.splice(idx, 1);
              setData(newData);
          };
          const handlePostChange = (club, idx, field, value) => {
              const newData = JSON.parse(JSON.stringify(data));
              newData.competition[club].posts[idx][field] = value;
              setData(newData);
          };

          const renderClubPanel = (clubKey, clubName, headerColor, iconColor) => {
              const clubData = data.competition[clubKey];
              const membersCount = clubData.newMembers || 0;
              const activitiesCount = clubData.activities || 0;
              const postsCount = clubData.posts ? clubData.posts.length : 0;
              const totalScore = getNewMemberScore(membersCount) + getActivityScore(activitiesCount) + getPostScore(postsCount);
              return (
                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col h-full">
                      <div className={`px-6 py-4 border-b flex justify-between items-center text-white ${headerColor}`}>
                          <h3 className="font-bold text-lg flex items-center gap-2"><Star size={20} className="fill-current text-white/80" /> {clubName}</h3>
                          <div className="bg-white/20 px-3 py-1 rounded-full text-sm font-semibold tracking-wide">總積分: {totalScore}</div>
                      </div>
                      <div className="p-6 space-y-6">
                          <div className="grid grid-cols-2 gap-4">
                              <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 flex flex-col justify-between">
                                  <div className="text-sm text-slate-500 font-medium mb-2">新增社員數</div>
                                  <div className="flex justify-between items-end">
                                      {isEditing ? <input type="number" min="0" value={membersCount} onChange={(e) => handleCountChange(clubKey, 'newMembers', e.target.value)} className="w-16 px-2 py-1 border border-blue-300 rounded text-center focus:ring-2" /> : <span className="text-2xl font-bold text-slate-800">{membersCount}<span className="text-sm font-normal text-slate-500 ml-1">人</span></span>}
                                      <span className={`text-lg font-bold ${getNewMemberScore(membersCount) > 0 ? iconColor : 'text-slate-300'}`}>+{getNewMemberScore(membersCount)}</span>
                                  </div>
                              </div>
                              <div className="bg-slate-50 p-4 rounded-lg border border-slate-100 flex flex-col justify-between">
                                  <div className="text-sm text-slate-500 font-medium mb-2">辦理活動次數</div>
                                  <div className="flex justify-between items-end">
                                      {isEditing ? <input type="number" min="0" value={activitiesCount} onChange={(e) => handleCountChange(clubKey, 'activities', e.target.value)} className="w-16 px-2 py-1 border border-blue-300 rounded text-center focus:ring-2" /> : <span className="text-2xl font-bold text-slate-800">{activitiesCount}<span className="text-sm font-normal text-slate-500 ml-1">次</span></span>}
                                      <span className={`text-lg font-bold ${getActivityScore(activitiesCount) > 0 ? iconColor : 'text-slate-300'}`}>+{getActivityScore(activitiesCount)}</span>
                                  </div>
                              </div>
                          </div>
                          <div>
                              <div className="flex justify-between items-center mb-3">
                                  <div className="flex items-center gap-2"><h4 className="font-bold text-slate-700">平台發文日誌</h4><span className="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">共 {postsCount} 篇</span></div>
                                  <span className={`text-lg font-bold ${getPostScore(postsCount) > 0 ? iconColor : 'text-slate-300'}`}>+{getPostScore(postsCount)}</span>
                              </div>
                              <div className="border border-slate-200 rounded-lg overflow-x-auto">
                                  <table className="w-full text-sm text-left min-w-[400px]">
                                      <thead className="text-xs text-slate-500 bg-slate-50 border-b"><tr><th className="px-4 py-2 w-10 text-center">#</th><th className="px-4 py-2 w-32">日期</th><th className="px-4 py-2">主題</th>{isEditing && <th className="px-2 py-2 w-10"></th>}</tr></thead>
                                      <tbody className="divide-y divide-slate-100">
                                          {clubData.posts && clubData.posts.map((post, idx) => (
                                              <tr key={idx} className="hover:bg-slate-50">
                                                  <td className="px-4 py-2 text-center text-slate-400">{idx + 1}</td>
                                                  <td className="px-4 py-2">{isEditing ? <input type="date" value={post.date} onChange={(e) => handlePostChange(clubKey, idx, 'date', e.target.value)} className="w-full px-1 py-1 border rounded" /> : post.date}</td>
                                                  <td className="px-4 py-2">{isEditing ? <input type="text" value={post.title} onChange={(e) => handlePostChange(clubKey, idx, 'title', e.target.value)} className="w-full px-2 py-1 border rounded" /> : post.title}</td>
                                                  {isEditing && <td className="px-2 py-2 text-center"><button onClick={() => removePost(clubKey, idx)} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={16}/></button></td>}
                                              </tr>
                                          ))}
                                          {(!clubData.posts || clubData.posts.length === 0) && !isEditing && <tr><td colSpan="4" className="px-4 py-6 text-center text-slate-400">尚未新增任何紀錄</td></tr>}
                                      </tbody>
                                  </table>
                                  {isEditing && <div className="p-2 bg-slate-50 border-t border-slate-100"><button onClick={() => addPost(clubKey)} className="w-full py-1.5 border-2 border-dashed border-slate-300 text-slate-500 hover:bg-blue-500 rounded text-sm flex justify-center items-center gap-1 transition-colors"><Plus size={16} /> 新增發文紀錄</button></div>}
                              </div>
                          </div>
                      </div>
                  </div>
              );
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-300">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {renderClubPanel('daTiao', '一起大跳社', 'bg-gradient-to-r from-blue-600 to-blue-700', 'text-blue-600')}
                {renderClubPanel('ouDouK', '歐豆K社', 'bg-gradient-to-r from-purple-600 to-purple-700', 'text-purple-600')}
              </div>
              <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm mt-6">
                <div className="flex items-center gap-3 mb-4"><Trophy size={28} className="text-amber-500" /><h2 className="text-2xl font-bold text-slate-800">積分競賽規則</h2></div>
                <div className="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6"><p className="font-bold text-amber-800 flex flex-wrap gap-6 text-lg justify-center md:justify-start"><span>🥇 第一名: 5,000 元</span><span>🥈 第二名: 3,000 元</span><span>🥉 第三名: 2,000 元</span></p></div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-sm">
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                    <h4 className="font-bold text-blue-700 mb-2 flex items-center gap-2"><UserIcon size={16}/> 新增成員數量</h4>
                    <p className="text-slate-500 mb-3 text-xs">需於首次參與活動時於平台介紹。</p>
                    <ul className="space-y-1 text-slate-600"><li>• 1~3人：1 分</li><li>• 4~6人：2 分</li><li>• 7~10人：3 分</li><li>• 11人以上：4 分</li></ul>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                    <h4 className="font-bold text-green-700 mb-2 flex items-center gap-2"><Briefcase size={16}/> 辦理活動次數</h4>
                    <p className="text-slate-500 mb-3 text-xs">需發表含照片貼文。</p>
                    <ul className="space-y-1 text-slate-600"><li>• 1~2次：1 分</li><li>• 3~4次：2 分</li><li>• 5~6次：3 分</li><li>• 7次以上：4 分</li></ul>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                    <h4 className="font-bold text-purple-700 mb-2 flex items-center gap-2"><FileText size={16}/> 平台發文</h4>
                    <p className="text-slate-500 mb-3 text-xs">含照片附件且字數達100字。</p>
                    <ul className="space-y-1 text-slate-600"><li>• 1~5篇：1 分</li><li>• 6~10篇：2 分</li><li>• 11~15篇：3 分</li><li>• 16篇以上：4 分</li></ul>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const TabButton = ({ active, icon: Icon, label, onClick }) => (
          <button onClick={onClick} className={`flex items-center gap-2 px-4 py-3 sm:px-6 sm:py-4 text-xs sm:text-sm font-medium transition-colors border-b-2 whitespace-nowrap ${active ? 'border-blue-600 text-blue-600 bg-blue-50/50' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}><Icon size={18} className="hidden sm:block" /> {label}</button>
        );

        // --- 🔒 安全檢查輔助函式：判斷當前登入之用戶是否為社長或副社長 ---
        const checkIsAdmin = (user) => {
          if (!user) return false;
          // 若信箱清單仍包含初始範例，則自動放行所有登入者（方便幹部初次部署及測試使用）
          if (ADMIN_EMAILS.includes("your-email@gmail.com")) {
            return true;
          }
          return ADMIN_EMAILS.includes(user.email);
        };

        // --- 8. 主應用程式 (App) 與自動修復邏輯 ---
        const App = () => {
          const [activeTab, setActiveTab] = useState('finance');
          const [data, setData] = useState(null);
          const [isEditing, setIsEditing] = useState(false);
          const [isSaving, setIsSaving] = useState(false);
          const [currentUser, setCurrentUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const autoFixAttempted = useRef(false);

          // 監聽 Firebase 登入狀態變更
          useEffect(() => {
            const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
              setCurrentUser(user);
              setAuthLoading(false);
              
              // 當切換身分為一般社員時，若當前選取的分頁是管理者專屬，則強制跳回財務分頁
              if (user && !checkIsAdmin(user)) {
                setActiveTab((prev) => (prev === 'members' || prev === 'invoice' || prev === 'competition') ? 'finance' : prev);
              }
            });
            return () => unsubscribeAuth();
          }, []);

          // Google 登入功能
          const handleGoogleSignIn = async () => {
            try {
              await signInWithPopup(auth, provider);
            } catch (error) {
              alert("Google 登入失敗：" + error.message);
            }
          };

          // 登出功能
          const handleSignOut = async () => {
            if (confirm("確定要登出管理系統嗎？")) {
              try {
                await signOut(auth);
                setData(null);
                setIsEditing(false);
              } catch (error) {
                alert("登出失敗：" + error.message);
              }
            }
          };

          useEffect(() => {
            if (!currentUser) return;

            const connectFirebase = () => {
              const { doc, onSnapshot, setDoc } = window.firebaseApi;
              const db = window.firebaseDb;
              const docRef = doc(db, "clubApp", "mainData");

              const unsubscribe = onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                  let serverData = snap.data();
                  let needsUpdate = false;
                  let mergedData = JSON.parse(JSON.stringify(serverData));

                  // 修復 1：財務總表明細的容錯處理
                  if (mergedData.finance) {
                      if (mergedData.finance.expenses) {
                          mergedData.finance.expenses.forEach(e => {
                              if (e.isPinYinPaid === undefined) { e.isPinYinPaid = e.isPaid === true; needsUpdate = true; }
                              if (!e.club) { e.club = '共用'; needsUpdate = true; }
                          });
                      }
                      if (mergedData.finance.income) {
                          mergedData.finance.income.forEach(i => {
                              if (i.isReceived === undefined) { i.isReceived = i.status !== '尚未收到款項'; needsUpdate = true; }
                              if (!i.club) { i.club = '共用'; needsUpdate = true; }
                          });
                      }
                  }

                  // 修復 2：雙社團核銷明細格式升級
                  if (mergedData.invoice?.months && mergedData.invoice.months.length > 0 && mergedData.invoice.months[0].items !== undefined) {
                      mergedData.invoice.months = mergedData.invoice.months.map(m => {
                          const daTiaoItems = (m.items || []).filter(i => !String(i.category).includes('歐豆'));
                          const ouDouKItems = (m.items || []).filter(i => String(i.category).includes('歐豆'));
                          return { id: m.id, name: m.name, daTiao: { purpose: m.purpose || '', budget: m.budget || 0, items: daTiaoItems }, ouDouK: { purpose: m.purpose || '', budget: m.budget || 0, items: ouDouKItems } };
                      });
                      needsUpdate = true;
                  }

                  // 修復 3：社員屬性防呆與自動補齊
                  if (mergedData.course && mergedData.course.members) {
                      if (mergedData.course.columns) {
                          mergedData.course.columns.forEach(col => {
                              if (col.memberPrice === undefined || col.nonMemberPrice === undefined) { col.memberPrice = 150; col.nonMemberPrice = 400; needsUpdate = true; }
                          });
                      }
                      mergedData.course.members = mergedData.course.members.map((m, idx) => {
                          if (m.registered === undefined || m.payments === undefined || m.department === undefined) {
                              needsUpdate = true;
                              const newM = { ...m, id: m.id || `m_${Date.now()}_${idx}`, type: m.type || '社員', department: m.department || '', registered: m.registered || {}, payments: m.payments || {} };
                              return newM;
                          }
                          return m;
                      });
                  }

                  // 修復 4：缺乏競技統計與舊名轉換
                  if (!mergedData.competition) { mergedData.competition = generateDefaultData().competition; needsUpdate = true; }
                  if (mergedData.course?.members) {
                      mergedData.course.members.forEach(m => {
                          if (m.name === '品印') { m.name = '品in'; needsUpdate = true; }
                          if (m.name === '品印朋友') { m.name = '品in朋友'; needsUpdate = true; }
                      });
                  }
                  if (mergedData.invoice?.months) {
                      mergedData.invoice.months.forEach(m => {
                          ['daTiao', 'ouDouK'].forEach(club => {
                              if (m[club]?.items) { m[club].items.forEach(item => { if (item.payer === '品印') { item.payer = '品in'; needsUpdate = true; } }); }
                          });
                      });
                  }

                  if (needsUpdate && !autoFixAttempted.current) {
                      autoFixAttempted.current = true;
                      setDoc(docRef, mergedData).catch(err => console.error("自動修復儲存失敗:", err));
                  }
                  setData(mergedData);
                } else {
                  if (!autoFixAttempted.current) {
                      autoFixAttempted.current = true;
                      setDoc(docRef, defaultData).catch(err => console.error("初始化資料失敗:", err));
                  }
                  setData(defaultData);
                }
              });
              return () => unsubscribe();
            };

            if (window.firebaseDb) connectFirebase();
            else window.addEventListener('firebase-ready', connectFirebase);
            return () => window.removeEventListener('firebase-ready', connectFirebase);
          }, [currentUser]);

          const handleSave = async () => {
            setIsSaving(true);
            try {
              const { doc, setDoc } = window.firebaseApi;
              await setDoc(doc(window.firebaseDb, "clubApp", "mainData"), data);
              setIsEditing(false);
            } catch (error) { alert("儲存失敗！錯誤訊息: " + error.message); }
            setIsSaving(false);
          };

          // 讀取登入狀態時的 Loading
          if (authLoading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-500">
                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mb-4"></div>
                <p className="text-sm font-medium">正在載入認證模組...</p>
              </div>
            );
          }

          // 未登入時：顯示安全 Google 登入畫面 (溫暖極簡白底風格，已移除上方獎盃圖徽)
          if (!currentUser) {
            return (
              <div className="min-h-screen bg-slate-50 text-slate-800 flex flex-col items-center justify-center p-4">
                <div className="bg-white border border-slate-200/80 p-8 rounded-2xl w-full max-w-md shadow-xl space-y-6">
                  <div className="text-center pt-2">
                    <h2 className="text-2xl font-extrabold tracking-tight text-slate-900 mb-1.5">社團管理系統</h2>
                    <p className="text-xs text-slate-500 font-semibold tracking-wider uppercase">大跳社 ✖ 歐豆K社</p>
                  </div>

                  <div className="space-y-4">
                    <p className="text-xs text-slate-600 text-center bg-slate-50 border border-slate-100 py-3.5 px-4 rounded-xl leading-relaxed">
                      🔒請透過Google帳號認證登入
                    </p>

                    <button 
                      onClick={handleGoogleSignIn}
                      className="w-full flex items-center justify-center bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 px-4 rounded-xl border border-slate-200 shadow-sm transition-all transform hover:-translate-y-0.5 active:translate-y-0 text-sm"
                    >
                      <GoogleIcon />
                      使用 Google 帳戶登入
                    </button>
                  </div>

                  <div className="text-[10px] text-center text-slate-400">
                    共同安全開發規範 • Firestore 雲端即時安全性驗證
                  </div>
                </div>
              </div>
            );
          }

          // 已登入且無資料：等待取得 Firestore 的資料
          if (!data) return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 text-slate-500"><Cloud size={48} className="animate-pulse text-blue-500 mb-4" /><p>正在從 Firebase 安全載入資料...</p></div>;

          // 判斷當前使用者是否為管理員 (社長、副社長)
          const adminRole = checkIsAdmin(currentUser);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-2 sm:p-4 md:p-8 pb-24">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* Header 徽章排版區 */}
                <header className="flex flex-col lg:flex-row lg:items-end justify-between gap-4 pb-6 border-b border-slate-200">
                  <div>
                    <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight mb-3">
                      一起大跳社 <span className="text-slate-400 font-medium px-1">&</span> 歐豆K社
                    </h1>
                    <div className="flex flex-col sm:flex-row gap-3">
                      <div className="flex items-center bg-blue-50 border border-blue-200 rounded-lg px-3 py-2 shadow-sm gap-3">
                        <span className="text-blue-800 bg-white px-2 py-1 rounded shadow-sm border border-blue-100 font-bold text-sm">一起大跳社</span>
                        <div className="flex gap-3 text-xs text-blue-700 items-center">
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-blue-100 font-bold">社長</span> Abby</span>
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-blue-100 font-bold">副社長</span> 品in</span>
                        </div>
                      </div>
                      <div className="flex items-center bg-purple-50 border border-purple-200 rounded-lg px-3 py-2 shadow-sm gap-3">
                        <span className="text-purple-800 bg-white px-2 py-1 rounded shadow-sm border border-purple-100 font-bold text-sm">歐豆K社</span>
                        <div className="flex gap-3 text-xs text-purple-700 items-center">
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-purple-100 font-bold">社長</span> 品in</span>
                          <span className="flex items-center gap-1.5"><span className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-purple-100 font-bold">副社長</span> 廷柔</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  {/* 使用者狀態與登入面板 */}
                  <div className="flex flex-wrap items-center gap-3">
                    
                    {/* 身分識別徽章 */}
