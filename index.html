<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一起大跳社 & 歐豆K社管理系統</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Microsoft JhengHei", sans-serif; background: #f6f7fb; color: #172033; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; border-radius: 8px; padding: 9px 12px; background: #2563eb; color: #fff; font-weight: 700; cursor: pointer; }
    button.secondary { background: #edf2f7; color: #263348; border: 1px solid #dfe5ef; }
    button.danger { background: #e11d48; }
    button.ghost { background: #fff; color: #68758a; border: 1px solid #dfe5ef; }
    input, select, textarea { width: 100%; border: 1px solid #dfe5ef; border-radius: 8px; padding: 9px 10px; background: #fff; }
    textarea { min-height: 70px; resize: vertical; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 22px; }
    .topbar { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; border-bottom: 1px solid #dfe5ef; padding-bottom: 18px; margin-bottom: 16px; }
    h1 { margin: 0 0 8px; font-size: clamp(1.6rem, 4vw, 2.4rem); }
    h2 { margin: 0 0 14px; font-size: 1.25rem; }
    h3 { margin: 0 0 10px; font-size: 1rem; }
    .muted { color: #68758a; }
    .clubs, .userbar, .toolbar, .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .userbar, .toolbar, .actions { justify-content: flex-end; }
    .toolbar { justify-content: space-between; margin-bottom: 12px; }
    .pill { display: inline-flex; border: 1px solid #dfe5ef; border-radius: 999px; padding: 5px 10px; background: #fff; white-space: nowrap; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #dbeafe; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 6px; background: #fff; border: 1px solid #dfe5ef; border-radius: 10px; margin-bottom: 16px; }
    .tabs button { background: transparent; color: #68758a; border: 1px solid transparent; white-space: nowrap; }
    .tabs button.active { background: #eaf1ff; color: #1746a2; border-color: #bfd2ff; }
    .grid { display: grid; gap: 14px; }
    .stats { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card { background: #fff; border: 1px solid #dfe5ef; border-radius: 8px; padding: 16px; box-shadow: 0 1px 2px rgba(15, 23, 42, .04); }
    .stat small { color: #68758a; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .stat strong { display: block; font-size: 1.5rem; margin-top: 4px; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .wide { grid-column: span 2; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #edf1f7; padding: 10px; text-align: left; vertical-align: top; }
    th { color: #68758a; font-size: .82rem; background: #f8fafc; }
    .right { text-align: right; }
    .center { text-align: center; }
    .tag { display: inline-block; border-radius: 999px; padding: 3px 8px; font-size: .78rem; font-weight: 800; }
    .income { color: #047857; background: #d1fae5; }
    .expense { color: #be123c; background: #ffe4e6; }
    .advance { color: #0369a1; background: #e0f2fe; }
    .reimburse { color: #047857; background: #ccfbf1; }
    .transfer { color: #6d28d9; background: #ede9fe; }
    .notice { border: 1px solid #fde68a; background: #fffbeb; color: #92400e; padding: 12px; border-radius: 8px; }
    .login { min-height: 100vh; display: grid; place-items: center; padding: 22px; }
    .login .card { max-width: 420px; width: 100%; }
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15, 23, 42, .45); padding: 16px; z-index: 20; }
    .modal.show { display: flex; }
    .modal .card { width: min(520px, 100%); }
    @media (max-width: 900px) {
      .topbar { align-items: stretch; flex-direction: column; }
      .userbar { justify-content: flex-start; }
      .stats, .two, .three, .form-grid { grid-template-columns: 1fr; }
      .wide { grid-column: auto; }
      .table-wrap { overflow-x: auto; }
      th, td { min-width: 120px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modal" class="modal"></div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyD9DTPO7obCqmDuwzLzwI_JZixTE4W3EhE", authDomain: "gis-club.firebaseapp.com", projectId: "gis-club", storageBucket: "gis-club.firebasestorage.app", messagingSenderId: "384627740491", appId: "1:384627740491:web:2727c4fbb8c8cf1ec362ce" };
    const ROOT_ADMINS = ["abbychaing@gis.fcu.edu.tw", "pininchen@gis.fcu.edu.tw"];
    const CLUBS = ["一起大跳社", "歐豆K社", "共用"];
    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    const db = getFirestore(firebaseApp);
    const docRef = doc(db, "clubApp", "mainData");
    const state = { user: null, data: null, activeTab: "finance", editing: false, saving: false, unsubscribeData: null, filterClub: "all" };

    const $ = (id) => document.getElementById(id);
    const money = (n) => `$${(Number(n) || 0).toLocaleString("zh-TW")}`;
    const today = () => new Date().toISOString().slice(0, 10);
    const clone = (value) => JSON.parse(JSON.stringify(value));
    const esc = (value = "") => String(value).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
    const isAdmin = () => !!state.user && (ROOT_ADMINS.includes(state.user.email) || (state.data?.settings?.adminEmails || []).includes(state.user.email));
    const canEdit = () => state.editing && isAdmin();

    function defaultData() {
      return {
        finance: { ledger: [], budget: { income: 9000, expense: 12000 } },
        course: { columns: [], members: [] },
        invoice: { company: { name: "天茂企管顧問有限公司", taxId: "89177254" }, months: Array.from({ length: 10 }, (_, i) => ({ id: i + 3, name: `${i + 3}月`, daTiao: { purpose: "", budget: 0, items: [] }, ouDouK: { purpose: "", budget: 0, items: [] } })) },
        competition: { daTiao: { newMembers: 0, activities: 0, posts: [] }, ouDouK: { newMembers: 0, activities: 0, posts: [] } },
        videos: [],
        settings: { adminEmails: [] }
      };
    }

    function normalizeData(raw) {
      const base = defaultData();
      const data = { ...base, ...(raw || {}) };
      data.finance = { ...base.finance, ...(data.finance || {}) };
      data.finance.ledger = data.finance.ledger || [];
      data.finance.budget = { ...base.finance.budget, ...(data.finance.budget || {}) };
      if (!data.finance.ledger.length && (data.finance.expenses || data.finance.income)) {
        data.finance.ledger = [
          ...(data.finance.expenses || []).map((e, idx) => ({ id: `m_exp_${idx}_${Date.now()}`, date: e.date || "2026-03-01", type: "expense", category: e.category || "舊資料", item: e.item || "舊支出", amount: Math.abs(Number(e.amount) || 0), club: e.club || "共用", paymentMethod: e.paymentMethod || "cash", member: e.member || "品in", note: e.note || "" })),
          ...(data.finance.income || []).map((e, idx) => ({ id: `m_inc_${idx}_${Date.now()}`, date: e.date || "2026-03-01", type: "income", category: e.category || "舊資料", item: e.item || "舊收入", amount: Math.abs(Number(e.amount) || 0), club: e.club || "共用", paymentMethod: e.paymentMethod || "cash", member: e.member || "品in", note: e.note || "" }))
        ];
        delete data.finance.expenses;
        delete data.finance.income;
      }
      data.course = { ...base.course, ...(data.course || {}) };
      data.course.columns = data.course.columns || [];
      data.course.members = (data.course.members || []).map((m, idx) => ({ id: m.id || `m_${Date.now()}_${idx}`, name: m.name || "", department: m.department || "", type: m.type || "社員", registered: m.registered || {}, payments: m.payments || {} }));
      data.invoice = { ...base.invoice, ...(data.invoice || {}) };
      data.invoice.company = { ...base.invoice.company, ...(data.invoice.company || {}) };
      data.invoice.months = data.invoice.months || base.invoice.months;
      data.competition = { ...base.competition, ...(data.competition || {}) };
      data.competition.daTiao = { newMembers: 0, activities: 0, posts: [], ...(data.competition.daTiao || {}) };
      data.competition.ouDouK = { newMembers: 0, activities: 0, posts: [], ...(data.competition.ouDouK || {}) };
      data.videos = data.videos || [];
      data.settings = { adminEmails: [], ...(data.settings || {}) };
      return data;
    }

    function showAlert(message) {
      $("modal").innerHTML = `<div class="card"><h3>系統訊息</h3><p>${esc(message)}</p><div class="actions"><button data-close>確定</button></div></div>`;
      $("modal").classList.add("show");
      $("modal").querySelector("[data-close]").onclick = () => $("modal").classList.remove("show");
    }

    function showConfirm(message, onConfirm) {
      $("modal").innerHTML = `<div class="card"><h3>請確認</h3><p>${esc(message)}</p><div class="actions"><button class="secondary" data-close>取消</button><button data-ok>確定</button></div></div>`;
      $("modal").classList.add("show");
      $("modal").querySelector("[data-close]").onclick = () => $("modal").classList.remove("show");
      $("modal").querySelector("[data-ok]").onclick = () => { $("modal").classList.remove("show"); onConfirm(); };
    }

    async function saveData(nextData, closeEditing = false) {
      state.saving = true;
      render();
      try {
        state.data = normalizeData(nextData);
        await setDoc(docRef, state.data);
        if (closeEditing) state.editing = false;
      } catch (error) {
        showAlert(`儲存失敗：${error.message}`);
      } finally {
        state.saving = false;
        render();
      }
    }

    function updateData(mutator) {
      const next = clone(state.data);
      mutator(next);
      state.data = normalizeData(next);
      render();
    }

    function financeStats() {
      const ledger = state.data.finance.ledger;
      const total = (type, method) => ledger.filter((t) => t.type === type && (!method || t.paymentMethod === method)).reduce((sum, t) => sum + (Number(t.amount) || 0), 0);
      const transferToCash = total("transfer", "cash");
      const cashAssets = total("income", "cash") - total("expense", "cash") + transferToCash;
      const bankAssets = total("income", "bank") - total("expense", "bank") - transferToCash;
      const advance = ledger.filter((t) => t.type === "advance" && t.member === "品in").reduce((s, t) => s + (Number(t.amount) || 0), 0);
      const reimburse = ledger.filter((t) => (t.type === "reimburse" || (t.type === "expense" && t.category === "償還代墊")) && t.member === "品in").reduce((s, t) => s + (Number(t.amount) || 0), 0);
      const pininAdvanceOwed = advance - reimburse;
      const netAssets = cashAssets + bankAssets - pininAdvanceOwed;
      const budget = state.data.finance.budget;
      return { cashAssets, bankAssets, pininAdvanceOwed, netAssets, forecast: netAssets + Number(budget.income || 0) - Number(budget.expense || 0) };
    }

    function layout(content) {
      const tabs = isAdmin() ? [["finance", "財務總表"], ["members", "社員名單"], ["registration", "課程報名"], ["videos", "課程影片"], ["invoice", "經費核銷"], ["competition", "積分競賽"], ["settings", "系統設定"]] : [["videos", "課程影片"], ["registration", "課程報名"], ["finance", "財務總表"]];
      return `<div class="shell"><header class="topbar"><div><h1>一起大跳社 <span class="muted">&</span> 歐豆K社</h1><div class="clubs"><span class="pill">一起大跳社：社長 Abby，副社長 品in</span><span class="pill">歐豆K社：社長 品in，副社長 廷柔</span></div></div><div class="userbar">${state.user?.photoURL ? `<img class="avatar" src="${state.user.photoURL}" alt="使用者頭像">` : `<div class="avatar"></div>`}<span><strong>${esc(state.user?.displayName || "使用者")}</strong><br><small class="muted">${isAdmin() ? "管理員" : "一般社員"}</small></span>${isAdmin() ? `<button class="secondary" data-toggle-edit>${state.editing ? "結束編輯" : "編輯資料"}</button><button data-save ${state.saving ? "disabled" : ""}>${state.saving ? "儲存中" : "儲存"}</button>` : ""}<button class="ghost" data-signout>登出</button></div></header><nav class="tabs">${tabs.map(([id, label]) => `<button class="${state.activeTab === id ? "active" : ""}" data-tab="${id}">${label}</button>`).join("")}</nav><main>${content}</main></div>`;
    }

    function renderFinance() {
      const stats = financeStats();
      const budget = state.data.finance.budget;
      const ledger = state.data.finance.ledger.filter((t) => state.filterClub === "all" || t.club === state.filterClub).filter((t) => isAdmin() || !["advance", "reimburse", "transfer"].includes(t.type)).sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
      const typeLabels = { income: "收入", expense: "支出", advance: "代墊", reimburse: "退代墊", transfer: "資金移轉" };
      return `<section class="grid stats"><div class="card stat"><small>社團總資產</small><strong>${money(stats.netAssets)}</strong></div><div class="card stat"><small>現金袋</small><strong style="color:#059669">${money(stats.cashAssets)}</strong></div><div class="card stat"><small>${isAdmin() ? "未入袋款項" : "預算控管"}</small><strong>${isAdmin() ? money(stats.bankAssets) : "已隱藏"}</strong></div><div class="card stat"><small>${isAdmin() ? "品印代墊" : "安控權限"}</small><strong>${isAdmin() ? money(stats.pininAdvanceOwed) : "唯讀"}</strong></div><div class="card stat"><small>預估年底結餘</small><strong style="color:${stats.forecast >= 0 ? "#2563eb" : "#e11d48"}">${money(stats.forecast)}</strong></div></section><section class="card" style="margin-top:14px"><div class="toolbar"><h2>財務總帳</h2><div style="display:flex;gap:8px;flex-wrap:wrap"><select id="financeFilter" style="width:auto"><option value="all">全部社團</option>${CLUBS.map((c) => `<option ${state.filterClub === c ? "selected" : ""}>${c}</option>`).join("")}</select>${canEdit() ? `<button data-add-ledger>新增交易</button>` : ""}</div></div>${canEdit() ? `<div class="grid two" style="margin-bottom:12px"><label>年度預估收入<input id="budgetIncome" type="number" value="${budget.income || 0}"></label><label>年度預估支出<input id="budgetExpense" type="number" value="${budget.expense || 0}"></label></div>` : ""}<div class="table-wrap"><table><thead><tr><th>日期</th><th>類型</th><th>社團</th><th>項目</th><th>類別</th><th>方式</th><th class="right">金額</th><th>備註</th><th></th></tr></thead><tbody>${ledger.map((t) => `<tr><td>${esc(t.date)}</td><td><span class="tag ${t.type}">${typeLabels[t.type] || t.type}</span></td><td>${esc(t.club || "-")}</td><td><strong>${esc(t.item || "-")}</strong><br><small class="muted">${esc(t.member || "")}</small></td><td>${esc(t.category || "-")}</td><td>${t.paymentMethod === "bank" ? "銀行/託管" : "現金"}</td><td class="right">${money(t.amount)}</td><td>${esc(t.note || "")}</td><td>${canEdit() ? `<button class="danger" data-del-ledger="${t.id}">刪除</button>` : ""}</td></tr>`).join("") || `<tr><td colspan="9" class="center muted">尚無交易資料</td></tr>`}</tbody></table></div></section>`;
    }

    function renderSimplePage(title, body) {
      return `<section class="card"><h2>${title}</h2>${body}</section>`;
    }

    function renderMembers() {
      return renderSimplePage("社員名單", `<div class="toolbar">${canEdit() ? `<button data-add-member>新增社員</button>` : ""}</div><div class="table-wrap"><table><thead><tr><th>系所</th><th>姓名</th><th>身分</th><th>已繳總額</th><th></th></tr></thead><tbody>${state.data.course.members.map((m, idx) => { const paid = Object.values(m.payments || {}).reduce((s, v) => s + (Number(v) || 0), 0); return `<tr><td>${canEdit() ? `<input data-member="${idx}" data-field="department" value="${esc(m.department)}">` : esc(m.department || "-")}</td><td>${canEdit() ? `<input data-member="${idx}" data-field="name" value="${esc(m.name)}">` : `<strong>${esc(m.name || "-")}</strong>`}</td><td>${canEdit() ? `<select data-member="${idx}" data-field="type"><option ${m.type === "社員" ? "selected" : ""}>社員</option><option ${m.type === "非社員" ? "selected" : ""}>非社員</option></select>` : esc(m.type || "社員")}</td><td>${money(paid)}</td><td>${canEdit() ? `<button class="danger" data-del-member="${idx}">刪除</button>` : ""}</td></tr>`; }).join("") || `<tr><td colspan="5" class="center muted">尚無社員資料</td></tr>`}</tbody></table></div>`);
    }

    function renderRegistration() {
      const columns = state.data.course.columns;
      const members = state.data.course.members;
      return renderSimplePage("課程報名", `<div class="toolbar">${canEdit() ? `<button data-add-course>新增課程</button>` : `<span class="pill">唯讀模式</span>`}</div>${canEdit() ? `<div class="grid three">${columns.map((c, idx) => `<div class="card"><label>課程名稱<input data-course="${idx}" data-course-field="name" value="${esc(c.name || "")}"></label><label>社員價格<input type="number" data-course="${idx}" data-course-field="memberPrice" value="${c.memberPrice ?? 150}"></label><label>非社員價格<input type="number" data-course="${idx}" data-course-field="nonMemberPrice" value="${c.nonMemberPrice ?? 400}"></label><button class="danger" data-del-course="${idx}" style="margin-top:8px">刪除課程</button></div>`).join("")}</div>` : ""}<div class="table-wrap" style="margin-top:14px"><table><thead><tr><th>姓名</th><th>身分</th>${columns.map((c) => `<th>${esc(c.name || "未命名課程")}</th>`).join("")}</tr></thead><tbody>${members.map((m, mi) => `<tr><td><strong>${esc(m.name || "-")}</strong></td><td>${esc(m.type || "社員")}</td>${columns.map((c) => { const checked = !!m.registered?.[c.id]; const amount = m.payments?.[c.id] ?? ""; return `<td>${canEdit() ? `<label><input style="width:auto" type="checkbox" data-reg="${mi}" data-col="${c.id}" ${checked ? "checked" : ""}> 報名</label><input type="number" data-pay="${mi}" data-col="${c.id}" value="${amount}" placeholder="繳費金額">` : checked ? `<span class="tag income">已報名 ${amount ? money(amount) : ""}</span>` : `<span class="muted">-</span>`}</td>`; }).join("")}</tr>`).join("") || `<tr><td colspan="${columns.length + 2}" class="center muted">尚無報名資料</td></tr>`}</tbody></table></div>`);
    }

    function renderVideos() {
      const driveLink = "https://drive.google.com/drive/folders/1HJXojb5ZtgDGOsVU0hrVgmXHQ_RxrwxY?usp=drive_link";
      return renderSimplePage("課程影片", `<div class="toolbar"><a href="${driveLink}" target="_blank"><button class="secondary">開啟雲端資料夾</button></a>${canEdit() ? `<button data-add-video>新增影片</button>` : ""}</div><div class="grid two">${state.data.videos.map((v, idx) => `<div class="card">${canEdit() ? `<label>標題<input data-video="${idx}" data-video-field="title" value="${esc(v.title || "")}"></label><label>日期<input data-video="${idx}" data-video-field="date" value="${esc(v.date || "")}"></label><label>連結<input data-video="${idx}" data-video-field="url" value="${esc(v.url || "")}"></label><label>說明<textarea data-video="${idx}" data-video-field="note">${esc(v.note || "")}</textarea></label><button class="danger" data-del-video="${idx}">刪除</button>` : `<h3>${esc(v.title || "未命名影片")}</h3><p class="muted">${esc(v.date || "無日期")}</p><p>${esc(v.note || "")}</p>${v.url ? `<a href="${esc(v.url)}" target="_blank"><button>觀看影片</button></a>` : ""}`}</div>`).join("") || `<p class="muted">尚未新增影片。</p>`}</div>`);
    }

    function renderInvoice() {
      return renderSimplePage("經費核銷明細", `<div class="notice">統編：<strong>${esc(state.data.invoice.company.taxId)}</strong>，公司：${esc(state.data.invoice.company.name)}</div><div class="grid two" style="margin-top:14px">${state.data.invoice.months.map((m, mi) => `<div class="card"><h3>${esc(m.name)}</h3>${["daTiao", "ouDouK"].map((key) => { const label = key === "daTiao" ? "一起大跳社" : "歐豆K社"; const block = m[key] || { purpose: "", budget: 0, items: [] }; const total = (block.items || []).reduce((s, item) => s + (Number(item.amount) || 0), 0); return `<div class="card"><h3>${label}</h3>${canEdit() ? `<label>用途<input data-invoice="${mi}" data-club="${key}" data-invoice-field="purpose" value="${esc(block.purpose || "")}"></label><label>補助額度<input type="number" data-invoice="${mi}" data-club="${key}" data-invoice-field="budget" value="${block.budget || 0}"></label><button data-add-invoice="${mi}" data-club="${key}">新增項目</button>` : `<p>${esc(block.purpose || "尚未設定用途")}</p>`}<p><strong>花費 ${money(total)}</strong>，餘額 ${money((Number(block.budget) || 0) - total)}</p></div>`; }).join("")}</div>`).join("")}</div>`);
    }

    function renderCompetition() {
      return renderSimplePage("積分競賽", `<div class="grid two">${["daTiao", "ouDouK"].map((key) => { const c = state.data.competition[key]; const label = key === "daTiao" ? "一起大跳社" : "歐豆K社"; return `<div class="card"><h3>${label}</h3><label>新社員人數<input ${canEdit() ? "" : "disabled"} type="number" data-comp="${key}" data-comp-field="newMembers" value="${c.newMembers || 0}"></label><label>活動次數<input ${canEdit() ? "" : "disabled"} type="number" data-comp="${key}" data-comp-field="activities" value="${c.activities || 0}"></label><p class="muted">發文篇數：${(c.posts || []).length}</p>${canEdit() ? `<button data-add-post="${key}">新增發文</button>` : ""}</div>`; }).join("")}</div>`);
    }

    function renderSettings() {
      const admins = state.data.settings.adminEmails || [];
      return renderSimplePage("系統設定", `<div class="grid two"><div class="card"><h3>核心管理員</h3>${ROOT_ADMINS.map((email) => `<p><span class="tag transfer">系統核心</span> ${email}</p>`).join("")}</div><div class="card"><h3>動態授權管理員</h3>${canEdit() ? `<div class="toolbar"><input id="newAdminEmail" placeholder="name@gis.fcu.edu.tw"><button data-add-admin>新增</button></div>` : ""}${admins.map((email) => `<p><span class="tag income">授權</span> ${email} ${canEdit() ? `<button class="danger" data-del-admin="${email}">移除</button>` : ""}</p>`).join("") || `<p class="muted">尚未新增動態管理員。</p>`}</div></div>`);
    }

    function render() {
      if (!state.user) {
        $("app").innerHTML = `<div class="login"><div class="card"><h1>一起大跳社 & 歐豆K社</h1><p class="muted">請使用 Google 帳號登入管理系統。</p><button data-login>使用 Google 登入</button></div></div>`;
        $("app").querySelector("[data-login]").onclick = () => signInWithPopup(auth, provider).catch((error) => showAlert(`Google 登入失敗：${error.message}`));
        return;
      }
      if (!state.data) {
        $("app").innerHTML = `<div class="login"><div class="card"><h2>正在載入資料...</h2></div></div>`;
        return;
      }
      const pages = { finance: renderFinance, members: renderMembers, registration: renderRegistration, videos: renderVideos, invoice: renderInvoice, competition: renderCompetition, settings: renderSettings };
      $("app").innerHTML = layout((pages[state.activeTab] || renderFinance)());
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll("[data-tab]").forEach((el) => el.onclick = () => { state.activeTab = el.dataset.tab; render(); });
      document.querySelector("[data-signout]")?.addEventListener("click", () => showConfirm("確定要登出嗎？", () => signOut(auth)));
      document.querySelector("[data-toggle-edit]")?.addEventListener("click", () => { state.editing = !state.editing; render(); });
      document.querySelector("[data-save]")?.addEventListener("click", () => saveData(state.data, true));
      $("financeFilter")?.addEventListener("change", (e) => { state.filterClub = e.target.value; render(); });
      $("budgetIncome")?.addEventListener("input", (e) => updateData((d) => d.finance.budget.income = Number(e.target.value)));
      $("budgetExpense")?.addEventListener("input", (e) => updateData((d) => d.finance.budget.expense = Number(e.target.value)));
      document.querySelector("[data-add-ledger]")?.addEventListener("click", addLedger);
      document.querySelectorAll("[data-del-ledger]").forEach((el) => el.onclick = () => showConfirm("確定刪除這筆交易？", () => updateData((d) => d.finance.ledger = d.finance.ledger.filter((t) => t.id !== el.dataset.delLedger))));
      document.querySelector("[data-add-member]")?.addEventListener("click", () => updateData((d) => d.course.members.push({ id: `m_${Date.now()}`, name: "", department: "", type: "社員", registered: {}, payments: {} })));
      document.querySelectorAll("[data-del-member]").forEach((el) => el.onclick = () => updateData((d) => d.course.members.splice(Number(el.dataset.delMember), 1)));
      document.querySelectorAll("[data-member]").forEach((el) => el.oninput = () => updateData((d) => d.course.members[Number(el.dataset.member)][el.dataset.field] = el.value));
      document.querySelector("[data-add-course]")?.addEventListener("click", () => updateData((d) => d.course.columns.push({ id: `c_${Date.now()}`, name: "新課程", memberPrice: 150, nonMemberPrice: 400 })));
      document.querySelectorAll("[data-del-course]").forEach((el) => el.onclick = () => updateData((d) => d.course.columns.splice(Number(el.dataset.delCourse), 1)));
      document.querySelectorAll("[data-course]").forEach((el) => el.oninput = () => updateData((d) => d.course.columns[Number(el.dataset.course)][el.dataset.courseField] = el.type === "number" ? Number(el.value) : el.value));
      document.querySelectorAll("[data-reg]").forEach((el) => el.onchange = () => updateData((d) => { const member = d.course.members[Number(el.dataset.reg)]; const col = d.course.columns.find((c) => c.id === el.dataset.col); member.registered[el.dataset.col] = el.checked; if (el.checked && !member.payments[el.dataset.col]) member.payments[el.dataset.col] = member.type === "非社員" ? (col.nonMemberPrice ?? 400) : (col.memberPrice ?? 150); if (!el.checked) delete member.payments[el.dataset.col]; }));
      document.querySelectorAll("[data-pay]").forEach((el) => el.oninput = () => updateData((d) => d.course.members[Number(el.dataset.pay)].payments[el.dataset.col] = Number(el.value)));
      document.querySelector("[data-add-video]")?.addEventListener("click", () => updateData((d) => d.videos.push({ title: "新影片", date: today(), url: "", note: "" })));
      document.querySelectorAll("[data-del-video]").forEach((el) => el.onclick = () => updateData((d) => d.videos.splice(Number(el.dataset.delVideo), 1)));
      document.querySelectorAll("[data-video]").forEach((el) => el.oninput = () => updateData((d) => d.videos[Number(el.dataset.video)][el.dataset.videoField] = el.value));
      document.querySelectorAll("[data-invoice]").forEach((el) => el.oninput = () => updateData((d) => d.invoice.months[Number(el.dataset.invoice)][el.dataset.club][el.dataset.invoiceField] = el.type === "number" ? Number(el.value) : el.value));
      document.querySelectorAll("[data-add-invoice]").forEach((el) => el.onclick = () => updateData((d) => d.invoice.months[Number(el.dataset.addInvoice)][el.dataset.club].items.push({ name: "", amount: 0, payer: "" })));
      document.querySelectorAll("[data-comp]").forEach((el) => el.oninput = () => updateData((d) => d.competition[el.dataset.comp][el.dataset.compField] = Number(el.value)));
      document.querySelectorAll("[data-add-post]").forEach((el) => el.onclick = () => updateData((d) => d.competition[el.dataset.addPost].posts.push({ date: today(), platform: "", title: "" })));
      document.querySelector("[data-add-admin]")?.addEventListener("click", () => { const email = $("newAdminEmail").value.trim(); if (!email.includes("@")) return showAlert("請輸入有效的 Google 信箱。"); if (ROOT_ADMINS.includes(email) || state.data.settings.adminEmails.includes(email)) return showAlert("此信箱已具備管理員權限。"); updateData((d) => d.settings.adminEmails.push(email)); });
      document.querySelectorAll("[data-del-admin]").forEach((el) => el.onclick = () => updateData((d) => d.settings.adminEmails = d.settings.adminEmails.filter((email) => email !== el.dataset.delAdmin)));
    }

    function addLedger() {
      $("modal").innerHTML = `<div class="card"><h3>新增交易</h3><div class="form-grid"><label>日期<input id="txDate" type="date" value="${today()}"></label><label>類型<select id="txType"><option value="income">收入</option><option value="expense">支出</option><option value="advance">代墊</option><option value="reimburse">退代墊</option><option value="transfer">資金移轉</option></select></label><label>社團<select id="txClub">${CLUBS.map((c) => `<option>${c}</option>`).join("")}</select></label><label>方式<select id="txMethod"><option value="cash">現金</option><option value="bank">銀行/託管</option></select></label><label>類別<input id="txCategory" value="課費"></label><label>金額<input id="txAmount" type="number" min="0"></label><label>付款/經手人<input id="txMember" value="品in"></label><label class="wide">項目<input id="txItem" placeholder="例如：3月社課收入"></label><label class="wide">備註<textarea id="txNote"></textarea></label></div><div class="actions"><button class="secondary" data-close>取消</button><button data-create-tx>新增</button></div></div>`;
      $("modal").classList.add("show");
      $("modal").querySelector("[data-close]").onclick = () => $("modal").classList.remove("show");
      $("modal").querySelector("[data-create-tx]").onclick = () => {
        const item = $("txItem").value.trim();
        const amount = Number($("txAmount").value);
        if (!item || !amount) return showAlert("請完整填寫項目與金額。");
        updateData((d) => d.finance.ledger.push({ id: `t_${Date.now()}`, date: $("txDate").value, type: $("txType").value, category: $("txCategory").value.trim(), item, amount, club: $("txClub").value, paymentMethod: $("txMethod").value, member: $("txMember").value.trim(), note: $("txNote").value.trim() }));
        $("modal").classList.remove("show");
      };
    }

    onAuthStateChanged(auth, (user) => {
      state.user = user;
      state.data = null;
      if (state.unsubscribeData) state.unsubscribeData();
      if (!user) return render();
      state.unsubscribeData = onSnapshot(docRef, async (snap) => {
        state.data = normalizeData(snap.exists() ? snap.data() : null);
        if (!snap.exists()) await setDoc(docRef, state.data);
        if (!isAdmin() && ["members", "invoice", "competition", "settings"].includes(state.activeTab)) state.activeTab = "videos";
        render();
      }, (error) => showAlert(`資料讀取失敗：${error.message}`));
      render();
    });
  </script>
</body>
</html>
