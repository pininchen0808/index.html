<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <div id="test"></div>

    <script>
        window.onload=()=>{
            const sheetId = '1Aocx349SxmGoHLh_LFEuXM6NHre5sQYRXdnVQ6jBj1M';
  // 透過 gviz/tq 接口，指定輸出格式為 json
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

  fetch(url)
    .then(response => response.text())
    .then(data => {
      // Google 回傳的資料會被包在 google.visualization.Query.setResponse() 裡面
      // 我們用正規表達式把乾淨的 JSON 字串抓出來
      const jsonString = data.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/)[1];
      const jsonObj = JSON.parse(jsonString);
      
      // 提取出欄位與列的資料
      const rows = jsonObj.table.rows.map(row => {
        return row.c.map(cell => cell ? cell.v : ''); // cell.v 就是儲存格的值
      });

      console.log("直接取得的 JSON 二維陣列：", rows);


      document.getElementById('test').innerHTML = rows.join('<br>')

    })
    .catch(error => console.error("讀取失敗：", error));
    }
    </script>

</body>
</html>
